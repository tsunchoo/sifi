<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BBOX</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
:root {
  --bg: #f5f0e8; --panel: #ede8df; --border: #b0a898;
  --text: #1e1e1e; --dim: #999; --soft: #666;
  --playhead: #ff2200; --muted-bg: #ff2200;
  --slot-saved: #ffac00; --slot-loaded: #ffac00;
  --vol-fill: #ffac00;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; overflow-x: hidden; height: 100dvh; max-height: 100dvh; }
button, .step-cell, .track-header-btn, .vol-mute-col, .fx-btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  height: 100dvh; max-height: 100dvh; overflow: hidden; display: flex; flex-direction: column; align-items: center;
  padding: 16px 4px 16px 4px; user-select: none; -webkit-user-select: none; box-sizing: border-box;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.16;
}
body > * { position: relative; z-index: 1; }
header {
  width: 100%; max-width: 960px; display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  margin-bottom: 5px; padding-bottom: 5px; margin-left: 16px;
}
header h1 { font-family: 'DM Sans', sans-serif; font-size: 1.4rem; letter-spacing: 4px; margin: 0; }
header .sub { font-size: 0.44rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
.tape-reels { display: flex; gap: 78px; align-items: center; margin-right: 38px; margin-left: 30px; }
.reel-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.reel { width: 42px; height: 42px; display: block; transition: filter 0.3s; filter: brightness(0) invert(0.33); }
.reel-wrap.spinning .reel { filter: brightness(0); }
.reel-wrap { position: relative; display: inline-block; }
.reel-wrap.recording .reel { filter: brightness(0) saturate(100%) invert(16%) sepia(90%) saturate(7000%) hue-rotate(355deg) brightness(100%) !important; }
.reel-wrap.hiss-on .reel { filter: brightness(0) sepia(1) saturate(3) hue-rotate(40deg) brightness(1.2); }
.reel-wrap.compress-on .reel { filter: brightness(0) sepia(1) saturate(6) hue-rotate(20deg) brightness(1.4); }
.reel-wrap.reel-beat-pulse { animation: reel-pulse 0.12s ease-out; }
@keyframes reel-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spin-reverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
.reel-wrap.spinning-reverse { animation: spin-reverse 1s linear infinite; transform-origin: center; }
.reel-wrap.spinning-reverse .reel { filter: brightness(0); }
.reel-wrap.spinning { animation: spin 2s linear infinite; transform-origin: center; }
.transport {
  width: 100%; max-width: 960px; display: flex; align-items: stretch;
  gap: 5px; margin-bottom: 6px;
}
.transport .btn {
  flex: 1; padding: 0 4px; flex-shrink: 1;
}
.btn {
  background: #555; border: none; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.5px; padding: 0 10px; cursor: pointer; text-transform: uppercase;
  transition: background 0.1s, color 0.1s; height: 54px; flex-shrink: 0; white-space: nowrap;
  touch-action: manipulation;
}
.btn.active { background: #111; color: #fff; }
#playBtn.playing { background: #111; }
#playBtn.playing img { animation: play-red-pulse 0.5s infinite alternate; }
@keyframes play-red-pulse { from { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(1.5); } to { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(0.5); } }
#playBtn.playing.btn-beat-pulse { animation: play-pulse 0.12s ease-out; }
@keyframes play-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
.btn:active { opacity: 0.7; }

#beatBtn.active { background: #111 !important; color: #ffe033 !important; }
#beatBtn.beat-pulse { animation: beat-red 0.5s infinite alternate; }
@keyframes beat-red { from { background: #111; color: #ffe033; } to { background: #333; color: #b8a000; } }
#saveBtn.rec-active { background: #111; }
#saveBtn.rec-active img { animation: rec-icon-pulse 0.5s infinite alternate; }
#saveBtn.rec-beat-pulse { animation: rec-pump 0.12s ease-out; }
@keyframes rec-pump { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
#saveBtn, #randBtn { touch-action: none; }
@keyframes rec-icon-pulse { from { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(1.5); } to { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(0.5); } }
.btn-flash { background: var(--slot-saved) !important; color: #111 !important; border: none !important; transition: none !important; }
.btn-flash-blue { background: #0468f4 !important; color: #fff !important; border: none !important; transition: none !important; }
.rand-overlay-btn {
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  padding: 20px 0; background: #b0b0b0; border: none; color: var(--text);
  touch-action: manipulation;
}
.rand-overlay-btn:active { background: var(--text); color: var(--bg); }
#bpmSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; background: var(--text); border-radius: 0; cursor: pointer; }
#bpmSlider::-moz-range-thumb { width: 32px; height: 32px; background: var(--text); border-radius: 0; border: none; }
.bpm-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
.bpm-val { font-size: 0.9rem; font-weight: 700; min-width: 32px; text-align: right; flex-shrink: 0; }
input[type=range] { -webkit-appearance: none; flex: 1; height: 3px; background: var(--text); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; background: var(--text); cursor: pointer; border-radius: 0; }
input[type=range]::-moz-range-thumb { width: 32px; height: 32px; background: var(--text); cursor: pointer; border-radius: 0; border: none; }
.vol-wrap { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 960px; margin-top: 6px; padding: 6px 0; }
.master-vol-slider { flex: 1; }
.vol-section { width: 100%; max-width: 960px; margin-top: 12px; display: flex; align-items: center; gap: 6px; }
.vol-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text); font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.vol-label { font-size: 0.6rem; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; font-weight: 700; flex-shrink: 0; }

/* ── Per-track inline control row ── */
.track-ctrl-row {
  display: flex; align-items: stretch; gap: 5px;
  height: 32px;
}
.track-name-btn {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  cursor: pointer; background: #b0b0b0; color: var(--text);
  border: none; padding: 0 8px; white-space: nowrap; overflow: hidden;
  font-family: 'DM Sans', sans-serif; flex-shrink: 0; width: 96px;
  display: flex; align-items: center;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: background 0.06s, color 0.06s;
}
.track-name-btn.has-notes { background: var(--text); color: var(--bg); }
.track-name-btn.muted { background: var(--dim); color: var(--bg); opacity: 0.55; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; opacity: 1; transition: background 0.3s; }
.track-name-btn.shifting { background: var(--playhead) !important; color: #fff !important; animation: pulse 0.5s infinite alternate; }
.track-ctrl-icon-btn {
  width: 32px; flex-shrink: 0;
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; transition: background 0.1s;
}
.track-ctrl-icon-btn.on { background: var(--playhead); color: #fff; }
.track-ctrl-icon-btn.sweep-on { background: #555; color: #fff; }
.rand-btn.pulsing { color: #fff; animation: pulse 0.5s infinite alternate; }
.rand-btn.rand-pending { background: var(--playhead) !important; color: #fff !important; animation: rand-pending-pulse 0.2s infinite alternate; }
@keyframes rand-pending-pulse { from { background: var(--playhead); } to { background: #7a1000; } }
.rand-btn.rand-auto { background: var(--playhead) !important; color: #fff !important; }
#randBtn.pulsing { background: #0468f4; color: #fff; animation: rand-pulse 0.5s infinite alternate; }
@keyframes rand-pulse { from { background: #0468f4; color: #fff; } to { background: #0247a8; color: #fff; } }
#clearBtn.active { background: #0468f4 !important; color: #fff !important; }
#scratchBtn.active { background: #0468f4 !important; color: #fff !important; }
@keyframes pulse { from { background: var(--playhead); color: #fff; } to { background: #ff7755; color: #fff; } }
.track-ctrl-icon-btn.playing { opacity: 0.45; }
.shift-btn {
  width: 32px; flex-shrink: 0; background: #b0b0b0;
  border: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 700; transition: opacity 0.1s; padding: 0;
  touch-action: manipulation;
}
.shift-btn:active { opacity: 0.4; }
.track-vol-bar {
  flex: 1; position: relative; overflow: hidden;
  background: #555; border: none;
  cursor: ew-resize; touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.track-vol-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--vol-fill); pointer-events: none; transition: width 0.05s;
}
.track-vol-bar.muted { background: #ccc; }
.track-vol-bar.muted .track-vol-fill { background: transparent; }
.row-muted .track-ctrl-icon-btn,
.row-muted .shift-btn {
  background: #ccc !important; border: none !important; color: #888 !important;
  animation: none !important;
}



/* ── Sound picker overlay (grid) ── */
#soundPicker {
  display: none; position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.95);
}
#soundPicker.visible { display: flex; }
.sound-picker-inner {
  background: var(--bg); border: none;
  min-width: 320px; padding: 16px;
}
.sound-picker-title {
  padding: 0 0 12px 0; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 12px;
}
#soundPickerList {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.sound-option {
  padding: 16px 8px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; color: var(--text); text-align: center;
  border: none; background: #b0b0b0; font-family: 'DM Sans', sans-serif;
  transition: background 0.05s, color 0.05s; touch-action: manipulation;
  user-select: none;
}
.sound-option:hover { background: var(--text); color: var(--bg); }
.sound-option.active { background: var(--text); color: var(--bg); border: none; }
/* Instrument group colours */
.inst-kit   { background: #1a3a6b; color: #fff; }
.inst-perc  { background: #2a7a3a; color: #fff; }
.inst-tonal { background: #fd475d; color: #fff; }
.inst-kit:hover   { background: #0d1f40; color: #fff; }
.inst-perc:hover  { background: #1a5228; color: #fff; }
.inst-tonal:hover { background: #fd475d; color: #fff; }
.inst-kit.active, .inst-perc.active, .inst-tonal.active { background: var(--text); color: var(--bg); border: none; }
/* Track name buttons inherit group color */
.track-name-btn.inst-kit   { background: #1a3a6b; color: #fff; }
.track-name-btn.inst-perc  { background: #2a7a3a; color: #fff; }
.track-name-btn.inst-tonal { background: #fd475d; color: #fff; }
.track-name-btn.has-notes.inst-kit   { background: #1a3a6b; }
.track-name-btn.has-notes.inst-perc  { background: #2a7a3a; }
.track-name-btn.has-notes.inst-tonal { background: #fd475d; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; }

/* ── Vol overlay ── */
#volOverlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.92);
  cursor: ns-resize;
}
#volOverlay.visible { display: flex; }
.vol-overlay-inner {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 24px 36px; border: none; background: var(--bg);
  pointer-events: none;
}
.vol-overlay-label { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.vol-overlay-pct { font-size: 2.5rem; font-weight: 700; line-height: 1; min-width: 3ch; text-align: center; }
.vol-bar-track {
  width: 100px; height: 20px; background: var(--border); position: relative;
  border: none;
}
.vol-bar-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--text); transition: height 0.05s;
}

/* ── Sequencer grid (middle) ── */
.seq-wrap { width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 0; display: flex; flex-direction: column; gap: 10px; }
.track-wrap { display: flex; flex-direction: column; gap: 4px; }
.track-row {
  display: flex; align-items: stretch;
}

.step-lane {
  flex: 1; display: flex; flex-direction: column;
  border: none;
  border-bottom: 3px solid var(--border);
  overflow: visible;
}
.step-lane-cells {
  display: grid; grid-template-columns: repeat(16, 1fr);
  overflow: visible;
}
.step-cell {
  aspect-ratio: 1;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  min-height: 0; box-sizing: border-box;
  overflow: visible;
}
/* teeth — positioned so bottom edge sits exactly on the lane border */
.step-cell::before {
  content: ''; position: absolute; bottom: -3px; left: -1px;
  width: 3px; background: var(--text); height: calc(30% + 3px); pointer-events: none;
  z-index: 1;
}
/* beat markers taller */
.step-cell[data-step="0"]::before,
.step-cell[data-step="4"]::before,
.step-cell[data-step="8"]::before,
.step-cell[data-step="12"]::before { height: calc(100% + 3px); }
/* step 0 uses the lane's left border */
/* step 0 marker now visible like all others */

.step-cell::after {
  content: '';
  position: absolute;
  background: transparent;
  pointer-events: none;
  transition: background 0.05s, opacity 0.05s;
  top: 50%; bottom: -3px; left: 1px; right: 1px;
}
.step-cell.soft::after { background: var(--track-color, var(--text)); opacity: 0.4; }
.step-cell.on::after   { background: var(--track-color, var(--text)); opacity: 1; top: 0; } /* accent = full height */
.step-cell.playing { background: rgba(192,57,43,0.07); }
.step-cell.on.playing::after   { background: var(--playhead); opacity: 1; }
.step-cell.soft.playing::after { background: var(--playhead); opacity: 0.7; }

/* ── Track lane label — now inside ctrl row, removed ── */

/* ── Footer ── */
.footer {
  width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 0;
  display: flex; justify-content: space-between; align-items: center;
  border-top: none; padding-top: 0; height: 0; overflow: hidden;
}
.ghost-btn {
  font-size: 0.55rem; letter-spacing: 1px; color: var(--dim);
  background: none; border: none; cursor: pointer; text-transform: uppercase;
  font-family: 'DM Sans', sans-serif; transition: color 0.1s; padding: 4px 0;
}
.ghost-btn:hover { color: var(--playhead); }
.status { font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }

/* ── Slot bar ── */
.slot-bar {
  width: 100%; max-width: 960px; display: grid;
  grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 2px;
}
.slot-btn {
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0;
  padding: 16px 0; cursor: pointer; text-align: center;
  touch-action: manipulation; transition: background 0.1s;
}
.slot-btn.saved  { color: #ffe033 !important; }
.slot-btn.pending { animation: slot-pending 0.4s infinite alternate; color: #fff; }
@keyframes slot-pending { from { background: var(--slot-saved); } to { background: var(--bg); } }
.slot-btn.loaded { color: #ffe033 !important; }
.slot-btn.loaded.beat-pulse { animation: slot-pulse 0.12s ease-out; }
@keyframes slot-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
#playBtn.btn-beat-pulse, #beatBtn.btn-beat-pulse { animation: slot-pulse 0.12s ease-out; }
.slot-btn:active { opacity: 0.7; }

#loadingOverlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 999; cursor: pointer;
  border: none; width: 100%; font-family: 'DM Sans', sans-serif;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
#loadingOverlay h2 { font-family: 'DM Sans', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: #111; }
#loadingOverlay p { font-size: 1.1rem; color: #111; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
#loadingOverlay.hidden { display: none; }
</style>
</head>
<body>

<button id="loadingOverlay" onclick="this.style.pointerEvents='none'; document.getElementById('loadingMsg').textContent='LOADING...'; initAudio()">
  <h2>BBOX</h2>
  <p id="loadingMsg">Tap to load</p>
</button>

<!-- Sound picker: flat list for one track at a time -->
<div id="soundPicker">
  <div class="sound-picker-inner">
    <div class="sound-picker-title" id="soundPickerTitle">TRK 1 — SOUND</div>
    <div id="soundPickerList"></div>
  </div>
</div>

<!-- Vol overlay -->
<div id="volOverlay">
  <div class="vol-overlay-inner">
    <div class="vol-overlay-label" id="volOverlayLabel">TRK 1</div>
    <div class="vol-bar-track"><div class="vol-bar-fill" id="volBarFill"></div></div>
    <div class="vol-overlay-pct" id="volOverlayPct">80%</div>
  </div>
</div>

<header>
  <h1>BBOX</h1>

  <div id="tapeReels" class="tape-reels">
    <div class="reel-wrap">
      <img class="reel" id="reel1" src="tape_spool.png" alt="">
    </div>
    <div class="reel-wrap">
      <img class="reel" id="reel2" src="tape_spool.png" alt="">
    </div>
  </div>
</header>

<script>
const INSTRUMENTS = {
  skick:  { name: 'KICK',        soft: null, accent: null, group: 'kit' },
  ssnare: { name: 'SNARE',       soft: null, accent: null, group: 'kit' },
  shihat: { name: 'HIHAT',       soft: null, accent: null, group: 'kit' },
  tamb:   { name: 'TAMB',        soft: 'Sounds/Tamb50.wav',   accent: 'Sounds/Tamb100.wav',   group: 'perc' },
  shak:   { name: 'SHAKER',      soft: 'Sounds/Shak50.wav',   accent: 'Sounds/Shak100.wav',   group: 'perc' },
  clap:   { name: 'HANDCLAP',    soft: 'Sounds/Clap50.wav',   accent: 'Sounds/Clap100.wav',   group: 'perc' },
  congHi: { name: 'CONGA HI',    soft: 'Sounds/CongHi50.wav', accent: 'Sounds/CongHi100.wav', group: 'perc' },
  congLo: { name: 'CONGA LO',    soft: 'Sounds/CongLo50.wav', accent: 'Sounds/CongLo100.wav', group: 'perc' },
  bongHi: { name: 'BONGO HI',    soft: 'Sounds/BongHi50.wav', accent: 'Sounds/BongHi100.wav', group: 'perc' },
  bongLo: { name: 'BONGO LO',    soft: 'Sounds/BongLo50.wav', accent: 'Sounds/BongLo100.wav', group: 'perc' },
  ngate:  { name: 'NOISE',       soft: null, accent: null, group: 'perc'  },
  ride:   { name: 'RIDE',        soft: null, accent: null, group: 'kit'  },
  guiro:  { name: 'GUIRO',       soft: 'Sounds/Guiro.wav', accent: 'Sounds/Guiro_Scratch.wav', group: 'perc'  },
  // cowb:   { name: 'COWBELL',     soft: 'Sounds/Cowb50.wav',   accent: 'Sounds/Cowb100.wav',   group: 'perc' },
  sbass:  { name: 'SYNTH BASS',  soft: null, accent: null, group: 'tonal' },
  sbass3: { name: 'JAMES BASS',  soft: null, accent: null, group: 'tonal' },
  sbass4: { name: 'PUNK BASS',   soft: null, accent: null, group: 'tonal' },
  stab:   { name: 'STAB',        soft: null, accent: null, group: 'tonal' },
  sstring:{ name: 'CHOIR',       soft: null, accent: null, group: 'tonal' },
  sleg:   { name: 'STRINGS+',    soft: null, accent: null, group: 'tonal' },
  sparkle:{ name: 'MUTED STR',   soft: null, accent: null, group: 'tonal' },
  rhodes: { name: 'PIANO',       soft: null, accent: null, group: 'tonal' },
  rhodes2:{ name: 'RHODES',      soft: null, accent: null, group: 'tonal' },
  sflute: { name: 'SYN FLUTE',   soft: null, accent: null, group: 'tonal' },
  satk:   { name: 'SYN ATTACK',  soft: null, accent: null, group: 'tonal' },
  boog:   { name: 'BOOG',        soft: null, accent: null, group: 'tonal' },
};
const INSTRUMENT_KEYS = Object.keys(INSTRUMENTS);
let ctx = null, masterGain = null;
let masterVol = 0.8;

function setMasterVol(v) {
  masterVol = Math.max(0, Math.min(1, v));
  if (masterGain && ctx) masterGain.gain.setTargetAtTime(masterVol, ctx.currentTime, 0.01);
  const slider = document.getElementById('masterVolBar');
  if (slider) slider.value = Math.round(masterVol * 100);
}
function updateMasterVolCells() {
  const slider = document.getElementById('masterVolBar');
  if (slider) slider.value = Math.round(masterVol * 100);
}

// setupMasterVolBar called after buildUI at bottom of script
const buffers = {};

function resumeCtx() { if (ctx && ctx.state !== 'running') ctx.resume(); }
document.addEventListener('touchstart', resumeCtx, false);
document.addEventListener('touchend',   resumeCtx, false);
document.addEventListener('mousedown',  resumeCtx, false);
function attachCtxStateWatch() {
  if (!ctx) return;
  ctx.addEventListener('statechange', () => { if (ctx.state === 'suspended') ctx.resume().catch(()=>{}); });
}
if (typeof navigator.mediaDevices !== 'undefined' && navigator.mediaDevices.addEventListener)
  navigator.mediaDevices.addEventListener('devicechange', () => { if (ctx) ctx.resume().catch(()=>{}); });

async function loadSamples() {
  const msg = document.getElementById('loadingMsg');
  let loaded = 0, total = INSTRUMENT_KEYS.length * 2;
  await Promise.all(INSTRUMENT_KEYS.map(async key => {
    const inst = INSTRUMENTS[key]; buffers[key] = {};
    for (const vel of ['soft','accent']) {
      if (!inst[vel]) { buffers[key][vel] = null; loaded++; continue; }
      try {
        const res = await fetch(inst[vel]);
        if (!res.ok) throw new Error('HTTP '+res.status);
        buffers[key][vel] = await ctx.decodeAudioData(await res.arrayBuffer());
      } catch(e) { console.warn('Failed:',inst[vel],e); buffers[key][vel] = null; }
      msg.textContent = `Loading... ${++loaded}/${total}`;
    }
  }));
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('status').textContent = '';
}

// ── FX: XY pad per track ─────────────────────────────────────────────────────

// x=0 clean, x=1 maximum waveshaper drive
const trackFxNodes = [];

function makeDistCurve(drive) {
  const n = 512, c = new Float32Array(n), k = drive * 400;
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    c[i] = k > 0 ? ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x)) : x;
  }
  return c;
}

function buildFxChain(trackGain) {
  const dryGain = ctx.createGain(); dryGain.gain.value = 1; dryGain.connect(trackGain);
  const fxSend  = ctx.createGain(); fxSend.gain.value = 0;
  const gateGain = ctx.createGain(); gateGain.gain.value = 0;
  const preGain = ctx.createGain(); preGain.gain.value = 0;
  const ws = ctx.createWaveShaper(); ws.oversample = 'none'; ws.curve = makeDistCurve(0.5);
  const postGain = ctx.createGain(); postGain.gain.value = 0.5;
  // crunch path: fxSend → preGain → ws → postGain → trackGain (no compressor = no latency)
  fxSend.connect(preGain); preGain.connect(ws); ws.connect(postGain); postGain.connect(trackGain);
  return { dryGain, fxSend, gateGain, preGain, postGain, ws };
}

function setFxActive(tr, fxVal) {
  if (!trackFxNodes[tr]) return;
  const on = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  const { dryGain, fxSend, preGain } = trackFxNodes[tr];
  const now = ctx.currentTime;
  dryGain.gain.cancelScheduledValues(now); dryGain.gain.setValueAtTime(on ? 0 : 1, now);
  fxSend.gain.cancelScheduledValues(now);  fxSend.gain.setValueAtTime(on ? 1 : 0, now);
  preGain.gain.cancelScheduledValues(now);  preGain.gain.setValueAtTime(on ? 0.25 : 0, now);
  // Compensate for crunch loudness in postGain (×0.5 when on = -6dB)
  // so fader position sounds the same with or without FX
  if (trackFxNodes[tr].postGain) {
    trackFxNodes[tr].postGain.gain.cancelScheduledValues(now);
    trackFxNodes[tr].postGain.gain.setValueAtTime(on ? 0.25 : 0.5, now);
  }
  if (trackGainNodes[tr]) {
    const fxComp = trackVolume[tr];
    trackGainNodes[tr].gain.cancelScheduledValues(now);
    trackGainNodes[tr].gain.setValueAtTime(fxComp, now);
  }
}

function getSynthConnectNode(tr) {
  // Returns the node synth voices should connect to — routes through FX chain if active
  const fxVal = tr !== undefined ? trackFx[tr] : null;
  const fxOn = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  const baseNode = (tr !== undefined && trackFxNodes[tr])
    ? (fxOn ? trackFxNodes[tr].fxSend : trackFxNodes[tr].dryGain)
    : ((tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain);

  return baseNode;
}

function playBuffer(key, isAccent, time, tr) {
  if (key === 'skick')  { playSynthKick(isAccent, time, tr); return; }
  if (key === 'ssnare') { playSynthSnare(isAccent, time, tr); return; }
  if (key === 'shihat') { playSynthHihat(isAccent, time, tr); return; }
  if (key === 'sbass')   { return; } // handled in scheduler with legato duration
  if (key === 'ngate')   { return; } // handled in scheduler
  if (key === 'sbass3')  { return; }
  if (key === 'sbass4')  { return; }
  if (key === 'stab')    { return; }
  if (key === 'sstring') { return; } // handled in scheduler
  if (key === 'sleg')    { return; } // handled in scheduler
  if (key === 'sparkle') { return; } // handled in scheduler
  if (key === 'rhodes')  { return; } // handled in scheduler
  if (key === 'rhodes2')  { return; }
  if (key === 'sflute')   { return; }
  if (key === 'satk')     { return; }
  if (key === 'boog')     { return; }
  const buf = buffers[key]?.[isAccent ? 'accent' : 'soft'];
  if (!buf) return;

  const src = ctx.createBufferSource(); src.buffer = buf;

function reverseBuffer(buf, revLen) {

    globalScaleRoot = root;
    // Rebuild all other tonal tracks' scales to match
    for (let t = 0; t < NUM_TRACKS; t++) {
      if (t !== tr && TONAL_KEYS.has(trackInstruments[t]) && trackBassScale[t]) {

  trackBassScale[tr] = buildScaleFromRoot(root);

    sstring: [[1,2,0.50],[1,3,0.70],[2,3,0.80]],   // Choir — very few, mostly accented
    sleg:    [[1,2,0.10],[2,3,0.20],[2,5,0.30]],   // Strings — fewest
    satk:    [[1,2,0.25],[2,3,0.40],[2,3,0.50]],   // Syn Attack — max 3

  // Tight lowpass — closed, punchy, no bloom
  const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.Q.value = 0.8;
  filt.frequency.setValueAtTime(freq * 3, time);
  filt.frequency.exponentialRampToValueAtTime(freq * 1.1, time + 0.03);

  // Sharp attack, fast decay to dry sustain, hard cut
  const ampEnv = ctx.createGain();
  const decay = Math.min(durSec * 0.55, 0.18);
  ampEnv.gain.setValueAtTime(0, time);
  ampEnv.gain.linearRampToValueAtTime(vel, time + 0.004);
  ampEnv.gain.exponentialRampToValueAtTime(vel * 0.35, time + decay);
  ampEnv.gain.exponentialRampToValueAtTime(0.001, time + durSec * 0.85);

  saw1.connect(mix); saw2.connect(mix); sub.connect(mix);
  mix.connect(filt); filt.connect(ampEnv); ampEnv.connect(dest);
  [saw1, saw2, sub].forEach(o => { o.start(time); o.stop(time + durSec + 0.02); });
}

function playSparkle(freq, durSec, isAccent, time, tr) {
  // Karplus-Strong style: noise burst into tuned comb gives dry woody dampened string tone
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 1.1 : 0.79;
  const period = 1 / freq;
  const bufLen = Math.ceil(ctx.sampleRate * period);

  // Seed: short noise burst
  const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) nd[i] = (Math.random() * 2 - 1);

  const src = ctx.createBufferSource();
  src.buffer = noiseBuf;
  src.loop = true;

  // Lowpass to kill brightness fast — gives the dampened/muted character
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, time);
  lp.frequency.exponentialRampToValueAtTime(freq * 1.2, time + 0.025);

  // Notch to thin out the midrange boxiness
  const notch = ctx.createBiquadFilter(); notch.type = 'notch';
  notch.frequency.value = freq * 3; notch.Q.value = 1.5;

  const env = ctx.createGain();
  const decay = Math.min(0.18, durSec * 0.6); // always short regardless of legato
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.002);
  env.gain.exponentialRampToValueAtTime(0.001, time + decay);

  src.connect(lp); lp.connect(notch); notch.connect(env); env.connect(dest);
  src.start(time); src.stop(time + decay + 0.02);
}

// ── Punk Bass: aggressive pick attack, midrange growl, fast decay ──
const _plunkGlide = {};
function playPlunkBass(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.9 : 0.65;
  _plunkGlide[tr] = freq;

  // Distorted sawtooth through a tight bandpass — nasal, aggressive
  const osc1 = ctx.createOscillator(); osc1.type = 'sawtooth'; osc1.frequency.value = freq;
  const osc2 = ctx.createOscillator(); osc2.type = 'sawtooth'; osc2.frequency.value = freq * 0.5; // sub oct
  const mix = ctx.createGain(); mix.gain.value = 0.4;

  // Gritty midrange bandpass
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.setValueAtTime(freq * 4, time);
  bp.frequency.exponentialRampToValueAtTime(freq * 1.5, time + 0.02);
  bp.Q.value = 1.8;

  // Hard clip waveshaper for pick grit
  const ws = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = Math.tanh(x * 4); }
  ws.curve = curve; ws.oversample = '2x';

  const ampEnv = ctx.createGain();
  const decay = Math.min(durSec * 0.7, 0.22);
  ampEnv.gain.setValueAtTime(0, time);
  ampEnv.gain.linearRampToValueAtTime(vel, time + 0.003);
  ampEnv.gain.exponentialRampToValueAtTime(vel * 0.25, time + decay);
  ampEnv.gain.exponentialRampToValueAtTime(0.001, time + Math.min(durSec, 0.45));

  osc1.connect(mix); osc2.connect(mix);
  mix.connect(bp); bp.connect(ws); ws.connect(ampEnv); ampEnv.connect(dest);
  [osc1, osc2].forEach(o => { o.start(time); o.stop(time + Math.min(durSec, 0.5)); });
}

// ── Stab: short sharp synth chord stab, fast tail ──
function playStab(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.246 : 0.170;

  // 3-oscillator detuned stack — chord-like spread
  const detunes = [-7, 0, 7, 12];
  const env = ctx.createGain();
  detunes.forEach(det => {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.value = freq * (det === 12 ? 2 : 1);
    osc.detune.value = det === 12 ? 0 : det * 2;
    osc.connect(env); osc.start(time); osc.stop(time + 0.18);
  });

  // Punchy lowpass sweep — bright attack, shut fast
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 4;
  lp.frequency.setValueAtTime(isAccent ? 4000 : 2800, time);
  lp.frequency.exponentialRampToValueAtTime(300, time + 0.06);

  // Very fast amplitude decay — the stab
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.004);
  env.gain.exponentialRampToValueAtTime(vel * 0.3, time + 0.025);
  env.gain.exponentialRampToValueAtTime(0.001, time + 0.12);

  env.connect(lp); lp.connect(dest);
}

// ── Rhodes 2: warm electric piano, more fundamental, softer attack ──
function playRhodes2(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.202 : 0.139;

  const B = 0.00008; // less inharmonicity = warmer
  const inharmonic = n => freq * n * Math.sqrt(1 + B * n * n);
  const baseDec = Math.min(durSec + 1.0, 2.4) * (1 + Math.max(0, (300 - freq) / 300) * 0.6);

  // Fewer partials, stronger fundamental = warmer tone
  const partials = [
    { n:1, amp:1.00, dec:1.00 },
    { n:2, amp:0.30, dec:0.60 },
    { n:3, amp:0.10, dec:0.35 },
    { n:4, amp:0.03, dec:0.20 },
  ];
  partials.forEach(({ n, amp, dec }) => {
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = inharmonic(n);
    const env = ctx.createGain();
    const pk = vel * amp; const decT = baseDec * dec;
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(pk, time + 0.008); // softer attack
    env.gain.exponentialRampToValueAtTime(pk * 0.7, time + 0.04);
    env.gain.exponentialRampToValueAtTime(0.0001, time + decT);
    osc.connect(env); env.connect(dest);
    osc.start(time); osc.stop(time + decT + 0.05);
  });

  // Softer tine noise — felt not hammer
  const clickLen = 0.018;
  const clickBuf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * clickLen), ctx.sampleRate);
  const cd = clickBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random()*2-1) * Math.pow(1-i/cd.length, 1.5);
  const click = ctx.createBufferSource(); click.buffer = clickBuf;
  const clickLP = ctx.createBiquadFilter(); clickLP.type = 'lowpass'; clickLP.frequency.value = 2000;
  const clickEnv = ctx.createGain(); clickEnv.gain.value = vel * 0.2;
  click.connect(clickLP); clickLP.connect(clickEnv); clickEnv.connect(dest);
  click.start(time);
}

// ── Metronome: warm woodblock click ──
function playMetronome(t, isAccent) {
  if (!ctx) return;
  const vol = isAccent ? 0.28 : 0.16;
  const freq = isAccent ? 1200 : 900;

  // Sine transient — the "tok"
  const osc = ctx.createOscillator(); osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, t);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.4, t + 0.025);
  const oscEnv = ctx.createGain();
  oscEnv.gain.setValueAtTime(vol, t);
  oscEnv.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
  osc.connect(oscEnv); oscEnv.connect(masterGain);
  osc.start(t); osc.stop(t + 0.05);

  // Noise body — the "wood"
  const bufLen = Math.ceil(ctx.sampleRate * 0.03);
  const nBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) nd[i] = (Math.random()*2-1) * Math.pow(1-i/bufLen, 2);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = freq * 1.5; bp.Q.value = 3;
  const noiseEnv = ctx.createGain(); noiseEnv.gain.value = vol * 0.5;
  noise.connect(bp); bp.connect(noiseEnv); noiseEnv.connect(masterGain);
  noise.start(t);
}


// ── Ride cymbal: warm body + high sizzle, not harsh ──
function playRide(isAccent, time, tr) {
  if (!ctx) return;
  const dest = (tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain;
  const vel = isAccent ? 0.7 : 0.45;

  // Body: subtle metallic hint — kept very low
  [[251, 0], [397, -5]].forEach(([freq, det]) => {
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = freq; osc.detune.value = det;
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * 0.08, time);
    env.gain.exponentialRampToValueAtTime(0.0001, time + (isAccent ? 0.5 : 0.3));
    osc.connect(env); env.connect(dest);
    osc.start(time); osc.stop(time + (isAccent ? 0.6 : 0.4));
  });

  // Sizzle: tight, clean shimmer with narrow BP and gentle decay
  const noiseLen = Math.ceil(ctx.sampleRate * (isAccent ? 1.2 : 0.8));
  const nBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;

  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 6000; bp.Q.value = 2.5; // narrower, more controlled
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.value = 8000; // softer top end

  const nEnv = ctx.createGain();
  nEnv.gain.setValueAtTime(vel * 0.10, time);
  nEnv.gain.exponentialRampToValueAtTime(vel * 0.025, time + 0.06);
  nEnv.gain.exponentialRampToValueAtTime(0.0001, time + (isAccent ? 1.0 : 0.65));

  noise.connect(bp); bp.connect(lp); lp.connect(nEnv); nEnv.connect(dest);
  noise.start(time);

  // Soft stick tap — gentler than before
  const clickLen = Math.ceil(ctx.sampleRate * 0.005);
  const cBuf = ctx.createBuffer(1, clickLen, ctx.sampleRate);
  const cd = cBuf.getChannelData(0);
  for (let i = 0; i < clickLen; i++) cd[i] = (Math.random()*2-1) * Math.pow(1-i/clickLen, 3);
  const click = ctx.createBufferSource(); click.buffer = cBuf;
  const cBP = ctx.createBiquadFilter(); cBP.type = 'bandpass'; cBP.frequency.value = 4000; cBP.Q.value = 3;
  const cEnv = ctx.createGain(); cEnv.gain.value = vel * 0.3;
  click.connect(cBP); cBP.connect(cEnv); cEnv.connect(dest);
  click.start(time);
}

// ── BOOG: fluid legato synth lead with strong portamento ──
const _boogGlide = {};
function playBoog(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.0055 : 0.0035;

  const prevFreq = _boogGlide[tr] || freq;
  _boogGlide[tr] = freq;

  // Long glide time — the defining characteristic
  const glide = Math.min(durSec * 0.6, 0.18);

  // Two oscillators: main sine + detuned sub for body
  const osc1 = ctx.createOscillator(); osc1.type = 'sine';
  osc1.frequency.setValueAtTime(Math.max(prevFreq, 1), time);
  osc1.frequency.exponentialRampToValueAtTime(Math.max(freq, 1), time + glide);

  const osc2 = ctx.createOscillator(); osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(Math.max(prevFreq * 0.5, 1), time);
  osc2.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.5, 1), time + glide);
  osc2.detune.value = 7;

  // Thin LP filter
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 2;
  lp.frequency.setValueAtTime(freq * 6, time);
  lp.frequency.exponentialRampToValueAtTime(freq * 2.5, time + 0.08);
  lp.frequency.exponentialRampToValueAtTime(freq * 2, time + durSec);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.025);
  env.gain.setValueAtTime(vel * 0.9, time + durSec - 0.04);
  env.gain.linearRampToValueAtTime(0, time + durSec + 0.08);

  const env2 = ctx.createGain(); env2.gain.value = 0.35;

  osc1.connect(lp); lp.connect(env); env.connect(dest);
  osc2.connect(env2); env2.connect(dest);

  osc1.start(time); osc1.stop(time + durSec + 0.12);
  osc2.start(time); osc2.stop(time + durSec + 0.12);
}

// ── Synth Flute: 80s FM-style breathy flute ──
function playSynthFlute(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.125 : 0.080;

  // FM synthesis: carrier sine + modulator for breathiness
  const modFreq = freq * 2.01; // modulator slightly detuned
  const modDepth = freq * 1.8;

  const mod = ctx.createOscillator(); mod.type = 'sine'; mod.frequency.value = modFreq;
  const modGain = ctx.createGain();
  modGain.gain.setValueAtTime(0, time);
  modGain.gain.linearRampToValueAtTime(modDepth, time + 0.05);
  modGain.gain.setValueAtTime(modDepth * 0.7, time + durSec * 0.3);
  modGain.gain.linearRampToValueAtTime(0, time + durSec + 0.1);
  mod.connect(modGain);

  const carrier = ctx.createOscillator(); carrier.type = 'sine';
  carrier.frequency.value = freq;
  modGain.connect(carrier.frequency); // FM connection

  // Breath noise layer
  const noiseLen = Math.ceil(ctx.sampleRate * Math.min(durSec + 0.2, 1.5));
  const nBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const nbp = ctx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = freq * 3; nbp.Q.value = 8;
  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(0, time);
  nGain.gain.linearRampToValueAtTime(vel * 0.15, time + 0.03);
  nGain.gain.linearRampToValueAtTime(vel * 0.08, time + durSec * 0.4);
  nGain.gain.linearRampToValueAtTime(0, time + durSec + 0.05);
  noise.connect(nbp); nbp.connect(nGain); nGain.connect(dest);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.04); // soft attack
  env.gain.setValueAtTime(vel * 0.85, time + durSec * 0.5);
  env.gain.linearRampToValueAtTime(0, time + durSec + 0.12);

  carrier.connect(env); env.connect(dest);
  mod.start(time); mod.stop(time + durSec + 0.2);
  carrier.start(time); carrier.stop(time + durSec + 0.2);
  noise.start(time);
}

// ── Synth Attack: sharp attack with long shimmer tail ──
function playSynthAttack(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.32 : 0.22;
  const tail = 1.25; // tail halved

  // Sharp metallic attack: two slightly detuned saws
  [-4, 4].forEach(det => {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.value = freq; osc.detune.value = det;
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel, time);
    env.gain.exponentialRampToValueAtTime(vel * 0.4, time + 0.015); // sharp initial drop
    env.gain.exponentialRampToValueAtTime(0.001, time + tail);
    osc.connect(env); env.connect(dest);
    osc.start(time); osc.stop(time + tail + 0.1);
  });

  // High shimmer layer: high octave sine
  const shimmer = ctx.createOscillator(); shimmer.type = 'sine';
  shimmer.frequency.value = freq * 4;
  const shimEnv = ctx.createGain();
  shimEnv.gain.setValueAtTime(vel * 0.3, time);
  shimEnv.gain.exponentialRampToValueAtTime(0.001, time + tail * 0.7);
  shimmer.connect(shimEnv); shimEnv.connect(dest);
  shimmer.start(time); shimmer.stop(time + tail);

  // LP filter sweep: bright to warm
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 2;
  lp.frequency.setValueAtTime(freq * 12, time);
  lp.frequency.exponentialRampToValueAtTime(freq * 2, time + 0.3);
}

function playKick(t) {
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(masterGain);
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(45, t + 0.07); // faster pitch drop = less tonal
  g.gain.setValueAtTime(0.635, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.16); // much shorter tail
  osc.start(t); osc.stop(t + 0.17);
  // short noise click for attack definition without adding tone
  const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * 0.012), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const click = ctx.createBufferSource(); click.buffer = buf;
  const clickGain = ctx.createGain(); clickGain.gain.value = 0.238;
  click.connect(clickGain); clickGain.connect(masterGain); click.start(t);
}
function playSnare(t) {
  const dur = 0.22;
  const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const env = Math.pow(1 - i / d.length, 1.5);
    d[i] = (Math.random() * 2 - 1) * env;
  }
  const src = ctx.createBufferSource(), g = ctx.createGain();
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 300;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.8;
  // body tone
  const body = ctx.createOscillator(), bodyGain = ctx.createGain();
  body.frequency.setValueAtTime(220, t); body.frequency.exponentialRampToValueAtTime(80, t + 0.08);
  bodyGain.gain.setValueAtTime(0.278, t); bodyGain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
  body.connect(bodyGain); bodyGain.connect(masterGain); body.start(t); body.stop(t + 0.1);
  src.buffer = buf; src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(masterGain);
  g.gain.setValueAtTime(0.437, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  src.start(t);
}
function toggleBeat() {
  if (ctx) ctx.resume();
  const btn = document.getElementById('beatBtn');
  if (beatPlaying || _beatPending) {
    // Turn off immediately
    beatPlaying = false; _beatPending = false;
    btn.classList.remove('active');
    updateBeatPulse();
  } else {
    if (playing) {
      // Playing — queue for next downbeat
      _beatPending = true;
      btn.classList.add('active');
      updateBeatPulse();
    } else {
      // Not playing — activate and start playback
      beatPlaying = true;
      btn.classList.add('active');
      updateBeatPulse();
      togglePlay();
    }
  }
}

// ── Sound picker (flat list, per track) ──
let soundPickerTrack = -1;
function openSoundPicker(tr) {
  soundPickerTrack = tr;
  document.getElementById('soundPickerTitle').textContent = `TRK ${tr+1} — SOUND`;
  const list = document.getElementById('soundPickerList'); list.innerHTML = '';
  INSTRUMENT_KEYS.forEach(k => {
    const opt = document.createElement('div');
    opt.className = 'sound-option inst-' + (INSTRUMENTS[k].group||'perc') + (trackInstruments[tr] === k ? ' active' : '');
    opt.dataset.key = k;
    opt.textContent = INSTRUMENTS[k].name;
    opt.addEventListener('mouseenter', () => {
      list.querySelectorAll('.sound-option').forEach(o => o.classList.toggle('active', o.dataset.key === k));
    });
    opt.addEventListener('mouseup', e => { e.stopPropagation(); selectSound(tr, k); });
    opt.addEventListener('touchend', e => { e.stopPropagation(); e.preventDefault(); selectSound(tr, k); }, { passive: false });
    list.appendChild(opt);
  });
  document.getElementById('soundPicker').classList.add('visible');
}
function setTrackNameColor(tr, key) {
  const btn = document.getElementById(`tbtn-${tr}`); if (!btn) return;
  btn.classList.remove('inst-kit','inst-perc','inst-tonal');
  const g = INSTRUMENTS[key]?.group || 'perc';
  const _laneColors = {'kit':'#1a3a6b','perc':'#2a7a3a','tonal':'#fd475d'};
  const lane = document.getElementById(`lane-${tr}`);
  if (lane) lane.style.setProperty('--track-color', _laneColors[g] || 'var(--text)');
  btn.classList.add('inst-' + g);
}

function selectSound(tr, k) {
  const prevKey = trackInstruments[tr];
  if (trackInstruments[tr] === 'ngate' && k !== 'ngate' && _noiseGateNodes[tr]) {
    try { _noiseGateNodes[tr].src.stop(); } catch(e) {} delete _noiseGateNodes[tr];
  }
  trackInstruments[tr] = k;
  if (k === 'ngate' && ctx) initNoiseGate(tr);
  const btn = document.getElementById(`tbtn-${tr}`); if (btn) btn.textContent = INSTRUMENTS[k].name;
  setTrackNameColor(tr, k);
  const sb = document.getElementById(`swpbtn-${tr}`);
  if (sb) {
    const tonal = TONAL_KEYS.has(k);
    sb.textContent = 'L'; sb.classList.toggle('sweep-on', !!trackSweep[tr]);
  }
  closeSoundPicker();
  markModified();
}
function closeSoundPicker() {
  document.getElementById('soundPicker').classList.remove('visible');
  soundPickerTrack = -1;
}
document.getElementById('soundPicker').addEventListener('click', e => {
  if (e.target === document.getElementById('soundPicker')) closeSoundPicker();
});

function concatAudioBuffers(buffers, sampleRate) {
  const numCh = 2;
  const totalLen = buffers.reduce((s, b) => s + b.length, 0);
  const channels = [new Float32Array(totalLen), new Float32Array(totalLen)];
  let offset = 0;
  for (const buf of buffers) {
    for (let ch = 0; ch < numCh; ch++) {
      const src = buf.numberOfChannels > ch ? buf.getChannelData(ch) : buf.getChannelData(0);
      channels[ch].set(src, offset);
    }
    offset += buf.length;
  }
  return { numberOfChannels: numCh, sampleRate, length: totalLen, getChannelData: ch => channels[ch] };
}

// Collect filled slots (or current state if none saved)
function getExportSnaps() {
  const snaps = [];
  for (let i = 0; i < NUM_SLOTS; i++) { if (slots[i] !== null) snaps.push({ snap: slots[i], label: `slot${i+1}` }); }
  if (snaps.length === 0) snaps.push({ snap: snapshotState(), label: 'current' });
  return snaps;
}

async function shareOrDownload(files) {
  const shareData = { files, title: 'BBOX loops' };
  try {
    await navigator.share(shareData);
  } catch(e) {
    if (e.name === 'AbortError') return;
    for (const file of files) {
      const url = URL.createObjectURL(file);
      const a = document.createElement('a'); a.href = url; a.download = file.name;
      document.body.appendChild(a); a.click();
      await new Promise(r => setTimeout(r, 300));
      URL.revokeObjectURL(url); a.remove();
    }
  }
}

async function saveAllSeparate() {
  if (!ctx) { alert('Load audio first'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const snaps = getExportSnaps();
    const files = [];
    for (let i = 0; i < snaps.length; i++) {
      btn.textContent = `${i+1}/${snaps.length}`;
      const wav = await renderSlotToWav(snaps[i].snap);
      files.push(new File([wav], `boombot-${snaps[i].label}-${Math.round(snaps[i].snap.bpm||bpm)}bpm.wav`, { type: 'audio/wav' }));
    }
    await shareOrDownload(files);
  } catch(e) {
    console.error('Save failed', e);
    alert('Save error: ' + e.message);
  }
  btn.textContent = 'SAVE'; btn.disabled = false;
}

async function saveAllCombined() {
  if (!ctx) { alert('Load audio first'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const snaps = getExportSnaps();
    const renderedBuffers = [];
    for (let i = 0; i < snaps.length; i++) {
      btn.textContent = `${i+1}/${snaps.length}`;
      const wav = await renderSlotToWav(snaps[i].snap);
      const decoded = await ctx.decodeAudioData(wav.slice(0));
      renderedBuffers.push(decoded);
    }
    const combined = concatAudioBuffers(renderedBuffers, ctx.sampleRate);
    const wavData = audioBufferToWav(combined, snaps[0].snap.bpm || bpm);
    const file = new File([wavData], `boombot-${snaps.length}slots.wav`, { type: 'audio/wav' });
    await shareOrDownload([file]);
  } catch(e) {
    console.error('Save failed', e);
    alert('Save error: ' + e.message);
  }
  btn.textContent = 'SAVE'; btn.disabled = false;
}

function audioBufferToWav(buffer, tempoHint) {
  const numCh = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
  const pcmBytes = len * numCh * 2;

  // bext chunk (858 bytes content)
  const bextContent = 858;
  const bextChunkTotal = 8 + bextContent;

  const totalBytes = 4 + 4 + 4 +
                     8 + 16 +
                     bextChunkTotal +
                     8 + pcmBytes;

  const ab = new ArrayBuffer(totalBytes);
  const view = new DataView(ab);
  let p = 0;

  function wStr(s, pad) {
    const n = pad || s.length;
    for (let i = 0; i < n; i++) view.setUint8(p + i, i < s.length ? s.charCodeAt(i) : 0);
    p += n;
  }
  function wU32(v) { view.setUint32(p, v, true); p += 4; }
  function wU16(v) { view.setUint16(p, v, true); p += 2; }
  function wZero(n) { p += n; } // ArrayBuffer already zeroed

  // RIFF header
  wStr('RIFF'); wU32(totalBytes - 8); wStr('WAVE');

  // fmt chunk
  wStr('fmt '); wU32(16); wU16(1); wU16(numCh);
  wU32(sr); wU32(sr * numCh * 2); wU16(numCh * 2); wU16(16);

  // bext chunk (602 bytes content)
  wStr('bext'); wU32(bextContent);
  wStr('BOOMBOX', 256);  // Description (256)
  wZero(32);                 // Originator (32)
  wZero(32);                 // OriginatorReference (32)
  wZero(10);                 // OriginationDate (10)
  wZero(8);                  // OriginationTime (8)
  wU32(0); wU32(0);          // TimeReference low+high (8)
  wU16(1);                   // Version (2)
  wZero(64);                 // UMID (64)
  wU16(0); wU16(0); wU16(0); wU16(0); wU16(0); // Loudness (10)
  wZero(180);                // Reserved (180)
  wStr(`BPM=${Math.round(tempoHint || 120)}\r\n`, 256); // CodingHistory (256)

  // Verify bext size
  // data chunk
  wStr('data'); wU32(pcmBytes);
  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < numCh; c++) {
      const s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7FFF, true); p += 2;
    }
  }
  return ab;
}

    const needsTonal = unlockedTracks.filter(tr => {
      // Tracks that will get tonal after sort: positions that rank 2,3,4 in sorted pool
      // Approximate: bottom half gets tonal/bass
      return tr >= Math.floor(NUM_TRACKS / 2);
    });
    const tonalSlots = Math.max(1, Math.round(unlockedTracks.length / 2));
    const percSlots = Math.max(0, unlockedTracks.length - tonalSlots);

    // Build exact pool for unlocked slots
    const bassAvail = tonalKeys.filter(k => bassKeys.has(k));
    const allBassKeys = Object.keys(INSTRUMENTS).filter(k => bassKeys.has(k));
    const bassChoice = bassAvail.length > 0
      ? bassAvail[Math.floor(Math.random() * bassAvail.length)]
      : allBassKeys[Math.floor(Math.random() * allBassKeys.length)];

      _autoRandPending = false;

  const startAuto = () => {
    if (autoRandInterval) { stopAuto(); return; } // second tap stops it

    // Then re-trigger every 4 bars
    autoRandInterval = setInterval(() => { _autoRandPending = true; }, 4 * 4 * (60 / bpm) * 1000);

  // Single tap = one rand. Double tap = start/stop auto mode.
  let lastTap = 0;

// Per-track R press level (cycles 0→1→2→0)
const trackRLevel = new Array(NUM_TRACKS).fill(0);

function placeNotes(tr, noteCount, accentRatio, level) {
  grid[tr].fill(0);
  const positions = [];
  while (positions.length < noteCount) {
    const p = Math.floor(Math.random() * NUM_STEPS);
    if (!positions.includes(p)) positions.push(p);
  }
  const accentCount = Math.round(noteCount * accentRatio);
  const shuffled = [...positions].sort(() => Math.random() - 0.5);
  const accentSet = new Set(shuffled.slice(0, accentCount));
  positions.forEach(p => { grid[tr][p] = accentSet.has(p) ? 2 : 1; });

  const key = trackInstruments[tr];
  // Kick: never land on beat 1 (step 0) or beat 3 (step 8) — those belong to the BEAT
  if (key === 'skick') { grid[tr][0] = 0; grid[tr][8] = 0; }
  // Handclap: always on beats 2 and 4 only (steps 4 and 12)
  if (key === 'clap') {
    for (let s = 0; s < NUM_STEPS; s++) grid[tr][s] = 0;
    grid[tr][4] = 2; grid[tr][12] = 2;
  }
  // Guiro: max 2 accents per measure, 40% chance of accent on beat 1
  if (key === 'guiro') {
    if (Math.random() < 0.4) { grid[tr][0] = 2; } // accent on the 1
    let accCount = 0;
    for (let s = 0; s < NUM_STEPS; s++) {

  const maxAccentConsec = level === 2 ? 2 : 99;

  // Iterate until no violations remain
  for (let pass = 0; pass < NUM_STEPS; pass++) {
    let anyChange = false;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 0) continue;
      // Count run starting at s
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] > 0) run++;
      if (run > maxConsec) {
        grid[tr][(s + maxConsec) % NUM_STEPS] = 0;
        anyChange = true;
      }
    }
    // Check accent runs
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] !== 2) continue;
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] === 2) run++;

function randomizeTrack(tr) {

    randomizeBassTrack(tr, level); return;
  }

  const straightKeys = new Set(['shihat','shak','clap','sleg']);

  const isTonalStraight = TONAL_KEYS.has(key) && !straightKeys.has(key) && Math.random() < 0.125;

  if (straightKeys.has(key) && Math.random() < 0.3 || isTonalStraight) {
    const isEighths = Math.random() < 0.5;
    const step = isEighths ? 2 : 4;
    // Downbeats (0,4,8,12) or upbeats (2,6,10,14) — 50/50
    const isUpbeat = isTonalStraight && Math.random() < 0.5;
    const offset = isUpbeat ? 1 : 0; // upbeat = start on step 1 of each beat pair

  if (key === 'ngate') {
    const isUpbeat = Math.random() < 0.5;

      const gs = (s - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;

    [4, 7,  0.20],
    [7, 11, 0.40],
    [11, 16, 0.60],

// SWEEP button wiring — hold = rising noise sweep, release = descend
(function() {
  const btn = document.getElementById('clearBtn');
  if (!btn) return;
  let sweepNodes = null;

  function startSweep() {
    if (!ctx || sweepNodes) return;
    ctx.resume();
    const dur = stepDuration() * 8; // twice as fast
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * (dur + 1)), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < buf.length; i++) d[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 3;
    bp.frequency.setValueAtTime(200, t);
    bp.frequency.exponentialRampToValueAtTime(8000, t + dur);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.191, t + 0.008);
    noise.connect(bp); bp.connect(gain); gain.connect(masterGain);
    noise.start(t);
    sweepNodes = { noise, bp, gain };
    btn.classList.add('active');
  }

  function stopSweep() {
    if (!sweepNodes || !ctx) return;
    const { bp, gain, noise } = sweepNodes;
    sweepNodes = null;
    btn.classList.remove('active');
    const t = ctx.currentTime;
    const quarterNote = stepDuration() * 2; // half a beat fade
    bp.frequency.cancelScheduledValues(t);
    bp.frequency.exponentialRampToValueAtTime(200, t + quarterNote);
    gain.gain.cancelScheduledValues(t);
    gain.gain.setValueAtTime(gain.gain.value, t);
    gain.gain.linearRampToValueAtTime(0, t + quarterNote);
    setTimeout(() => { try { noise.stop(); } catch(e) {} }, quarterNote * 1000 + 100);
  }

  btn.addEventListener('touchend', e => { e.preventDefault(); stopSweep(); }, { passive: false });
  btn.addEventListener('touchcancel', stopSweep);
  btn.addEventListener('mousedown', startSweep);
  btn.addEventListener('mouseup', stopSweep);
  btn.addEventListener('mouseleave', stopSweep);

  // Drag from SWEEP onto BEAT or RAND to trigger them simultaneously
  btn.addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return;

      });
      restoreState(_recallSnap);
      flashBtnBlue('scratchBtn');
window._reelReversePending = true;
    }
  };

  btn.addEventListener('click', doRecall);
  btn.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); doRecall(); }, { passive: false });
})();

// Key display tap — cycle through notes and scales
(function() {
  const kd = document.getElementById('keyDisplay');
  if (!kd) return;
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const scaleNames = Object.keys(SCALES);
  let noteIdx = 9; // A
  let scaleIdx = 0;

  function applyKey() {
    // Set globalScaleRoot from chosen note (using A4=440 as reference)
    const semis = noteIdx - 9; // relative to A
    globalScaleRoot = 440 * Math.pow(2, semis / 12) / 2; // one octave below A4
    currentScaleName = scaleNames[scaleIdx];
    PENTA_MINOR = SCALES[currentScaleName];
    // Rebuild all tonal track scales
    for (let tr = 0; tr < NUM_TRACKS; tr++) {
      if (TONAL_KEYS.has(trackInstruments[tr])) {
        const root = transposeRootToRange(globalScaleRoot, getRangeRoots(trackInstruments[tr]));
        trackBassScale[tr] = buildScaleFromRoot(root);
      }
    }
    const kd2 = document.getElementById('keyDisplay');
    if (kd2) kd2.textContent = (getKeyName() || '').replace(/-/g, ' ');
  }

  // Single tap = next note, double tap = next scale
  let lastTap = 0;
  kd.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
  kd.addEventListener('touchend', e => {
    e.preventDefault();
    const now = Date.now();
    if (now - lastTap < 350) {
      scaleIdx = (scaleIdx + 1) % scaleNames.length;
    } else {
      noteIdx = (noteIdx + 1) % NOTE_NAMES.length;
    }
    lastTap = now;
    applyKey();
  }, { passive: false });
  kd.addEventListener('click', () => {
    noteIdx = (noteIdx + 1) % NOTE_NAMES.length;
    applyKey();
  });
})();


// ── Tape hiss — toggled by tapping either reel ──
let _hissNode = null, _hissGain = null, _hissOn = false;

function startHiss() {
  if (!ctx || _hissNode) return;
  const sr = ctx.sampleRate;

  // ── Hiss: shaped white noise (pink-ish, high shelf) ──
  const hissBuf = ctx.createBuffer(2, sr * 4, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = hissBuf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      // Paul Kellet pink noise approximation
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  }
  _hissNode = ctx.createBufferSource(); _hissNode.buffer = hissBuf; _hissNode.loop = true;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000;
  const peak = ctx.createBiquadFilter(); peak.type = 'peaking';
  peak.frequency.value = 6000; peak.Q.value = 0.8; peak.gain.value = 6;
  _hissGain = ctx.createGain(); _hissGain.gain.value = 0.0032;
  _hissNode.connect(hp); hp.connect(peak); peak.connect(_hissGain);

  // ── Crackle: sparse random impulses ──
  const crackleLen = sr * 8;
  const crackBuf = ctx.createBuffer(2, crackleLen, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = crackBuf.getChannelData(ch);
    for (let i = 0; i < crackleLen; i++) {
      // Sparse spikes — approx 40 per second
      d[i] = Math.random() < (40 / sr) ? (Math.random() * 2 - 1) * (Math.random() < 0.3 ? 1 : 0.3) : 0;
    }
  }
  const crackNode = ctx.createBufferSource(); crackNode.buffer = crackBuf; crackNode.loop = true;
  const crackLP = ctx.createBiquadFilter(); crackLP.type = 'lowpass'; crackLP.frequency.value = 8000;
  const crackGain = ctx.createGain(); crackGain.gain.value = 0.0107;
  crackNode.connect(crackLP); crackLP.connect(crackGain);

  // ── Rumble: very low frequency wobble ──
  const rumble = ctx.createOscillator(); rumble.type = 'sine'; rumble.frequency.value = 30;
  const rumbleLFO = ctx.createOscillator(); rumbleLFO.type = 'sine'; rumbleLFO.frequency.value = 0.3;
  const rumbleLFOGain = ctx.createGain(); rumbleLFOGain.gain.value = 5;
  rumbleLFO.connect(rumbleLFOGain); rumbleLFOGain.connect(rumble.frequency);
  const rumbleGain = ctx.createGain(); rumbleGain.gain.value = 0.0014;
  rumble.connect(rumbleGain);

  // Connect noise directly to destination (bypasses master limiter)
  // Use a separate gain that we modulate based on master output level
  const hissMix = ctx.createGain(); hissMix.gain.value = 1;
  _hissGain.connect(hissMix);
  crackGain.connect(hissMix);
  rumbleGain.connect(hissMix);
  hissMix.connect(ctx.destination);
  _hissNode._hissMix = hissMix;

  // Analyser to follow master output and duck hiss gain
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  masterGain.connect(analyser);
  const rmsBuffer = new Float32Array(analyser.frequencyBinCount);
  const _hissInterval = setInterval(() => {
    if (!_hissOn || !_hissMix) { clearInterval(_hissInterval); return; }
    analyser.getFloatTimeDomainData(rmsBuffer);
    let rms = 0;
    for (let i = 0; i < rmsBuffer.length; i++) rms += rmsBuffer[i] * rmsBuffer[i];
    rms = Math.sqrt(rms / rmsBuffer.length);
    // Scale hiss: loud signal (rms>0.1) ducks hiss to near zero
    const hissLevel = Math.max(0, 1 - rms * 8);
    hissMix.gain.setTargetAtTime(hissLevel, ctx.currentTime, 0.3);
  }, 80);
  _hissNode._hissInterval = _hissInterval;

  _hissNode.start(); crackNode.start();
  rumble.start(); rumbleLFO.start();

  // Store all nodes for cleanup
  _hissNode._extras = { crackNode, crackGain, rumble, rumbleLFO, rumbleGain };
}

let _compressOn = false;
function toggleHiss() {
  if (!ctx) { ctx && ctx.resume(); return; }
  ctx.resume();
  // Toggle hard compression on reels click
  _compressOn = !_compressOn;
  if (window.masterLimiter) {
    if (_compressOn) {
      window.masterLimiter.threshold.value = -20;
      window.masterLimiter.ratio.value = 20;
      window.masterLimiter.knee.value = 0;
      window.masterLimiter.attack.value = 0.001;
      window.masterLimiter.release.value = 0.05;
    } else {
      window.masterLimiter.threshold.value = -1;
      window.masterLimiter.ratio.value = 20;
      window.masterLimiter.knee.value = 0;
      window.masterLimiter.attack.value = 0.0003;
      window.masterLimiter.release.value = 0.1;
    }
  }
  document.querySelectorAll('.reel-wrap').forEach(r => r.classList.toggle('compress-on', _compressOn));

  // Also toggle hiss
  if (!_hissOn) {
    startHiss();
    _hissOn = true;
    document.querySelectorAll('.reel-wrap').forEach(r => r.classList.add('hiss-on'));
  } else {
    if (_hissGain && _hissNode) {
      _hissGain.gain.setTargetAtTime(0, ctx.currentTime, 0.1);
      const extras = _hissNode._extras || {};
      setTimeout(() => {
        try { _hissNode.stop(); } catch(e){}
        try { extras.crackNode && extras.crackNode.stop(); } catch(e){}
        try { extras.rumble && extras.rumble.stop(); } catch(e){}
        try { extras.rumbleLFO && extras.rumbleLFO.stop(); } catch(e){}
        if (extras._hissInterval) clearInterval(extras._hissInterval);
        if (extras.crackGain) { extras.crackGain.gain.value = 0; }
        if (extras.rumbleGain) { extras.rumbleGain.gain.value = 0; }
        _hissNode = null; _hissGain = null;
      }, 500);
    }
    _hissOn = false;
    document.querySelectorAll('.reel-wrap').forEach(r => r.classList.remove('hiss-on'));
  }
}

// Wire reel taps
document.querySelectorAll('.reel-wrap').forEach(r => {
  r.addEventListener('click', toggleHiss);
  r.addEventListener('touchend', e => { e.preventDefault(); toggleHiss(); }, { passive: false });
});

</script>
