<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PERCOSET</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0e0e0e;
    --panel: #1a1a1a;
    --border: #333;
    --accent: #e8c84a;
    --accent2: #e8694a;
    --dim: #555;
    --text: #e0dfd8;
    --step-off: #2a2a2a;
    --step-on: #e8c84a;
    --step-soft: #e8c84a;
    --step-active: #fff8dc;
    --playhead: #e8694a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 28px 12px;
    user-select: none;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.6rem;
    letter-spacing: 5px;
    color: var(--accent);
    line-height: 1;
  }
  header .sub {
    font-size: 0.62rem;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Transport bar ── */
  .transport {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 2px;
    padding: 7px 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.1s;
  }
  .btn:hover  { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

  .bpm-wrap { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .bpm-label { font-size: 0.62rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
  .bpm-val   { font-size: 1.3rem; color: var(--accent); min-width: 44px; text-align: right; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100px; height: 2px;
    background: var(--border); outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    background: var(--accent); cursor: pointer;
    border-radius: 0;
  }
  .vol-wrap  { display: flex; align-items: center; gap: 8px; }
  .vol-label { font-size: 0.6rem; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; }

  /* ── Sounds menu button ── */
  .sounds-wrap { position: relative; }

  .sounds-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 1px;
    padding: 7px 12px;
    cursor: pointer;
    text-transform: uppercase;
    white-space: nowrap;
    transition: border-color 0.1s, color 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sounds-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sounds-btn.open  { border-color: var(--accent); color: var(--accent); }

  .sounds-btn .caret { font-size: 0.5rem; opacity: 0.6; }

  /* ── Two-level dropdown ── */
  .menu-l1 {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    min-width: 160px;
    z-index: 100;
  }
  .menu-l1.open { display: block; }

  .menu-track {
    position: relative;
  }

  .menu-track-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text);
    transition: background 0.08s, color 0.08s;
    gap: 12px;
  }
  .menu-track-label:hover { background: #222; color: var(--accent); }
  .menu-track-label .track-current { color: var(--dim); font-size: 0.6rem; }
  .menu-track-label .arrow { font-size: 0.5rem; opacity: 0.5; }

  /* L2 submenu */
  .menu-l2 {
    display: none;
    position: absolute;
    left: 100%;
    top: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    min-width: 130px;
    z-index: 101;
  }
  .menu-track:hover .menu-l2 { display: block; }

  .menu-sound {
    padding: 8px 14px;
    font-size: 0.65rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text);
    transition: background 0.08s, color 0.08s;
    white-space: nowrap;
  }
  .menu-sound:hover   { background: #222; color: var(--accent); }
  .menu-sound.active  { color: var(--accent); }

  /* ── Sequencer ── */
  .seq-wrap {
    width: 100%;
    max-width: 1100px;
  }

  /* columns: track-label(52px) | shift-btn(28px) | 16 steps(1fr each) | shift-btn(28px) */
  .step-numbers, .track {
    display: grid;
    grid-template-columns: 52px 28px repeat(16, 1fr) 28px;
    gap: 5px;
    align-items: center;
  }
  .step-numbers { margin-bottom: 3px; }

  .step-num {
    text-align: center;
    font-size: 0.55rem;
    color: var(--dim);
    letter-spacing: 1px;
  }
  .step-num.beat { color: var(--accent2); font-size: 0.6rem; }

  .sequencer {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* track label / mute button */
  .track-label {
    font-size: 0.58rem;
    letter-spacing: 1px;
    color: var(--dim);
    text-align: center;
    padding: 3px 4px;
    text-transform: uppercase;
    line-height: 1.3;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
  }
  .track-label span { display: block; color: var(--accent); font-size: 0.52rem; }
  .track-label:hover { border-color: #666; }
  .track-label.muted { background: #aa1111; border-color: #cc2222; color: #fff; }
  .track-label.muted span { color: #ffaaaa; }

  /* shift buttons */
  .shift-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    width: 28px;
    height: 28px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 0; line-height: 1;
    transition: color 0.1s, border-color 0.1s;
    flex-shrink: 0;
  }
  .shift-btn:hover  { border-color: var(--accent); color: var(--accent); }
  .shift-btn:active { background: var(--accent); color: #000; border-color: var(--accent); }

  .offset-label {
    font-size: 0.45rem;
    color: var(--accent2);
    text-align: center;
    display: block;
    line-height: 1;
    margin-top: 1px;
    min-height: 8px;
  }

  /* ── Steps ── */
  .step {
    aspect-ratio: 1;
    background: var(--step-off);
    border: 1px solid #3a3a3a;
    cursor: pointer;
    transition: background 0.05s, border-color 0.05s, opacity 0.05s;
    min-height: 28px;
  }

  /* state 1 = soft (40% vel) — 60% opacity */
  .step.soft {
    background: var(--step-soft);
    border-color: var(--step-soft);
    opacity: 0.45;
  }
  /* state 2 = accent (100% vel) — full opacity */
  .step.on {
    background: var(--step-on);
    border-color: var(--step-on);
    opacity: 1;
  }

  .step.playing {
    border-color: var(--playhead) !important;
    box-shadow: 0 0 8px var(--playhead);
  }
  .step.on.playing, .step.soft.playing {
    background: var(--step-active);
    border-color: var(--playhead) !important;
  }
  .step:hover:not(.on):not(.soft) {
    border-color: #666;
    background: #333;
  }

  /* beat group dividers every 4 */
  .step[data-step="4"], .step[data-step="8"], .step[data-step="12"] {
    margin-left: 2px;
  }

  /* ── Footer ── */
  .footer {
    width: 100%;
    max-width: 1100px;
    margin-top: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .ghost-btn {
    font-size: 0.62rem; letter-spacing: 2px; color: var(--dim);
    background: none; border: none; cursor: pointer;
    text-transform: uppercase; font-family: 'Share Tech Mono', monospace;
    transition: color 0.1s;
  }
  .ghost-btn:hover { color: var(--accent2); }
  .status { font-size: 0.58rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }
</style>
</head>
<body>

<header>
  <h1>PERCOSET</h1>
  <span class="sub">4-track / 16-step percussion sequencer</span>
</header>

<div class="transport">
  <button class="btn" id="playBtn" onclick="togglePlay()">PLAY</button>
  <button class="btn" onclick="clearAll()">CLEAR</button>

  <!-- Sounds two-level menu -->
  <div class="sounds-wrap" id="soundsWrap">
    <button class="sounds-btn" id="soundsBtn" onclick="toggleSoundsMenu()">
      <span id="soundsSummary">SOUNDS</span>
      <span class="caret">▼</span>
    </button>
    <div class="menu-l1" id="menuL1"></div>
  </div>

  <div class="bpm-wrap">
    <span class="bpm-label">BPM</span>
    <span class="bpm-val" id="bpmVal">110</span>
    <input type="range" id="bpmSlider" min="40" max="220" value="110"
      oninput="document.getElementById('bpmVal').textContent=this.value; bpm=+this.value">
  </div>
  <div class="vol-wrap">
    <span class="vol-label">VOL</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8"
      oninput="masterGain && masterGain.gain.setTargetAtTime(+this.value, ctx.currentTime, 0.01)">
  </div>
</div>

<div class="seq-wrap">
  <div class="step-numbers" id="stepNumbers"></div>
  <div class="sequencer" id="sequencer"></div>
</div>

<div class="footer">
  <button class="ghost-btn" onclick="randomize()">RANDOMIZE</button>
  <span class="status" id="status">STOPPED</span>
  <button class="ghost-btn" onclick="clearAll()">CLEAR ALL</button>
</div>

<script>
// ─── Audio ────────────────────────────────────────────────────────────────────
let ctx = null, masterGain = null;
function initCtx() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain();
  masterGain.gain.value = 0.8;
  masterGain.connect(ctx.destination);
}
function noise(dur) {
  const buf = ctx.createBuffer(1, ctx.sampleRate * dur, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

const synths = {
  tambourine(t, vel=1) {
    const g = ctx.createGain(); g.gain.value = vel; g.connect(masterGain);
    const src = ctx.createBufferSource(); src.buffer = noise(0.1);
    const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=7000;
    const env = ctx.createGain();
    env.gain.setValueAtTime(0.3,t); env.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    src.connect(hpf); hpf.connect(env); env.connect(g); src.start(t); src.stop(t+0.12);
    [8500,10200,12000,14500,17000].forEach((f,i)=>{
      const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=f;
      const eg=ctx.createGain(); const dl=i*0.007;
      eg.gain.setValueAtTime(0,t+dl); eg.gain.linearRampToValueAtTime(0.07,t+dl+0.002);
      eg.gain.exponentialRampToValueAtTime(0.001,t+dl+0.15);
      osc.connect(eg); eg.connect(g); osc.start(t+dl); osc.stop(t+dl+0.18);
    });
  },
  shaker(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    [0,0.05].forEach((dl,i)=>{
      const src=ctx.createBufferSource(); src.buffer=noise(0.1);
      const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=3500;
      const bpf=ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=4200+i*500; bpf.Q.value=2.5;
      const bpf2=ctx.createBiquadFilter(); bpf2.type='bandpass'; bpf2.frequency.value=3000; bpf2.Q.value=1.2;
      const env=ctx.createGain();
      env.gain.setValueAtTime(0.5,t+dl); env.gain.exponentialRampToValueAtTime(0.001,t+dl+0.09);
      src.connect(hpf); hpf.connect(bpf); bpf.connect(bpf2); bpf2.connect(env); env.connect(g);
      src.start(t+dl); src.stop(t+dl+0.1);
    });
  },
  cabasa(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    const src=ctx.createBufferSource(); src.buffer=noise(0.18);
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=3000;
    const bpf=ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=5000; bpf.Q.value=1.5;
    const env=ctx.createGain();
    env.gain.setValueAtTime(0.5,t); env.gain.setValueAtTime(0.4,t+0.04);
    env.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    src.connect(hpf); hpf.connect(bpf); bpf.connect(env); env.connect(g); src.start(t); src.stop(t+0.2);
    const osc=ctx.createOscillator(); osc.frequency.value=1200;
    const eg=ctx.createGain();
    eg.gain.setValueAtTime(0.15,t); eg.gain.exponentialRampToValueAtTime(0.001,t+0.015);
    osc.connect(eg); eg.connect(g); osc.start(t); osc.stop(t+0.02);
  },
  claves(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    [2500,2600].forEach(f=>{
      const osc=ctx.createOscillator(); osc.type='sine'; osc.frequency.value=f;
      const eg=ctx.createGain();
      eg.gain.setValueAtTime(0.4,t); eg.gain.exponentialRampToValueAtTime(0.001,t+0.055);
      osc.connect(eg); eg.connect(g); osc.start(t); osc.stop(t+0.06);
    });
    const src=ctx.createBufferSource(); src.buffer=noise(0.03);
    const bpf=ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=3500; bpf.Q.value=3;
    const env=ctx.createGain();
    env.gain.setValueAtTime(0.15,t); env.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    src.connect(bpf); bpf.connect(env); env.connect(g); src.start(t); src.stop(t+0.03);
  },
  handclaps(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    [0,0.01,0.022].forEach((dl,i)=>{
      const src=ctx.createBufferSource(); src.buffer=noise(0.08);
      const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=1000;
      const bpf=ctx.createBiquadFilter(); bpf.type='bandpass'; bpf.frequency.value=1200; bpf.Q.value=0.7;
      const env=ctx.createGain(); const vol=i<2?0.25:0.45;
      env.gain.setValueAtTime(vol,t+dl);
      env.gain.exponentialRampToValueAtTime(0.001,t+dl+(i<2?0.02:0.12));
      src.connect(hpf); hpf.connect(bpf); bpf.connect(env); env.connect(g);
      src.start(t+dl); src.stop(t+dl+0.13);
    });
  },
  bongoHi(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(520,t); osc.frequency.exponentialRampToValueAtTime(200,t+0.12);
    const eg=ctx.createGain();
    eg.gain.setValueAtTime(0.5,t); eg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
    osc.connect(eg); eg.connect(g); osc.start(t); osc.stop(t+0.2);
    const src=ctx.createBufferSource(); src.buffer=noise(0.02);
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=800;
    const env2=ctx.createGain();
    env2.gain.setValueAtTime(0.3,t); env2.gain.exponentialRampToValueAtTime(0.001,t+0.02);
    src.connect(hpf); hpf.connect(env2); env2.connect(g); src.start(t); src.stop(t+0.025);
  },
  bongoLo(t, vel=1) {
    const g=ctx.createGain(); g.gain.value=vel; g.connect(masterGain);
    const osc=ctx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(340,t); osc.frequency.exponentialRampToValueAtTime(120,t+0.18);
    const eg=ctx.createGain();
    eg.gain.setValueAtTime(0.6,t); eg.gain.exponentialRampToValueAtTime(0.001,t+0.25);
    osc.connect(eg); eg.connect(g); osc.start(t); osc.stop(t+0.28);
    const src=ctx.createBufferSource(); src.buffer=noise(0.025);
    const hpf=ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=500;
    const env2=ctx.createGain();
    env2.gain.setValueAtTime(0.3,t); env2.gain.exponentialRampToValueAtTime(0.001,t+0.025);
    src.connect(hpf); hpf.connect(env2); env2.connect(g); src.start(t); src.stop(t+0.03);
  }
};

const INSTRUMENT_NAMES = {
  tambourine:'TAMB', shaker:'SHAKR', cabasa:'CBSA',
  claves:'CLVS', handclaps:'CLAP', bongoHi:'BNGO HI', bongoLo:'BNGO LO'
};
const INSTRUMENT_KEYS = Object.keys(synths);

// ─── State ────────────────────────────────────────────────────────────────────
const NUM_TRACKS=6, NUM_STEPS=16;
const trackInstruments = ['tambourine','shaker','claves','handclaps','bongoHi','bongoLo'];
// 0=off, 1=soft(40%), 2=accent(100%)  — tap cycles 0→1→2→0
const grid = Array.from({length:NUM_TRACKS}, ()=>new Array(NUM_STEPS).fill(0));
const trackOffset = new Array(NUM_TRACKS).fill(0);
const trackMuted  = new Array(NUM_TRACKS).fill(false);

let bpm=110, playing=false;
let currentStep=-1, nextStepTime=0, scheduleInterval=null;
const LOOKAHEAD=0.1, SCHEDULE_MS=25;

function stepDuration(){ return 60/bpm/4; }

// ─── Scheduler ────────────────────────────────────────────────────────────────
function scheduler(){
  while(nextStepTime < ctx.currentTime + LOOKAHEAD){
    const step=(currentStep+1)%NUM_STEPS;
    currentStep=step;
    const t=nextStepTime;
    requestAnimationFrame(()=>updatePlayhead(step));
    for(let tr=0;tr<NUM_TRACKS;tr++){
      const gs=(step-trackOffset[tr]+NUM_STEPS)%NUM_STEPS;
      const val=grid[tr][gs];
      if(val>0 && !trackMuted[tr]){
        const vel=val===2?1.0:0.4;  // 2=accent(100%), 1=soft(40%)
        const inst=trackInstruments[tr];
        if(synths[inst]) synths[inst](t,vel);
      }
    }
    nextStepTime+=stepDuration();
  }
}

function updatePlayhead(step){
  document.querySelectorAll('.step').forEach(el=>el.classList.remove('playing'));
  for(let tr=0;tr<NUM_TRACKS;tr++){
    const el=document.querySelector(`[data-track="${tr}"][data-step="${step}"]`);
    if(el) el.classList.add('playing');
  }
}

// ─── Transport ────────────────────────────────────────────────────────────────
function togglePlay(){
  initCtx();
  if(ctx.state==='suspended') ctx.resume();
  playing=!playing;
  const btn=document.getElementById('playBtn');
  const status=document.getElementById('status');
  if(playing){
    currentStep=-1; nextStepTime=ctx.currentTime+0.05;
    scheduleInterval=setInterval(scheduler,SCHEDULE_MS);
    btn.classList.add('active'); btn.textContent='STOP'; status.textContent='PLAYING';
  } else {
    clearInterval(scheduleInterval);
    btn.classList.remove('active'); btn.textContent='PLAY'; status.textContent='STOPPED';
    document.querySelectorAll('.step').forEach(el=>el.classList.remove('playing'));
  }
}

// ─── Sounds menu ─────────────────────────────────────────────────────────────
function toggleSoundsMenu(){
  const btn=document.getElementById('soundsBtn');
  const menu=document.getElementById('menuL1');
  const open=menu.classList.toggle('open');
  btn.classList.toggle('open',open);
}

// Close menu on outside click
document.addEventListener('click', e=>{
  const wrap=document.getElementById('soundsWrap');
  if(!wrap.contains(e.target)){
    document.getElementById('menuL1').classList.remove('open');
    document.getElementById('soundsBtn').classList.remove('open');
  }
});

function buildSoundsMenu(){
  const menu=document.getElementById('menuL1');
  menu.innerHTML='';
  for(let tr=0;tr<NUM_TRACKS;tr++){
    const item=document.createElement('div');
    item.className='menu-track';

    const label=document.createElement('div');
    label.className='menu-track-label';
    label.innerHTML=`<span>TRK ${tr+1}</span><span class="track-current" id="trcur-${tr}">${INSTRUMENT_NAMES[trackInstruments[tr]]}</span><span class="arrow">▶</span>`;
    item.appendChild(label);

    const sub=document.createElement('div');
    sub.className='menu-l2';
    INSTRUMENT_KEYS.forEach(k=>{
      const opt=document.createElement('div');
      opt.className='menu-sound'+(trackInstruments[tr]===k?' active':'');
      opt.textContent=INSTRUMENT_NAMES[k];
      opt.addEventListener('click', e=>{
        e.stopPropagation();
        trackInstruments[tr]=k;
        // update all active markers in this submenu
        sub.querySelectorAll('.menu-sound').forEach(el=>el.classList.remove('active'));
        opt.classList.add('active');
        // update the summary label for this track
        document.getElementById(`trcur-${tr}`).textContent=INSTRUMENT_NAMES[k];
        updateTrackLabel(tr);
        // close menu
        document.getElementById('menuL1').classList.remove('open');
        document.getElementById('soundsBtn').classList.remove('open');
      });
      sub.appendChild(opt);
    });
    item.appendChild(sub);
    menu.appendChild(item);
  }
}

function updateTrackLabel(tr){
  const el=document.getElementById(`tlabel-${tr}`);
  if(!el) return;
  el.innerHTML=`${tr+1}<span>${INSTRUMENT_NAMES[trackInstruments[tr]]}</span>`;
  el.classList.toggle('muted', trackMuted[tr]);
}

// ─── Offset / shift ───────────────────────────────────────────────────────────
function shiftTrack(tr,dir){
  trackOffset[tr]=(trackOffset[tr]+dir+NUM_STEPS)%NUM_STEPS;
  redrawTrackCells(tr);
  updateOffsetLabel(tr);
}

function redrawTrackCells(tr){
  for(let s=0;s<NUM_STEPS;s++){
    const el=document.querySelector(`[data-track="${tr}"][data-step="${s}"]`);
    if(!el) continue;
    const gs=(s-trackOffset[tr]+NUM_STEPS)%NUM_STEPS;
    const val=grid[tr][gs];
    el.classList.toggle('on',   val===2);
    el.classList.toggle('soft', val===1);
  }
}

function updateOffsetLabel(tr){
  const lbl=document.getElementById(`offset-label-${tr}`);
  if(!lbl) return;
  const o=trackOffset[tr];
  lbl.textContent=o===0?'':(o>0?`+${o}`:`${o}`);
}

// ─── Grid UI ─────────────────────────────────────────────────────────────────
function buildUI(){
  // Step numbers row
  const numRow=document.getElementById('stepNumbers');
  numRow.innerHTML='';
  numRow.appendChild(document.createElement('div')); // track label spacer
  numRow.appendChild(document.createElement('div')); // shift-left spacer
  for(let s=0;s<NUM_STEPS;s++){
    const d=document.createElement('div');
    d.className='step-num'+(s%4===0?' beat':'');
    d.textContent=s%4===0?(s/4+1):'·';
    numRow.appendChild(d);
  }
  numRow.appendChild(document.createElement('div')); // shift-right spacer

  const seq=document.getElementById('sequencer');
  seq.innerHTML='';

  for(let tr=0;tr<NUM_TRACKS;tr++){
    const row=document.createElement('div');
    row.className='track';

    // track label / mute toggle
    const lbl=document.createElement('div');
    lbl.className='track-label';
    lbl.id=`tlabel-${tr}`;
    lbl.title='Click to mute/unmute';
    lbl.innerHTML=`${tr+1}<span>${INSTRUMENT_NAMES[trackInstruments[tr]]}</span>`;
    lbl.addEventListener('click',()=>{
      trackMuted[tr]=!trackMuted[tr];
      lbl.classList.toggle('muted', trackMuted[tr]);
    });
    row.appendChild(lbl);

    // left shift
    const lblWrap=document.createElement('div');
    lblWrap.style.cssText='display:flex;flex-direction:column;align-items:center;';
    const btnL=document.createElement('button');
    btnL.className='shift-btn'; btnL.innerHTML='&#9664;'; btnL.title='Shift left';
    const offLbl=document.createElement('span');
    offLbl.className='offset-label'; offLbl.id=`offset-label-${tr}`;
    btnL.addEventListener('click',()=>shiftTrack(tr,-1));
    lblWrap.appendChild(btnL); lblWrap.appendChild(offLbl);
    row.appendChild(lblWrap);

    // 16 steps
    for(let s=0;s<NUM_STEPS;s++){
      const cell=document.createElement('div');
      cell.className='step';
      cell.dataset.track=tr;
      cell.dataset.step=s;
      cell.addEventListener('click',()=>{
        const gs=(s-trackOffset[tr]+NUM_STEPS)%NUM_STEPS;
        grid[tr][gs]=(grid[tr][gs]+1)%3; // 0→1(soft)→2(accent)→0
        const val=grid[tr][gs];
        cell.classList.toggle('on',   val===2);
        cell.classList.toggle('soft', val===1);
        if(val>0){
          initCtx();
          if(ctx.state==='suspended') ctx.resume();
          const vel=val===2?1.0:0.4;
          const inst=trackInstruments[tr];
          if(synths[inst]) synths[inst](ctx.currentTime,vel);
        }
      });
      row.appendChild(cell);
    }

    // right shift
    const btnR=document.createElement('button');
    btnR.className='shift-btn'; btnR.innerHTML='&#9654;'; btnR.title='Shift right';
    btnR.addEventListener('click',()=>shiftTrack(tr,+1));
    row.appendChild(btnR);

    seq.appendChild(row);
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function clearAll(){
  for(let tr=0;tr<NUM_TRACKS;tr++){
    grid[tr].fill(0); trackOffset[tr]=0;
    redrawTrackCells(tr); updateOffsetLabel(tr);
  }
}

function randomize(){
  for(let tr=0;tr<NUM_TRACKS;tr++){
    for(let s=0;s<NUM_STEPS;s++){
      const r=Math.random();
      grid[tr][s]=r<0.15?2:r<0.28?1:0;
    }
    redrawTrackCells(tr);
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
buildUI();
buildSoundsMenu();
</script>
</body>
</html>
