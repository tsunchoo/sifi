<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SI-FI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
:root {
  --bg: #f5f0e8; --panel: #ede8df; --border: #b0a898;
  --text: #1e1e1e; --dim: #999; --soft: #666;
  --playhead: #ff2200; --muted-bg: #ff2200;
  --slot-saved: #f17d21; --slot-loaded: #f17d21;
  --vol-fill: #f17d21;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-y: auto; overflow-x: hidden; min-height: 100svh; }
button, .step-cell, .track-header-btn, .vol-mute-col, .fx-btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100svh; overflow-y: auto; display: flex; flex-direction: column; align-items: center;
  padding: 16px 4px 16px 4px; user-select: none; -webkit-user-select: none; box-sizing: border-box;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  opacity: 0.16;
}
body > * { position: relative; z-index: 1; }
header {
  width: 100%; max-width: 960px; display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 6px;
  margin-bottom: 5px; padding-bottom: 5px; margin-left: 16px;
}
header h1 { font-family: 'DM Sans', sans-serif; font-size: 1.4rem; letter-spacing: 4px; margin: 0; }
header .sub { font-size: 0.44rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
.tape-reels { display: flex; gap: 78px; align-items: center; margin-right: 38px; margin-left: 30px; }
.reel-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.reel { width: 42px; height: 42px; display: block; transition: filter 0.3s; filter: brightness(0) invert(0.33); }
.reel-wrap.spinning .reel { filter: brightness(0); }
.reel-wrap { position: relative; display: inline-block; }
.reel-wrap.recording .reel { filter: brightness(0) saturate(100%) invert(16%) sepia(90%) saturate(7000%) hue-rotate(355deg) brightness(100%) !important; }
.reel-wrap.hiss-on .reel { filter: brightness(0) sepia(1) saturate(3) hue-rotate(40deg) brightness(1.2); }
.reel-wrap.compress-on .reel { filter: brightness(0) sepia(1) saturate(6) hue-rotate(20deg) brightness(1.4); }
.reel-wrap.reel-beat-pulse { animation: reel-pulse 0.12s ease-out; }
@keyframes reel-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
@keyframes spin-reverse { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
.reel-wrap.spinning-reverse { animation: spin-reverse 1s linear infinite; transform-origin: center; }
.reel-wrap.spinning-reverse .reel { filter: brightness(0); }
.reel-wrap.spinning { animation: spin 2s linear infinite; transform-origin: center; }
.transport {
  width: 100%; max-width: 960px; display: flex; align-items: stretch;
  gap: 5px; margin-bottom: 6px;
}
.transport .btn {
  flex: 1; padding: 0 4px; flex-shrink: 1;
}
.btn {
  background: #555; border: none; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.5px; padding: 0 10px; cursor: pointer; text-transform: uppercase;
  transition: background 0.1s, color 0.1s; height: 54px; flex-shrink: 0; white-space: nowrap;
  touch-action: manipulation;
}
.btn.active { background: #111; color: #fff; }
#playBtn.playing { background: #111; }
#playBtn.playing img { animation: play-red-pulse 0.5s infinite alternate; }
@keyframes play-red-pulse { from { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(1.5); } to { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(0.5); } }
#playBtn.playing.btn-beat-pulse { animation: play-pulse 0.12s ease-out; }
@keyframes play-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
.btn:active { opacity: 0.7; }

#beatBtn.active { background: #111 !important; color: #ffe033 !important; }
#beatBtn.beat-pulse { animation: beat-red 0.5s infinite alternate; }
@keyframes beat-red { from { background: #111; color: #ffe033; } to { background: #333; color: #b8a000; } }
#saveBtn.rec-active { background: #111; }
#saveBtn.rec-active img { animation: rec-icon-pulse 0.5s infinite alternate; }
#saveBtn.rec-beat-pulse { animation: rec-pump 0.12s ease-out; }
@keyframes rec-pump { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
#saveBtn, #randBtn { touch-action: none; }
@keyframes rec-icon-pulse { from { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(1.5); } to { filter: brightness(0) invert(1) sepia(1) saturate(20) hue-rotate(330deg) brightness(0.5); } }
.btn-flash { background: var(--slot-saved) !important; color: #111 !important; border: none !important; transition: none !important; }
.btn-flash-blue { background: #0468f4 !important; color: #fff !important; border: none !important; transition: none !important; }
.rand-overlay-btn {
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  padding: 20px 0; background: #b0b0b0; border: none; color: var(--text);
  touch-action: manipulation;
}
.rand-overlay-btn:active { background: var(--text); color: var(--bg); }
#bpmSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; background: var(--text); border-radius: 0; cursor: pointer; }
#bpmSlider::-moz-range-thumb { width: 32px; height: 32px; background: var(--text); border-radius: 0; border: none; }
.bpm-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
.bpm-val { font-size: 0.9rem; font-weight: 700; min-width: 32px; text-align: right; flex-shrink: 0; }
input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 4px; background: #555; outline: none; border-radius: 0; cursor: pointer; }
input[type=range]::-webkit-slider-runnable-track { -webkit-appearance: none; background: #555; height: 4px; border-radius: 0; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 28px; height: 28px; background: #f17d21; cursor: pointer; border-radius: 0; margin-top: -12px; }
input[type=range]::-moz-range-track { background: #555; height: 4px; border-radius: 0; }
input[type=range]::-moz-range-thumb { width: 28px; height: 28px; background: #f17d21; cursor: pointer; border-radius: 0; border: none; }
.vol-wrap { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 960px; margin-top: 6px; padding: 6px 0; }
.master-vol-slider { flex: 1; }
.vol-section { width: 100%; max-width: 960px; margin-top: 12px; display: flex; align-items: center; gap: 6px; }
.vol-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text); font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.vol-label { font-size: 0.6rem; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; font-weight: 700; flex-shrink: 0; }

/* ── Per-track inline control row ── */
.track-ctrl-row {
  display: flex; align-items: stretch; gap: clamp(2px, 1vw, 5px);
  height: clamp(28px, 8vw, 32px);
}
.track-name-btn {
  font-size: clamp(0.52rem, 2.2vw, 0.72rem); font-weight: 700; letter-spacing: 0; text-transform: uppercase;
  cursor: pointer; background: #b0b0b0; color: var(--text);
  border: none; padding: 0 4px; white-space: nowrap; overflow: hidden;
  font-family: 'DM Sans', sans-serif; flex-shrink: 0; width: clamp(68px, 22vw, 96px);
  display: flex; align-items: center;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: background 0.06s, color 0.06s;
}
.track-name-btn.has-notes { background: var(--text); color: var(--bg); }
.track-name-btn.muted { background: var(--dim); color: var(--bg); opacity: 0.55; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; opacity: 1; transition: background 0.3s; }
.track-name-btn.shifting { background: var(--playhead) !important; color: #fff !important; animation: pulse 0.5s infinite alternate; }
.track-ctrl-icon-btn {
  width: clamp(24px, 6.5vw, 32px); flex-shrink: 0;
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; transition: background 0.1s;
}
.track-ctrl-icon-btn.on { background: var(--playhead); color: #fff; }
.track-ctrl-icon-btn.sweep-on { background: #555; color: #fff; }
.rand-btn.pulsing { color: #fff; animation: pulse 0.5s infinite alternate; }
.rand-btn.rand-pending { background: var(--playhead) !important; color: #fff !important; animation: rand-pending-pulse 0.2s infinite alternate; }
@keyframes rand-pending-pulse { from { background: var(--playhead); } to { background: #7a1000; } }
.rand-btn.rand-auto { background: #f71aff !important; color: #fff !important; }
.track-auto-rand { --track-color: #f71aff !important; }
#randBtn.pulsing { background: #0468f4; color: #fff; animation: rand-pulse 0.5s infinite alternate; }
@keyframes rand-pulse { from { background: #0468f4; color: #fff; } to { background: #0247a8; color: #fff; } }
#clearBtn.active { background: #0468f4 !important; color: #fff !important; }
#scratchBtn.active { background: #0468f4 !important; color: #fff !important; }
@keyframes pulse { from { background: var(--playhead); color: #fff; } to { background: #ff7755; color: #fff; } }
.track-ctrl-icon-btn.playing { opacity: 0.45; }
.shift-btn {
  width: 32px; flex-shrink: 0; background: #b0b0b0;
  border: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 0.72rem; font-weight: 700; transition: opacity 0.1s; padding: 0;
  touch-action: manipulation;
}
.shift-btn:active { opacity: 0.4; }
.track-vol-bar {
  flex: 1; position: relative; overflow: hidden;
  background: #555; border: none;
  cursor: ew-resize; touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.track-vol-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--vol-fill); pointer-events: none; transition: width 0.05s;
}
.track-vol-bar.muted { background: #ccc; }
.track-vol-bar.muted .track-vol-fill { background: transparent; }
.row-muted .track-ctrl-icon-btn,
.row-muted .shift-btn {
  background: #ccc !important; border: none !important; color: #888 !important;
  animation: none !important;
}



/* ── Sound picker overlay (grid) ── */
#soundPicker {
  display: none; position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.95);
}
#soundPicker.visible { display: flex; }
.sound-picker-inner {
  background: var(--bg); border: none;
  min-width: 320px; padding: 16px;
}
.sound-picker-title {
  padding: 0 0 12px 0; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 12px;
}
#soundPickerList {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.sound-option {
  padding: 16px 8px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; color: var(--text); text-align: center;
  border: none; background: #b0b0b0; font-family: 'DM Sans', sans-serif;
  transition: background 0.05s, color 0.05s; touch-action: manipulation;
  user-select: none;
}
.sound-option:hover { background: var(--text); color: var(--bg); }
.sound-option.active { background: #ffe033; color: #111; border: none; }
/* Instrument group colours */
.inst-kit   { background: #1a3a6b; color: #fff; }
.inst-perc  { background: #2a7a3a; color: #fff; }
.inst-tonal { background: #fd475d; color: #fff; }
.inst-kit:hover   { background: #0d1f40; color: #fff; }
.inst-perc:hover  { background: #1a5228; color: #fff; }
.inst-tonal:hover { background: #fd475d; color: #fff; }
.inst-kit.active, .inst-perc.active, .inst-tonal.active { background: #ffe033; color: #111; border: none; }
/* Track name buttons inherit group color */
.track-name-btn.inst-kit   { background: #1a3a6b; color: #fff; }
.track-name-btn.inst-perc  { background: #2a7a3a; color: #fff; }
.track-name-btn.inst-tonal { background: #fd475d; color: #fff; }
.track-name-btn.has-notes.inst-kit   { background: #1a3a6b; }
.track-name-btn.has-notes.inst-perc  { background: #2a7a3a; }
.track-name-btn.has-notes.inst-tonal { background: #fd475d; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; }

/* ── Vol overlay ── */
#volOverlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.92);
  cursor: ns-resize;
}
#volOverlay.visible { display: flex; }
.vol-overlay-inner {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 24px 36px; border: none; background: var(--bg);
  pointer-events: none;
}
.vol-overlay-label { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.vol-overlay-pct { font-size: 2.5rem; font-weight: 700; line-height: 1; min-width: 3ch; text-align: center; }
.vol-bar-track {
  width: clamp(50px, 14vw, 100px); height: 16px; background: var(--border); position: relative;
  border: none;
}
.vol-bar-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--text); transition: height 0.05s;
}

/* ── Sequencer grid (middle) ── */
.seq-wrap { width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 4px; display: flex; flex-direction: column; gap: clamp(4px, 2vw, 10px); }
.track-wrap { display: flex; flex-direction: column; gap: 4px; }
.track-row {
  display: flex; align-items: stretch;
}

.step-lane {
  flex: 1; display: flex; flex-direction: column;
  border: none;
  border-bottom: 3px solid #111;
  overflow: visible;
}
.step-lane-cells {
  display: grid; grid-template-columns: repeat(16, 1fr);
  overflow: visible;
}
.step-cell {
  aspect-ratio: 1;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  min-height: 0; box-sizing: border-box;
  overflow: visible;
}
/* teeth — positioned so bottom edge sits exactly on the lane border */
.step-cell::before {
  content: ''; position: absolute; bottom: -3px; left: -1px;
  width: 3px; background: var(--text); height: calc(30% + 3px); pointer-events: none;
  z-index: 1;
}
/* beat markers taller */
.step-cell[data-step="0"]::before,
.step-cell[data-step="4"]::before,
.step-cell[data-step="8"]::before,
.step-cell[data-step="12"]::before { height: calc(100% + 3px); }
/* step 0 uses the lane's left border */
/* step 0 marker now visible like all others */

.step-cell::after {
  content: '';
  position: absolute;
  background: transparent;
  pointer-events: none;
  transition: background 0.05s, opacity 0.05s;
  top: 0; bottom: 0; left: 1px; right: 1px;
}
.step-cell.soft::after { background: var(--track-color, var(--text)); opacity: 0.4; }
.step-cell.on::after   { background: var(--track-color, var(--text)); opacity: 1; }
.step-cell.playing { background: rgba(192,57,43,0.07); }
.step-cell.on.playing::after   { background: var(--playhead); opacity: 1; }
.step-cell.soft.playing::after { background: var(--playhead); opacity: 0.7; }
.step-cell.split32::after {
  background: repeating-linear-gradient(to right, var(--track-color, var(--text)) 0%, var(--track-color, var(--text)) 45%, transparent 45%, transparent 55%, var(--track-color, var(--text)) 55%, var(--track-color, var(--text)) 100%);
  opacity: 1;
}

/* ── Track lane label — now inside ctrl row, removed ── */

/* ── Footer ── */
.footer {
  width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 0;
  display: flex; justify-content: space-between; align-items: center;
  border-top: none; padding-top: 0; height: 0; overflow: hidden;
}
.ghost-btn {
  font-size: 0.55rem; letter-spacing: 1px; color: var(--dim);
  background: none; border: none; cursor: pointer; text-transform: uppercase;
  font-family: 'DM Sans', sans-serif; transition: color 0.1s; padding: 4px 0;
}
.ghost-btn:hover { color: var(--playhead); }
.status { font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }

/* ── Slot bar ── */
.slot-bar {
  width: 100%; max-width: 960px; display: grid;
  grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 2px;
}
.slot-btn {
  background: transparent; border: 2px solid #111; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0;
  padding: 16px 0; cursor: pointer; text-align: center;
  touch-action: manipulation; transition: background 0.1s;
}
.slot-btn.saved  { color: #ffe033 !important; border: none; }
.slot-btn.pending { animation: slot-pending 0.4s infinite alternate; color: #fff; }
@keyframes slot-pending { from { background: var(--slot-saved); } to { background: var(--bg); } }
.slot-btn.loaded { color: #ffe033 !important; border: none; }
.slot-btn.loaded.beat-pulse { animation: slot-pulse 0.12s ease-out; }
@keyframes slot-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
#playBtn.btn-beat-pulse, #beatBtn.btn-beat-pulse { animation: slot-pulse 0.12s ease-out; }
.slot-btn:active { opacity: 0.7; }

#loadingOverlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 999; cursor: pointer;
  border: none; width: 100%; font-family: 'DM Sans', sans-serif;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
#loadingOverlay h2 { font-family: 'DM Sans', sans-serif; font-size: 3.5rem; letter-spacing: 4px; color: #111; }
#loadingOverlay p { font-size: 1.1rem; color: #111; letter-spacing: 2px; text-transform: uppercase; font-weight: 700; }
#loadingOverlay.hidden { display: none; }

#cmapOverlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 50;
  background: #f5f0e8;
}
#cmapOverlay.active { display: block; }
#cmapSvg {
  width: 100%;
  height: 100%;

<!-- Settings window — appears on reel hold -->
<div id="settingsOverlay" style="display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.5);" id="settingsBg">
  <div id="settingsPanel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg);padding:24px;min-width:min(340px,90vw);display:flex;flex-direction:column;gap:16px;font-family:'DM Sans',sans-serif;">

    <!-- Song name on its own line, scale + tempo on the line below -->
    <div style="display:flex;flex-direction:column;gap:4px;padding-bottom:12px;border-bottom:1px solid #ddd;">
      <div style="font-size:1.1rem;font-weight:700;color:#111;letter-spacing:0.5px;text-transform:uppercase;" id="settingsNameDisplay"></div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div id="keyDisplay" style="font-size:0.85rem;font-weight:700;color:#555;cursor:pointer;user-select:none;-webkit-user-select:none;letter-spacing:1px;text-transform:uppercase;" title="tap to change key"></div>
        <div id="bpmVal" style="font-size:0.85rem;font-weight:700;color:#555;">110 BPM</div>
      </div>
    </div>

    <!-- Three sliders grouped together -->
    <div style="display:flex;flex-direction:column;gap:14px;">

      <div style="display:flex;flex-direction:column;gap:5px;">
        <div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);">VOLUME</div>
        <input type="range" id="masterVolBar" min="0" max="100" value="80" class="master-vol-slider" style="width:100%;">
      </div>

      <div style="display:flex;flex-direction:column;gap:5px;">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);">SWING</div>
          <div id="swingReadout" style="font-size:0.6rem;font-weight:700;color:#111;font-family:'DM Sans',sans-serif;">25ms</div>
        </div>
        <input type="range" id="swingBar" min="0" max="100" value="62" class="master-vol-slider" style="width:100%;">
      </div>

      <div style="display:flex;flex-direction:column;gap:5px;">
        <div style="font-size:0.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);">TEMPO</div>
        <input type="range" id="bpmSettingsSlider" min="40" max="200" value="110" class="master-vol-slider" style="width:100%;" oninput="bpm=+this.value; document.getElementById('bpmSlider').value=this.value; document.getElementById('bpmOverlayVal').textContent=this.value+' BPM'; syncSettingsPanel();">
      </div>

    </div>

    <button id="turboBtn" onclick="toggleTurbo()" style="width:100%;background:#555;color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:0.72rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:14px 0;cursor:pointer;margin-top:4px;">TURBO BOOST</button>
  </div>
</div>

<div id="saveOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(245,240,232,0.95);align-items:center;justify-content:center;touch-action:none;">
  <div style="display:flex;flex-direction:column;gap:12px;padding:24px;border:none;background:var(--bg);width:min(320px,88vw);">
    <div style="font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:'DM Sans',sans-serif;">EXPORT</div>
    <button class="rand-overlay-btn" id="saveSeparateBtn">EXPORT SLOTS</button>
    <button class="rand-overlay-btn" id="saveCombinedBtn">EXPORT LOOP</button>
  </div>
</div>

<!-- BPM overlay -->
<div id="bpmOverlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">
  <div id="bpmOverlayInner" style="background:var(--bg);border:none;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div style="display:flex;align-items:center;justify-content:center;height:65vh;width:64px;position:relative;">
      <input type="range" id="bpmSlider" min="40" max="200" value="110"
        style="position:absolute;width:65vh;height:3px;background:var(--text);outline:none;transform:rotate(-90deg);left:calc(50% - 32.5vh);top:calc(50% - 1.5px);-webkit-appearance:none;appearance:none;"
        oninput="bpm=+this.value; document.getElementById('bpmVal').textContent=this.value+' BPM'; document.getElementById('bpmOverlayVal').textContent=this.value+' BPM'">
    </div>
    <div id="bpmOverlayVal" style="font-size:1.2rem;font-weight:700;letter-spacing:2px;font-family:'DM Sans',sans-serif;">110 BPM</div>
  </div>
</div>

<div id="beatVolOverlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">
  <div style="background:var(--bg);border:none;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div style="display:flex;align-items:center;justify-content:center;height:65vh;width:64px;position:relative;">
      <input type="range" id="beatVolSlider" min="0" max="100" value="75"
        style="position:absolute;width:65vh;height:3px;background:var(--text);outline:none;transform:rotate(-90deg);left:calc(50% - 32.5vh);top:calc(50% - 1.5px);-webkit-appearance:none;appearance:none;"
        oninput="setBeatVol(+this.value/100); document.getElementById('beatVolVal').textContent=this.value+'%'">
    </div>
    <div id="beatVolVal" style="font-size:1.2rem;font-weight:700;letter-spacing:2px;font-family:'DM Sans',sans-serif;">75%</div>
  </div>
</div>

<script>
const INSTRUMENTS = {
  skick:  { name: 'KICK',        soft: null, accent: null, group: 'kit' },
  ssnare: { name: 'SNARE',       soft: null, accent: null, group: 'kit' },
  shihat: { name: 'HIHAT',       soft: null, accent: null, group: 'kit' },
  ride:   { name: 'RIDE',        soft: null, accent: null, group: 'kit'  },
  tamb:   { name: 'TAMB',        soft: 'Sounds/Tamb50.wav',   accent: 'Sounds/Tamb100.wav',   group: 'perc' },
  shak:   { name: 'SHAKER',      soft: 'Sounds/Shak50.wav',   accent: 'Sounds/Shak100.wav',   group: 'perc' },
  clap:   { name: 'HANDCLAP',    soft: 'Sounds/Clap50.wav',   accent: 'Sounds/Clap100.wav',   group: 'perc' },
  congHi: { name: 'CONGA HI',    soft: 'Sounds/CongHi50.wav', accent: 'Sounds/CongHi100.wav', group: 'perc' },
  congLo: { name: 'CONGA LO',    soft: 'Sounds/CongLo50.wav', accent: 'Sounds/CongLo100.wav', group: 'perc' },
  bongHi: { name: 'BONGO HI',    soft: 'Sounds/BongHi50.wav', accent: 'Sounds/BongHi100.wav', group: 'perc' },
  bongLo: { name: 'BONGO LO',    soft: 'Sounds/BongLo50.wav', accent: 'Sounds/BongLo100.wav', group: 'perc' },
  ngate:  { name: 'NOISE',       soft: null, accent: null, group: 'perc'  },
  guiro:  { name: 'GUIRO',       soft: 'Sounds/Guiro.wav', accent: 'Sounds/Guiro_Scratch.wav', group: 'perc'  },
  // cowb:   { name: 'COWBELL',     soft: 'Sounds/Cowb50.wav',   accent: 'Sounds/Cowb100.wav',   group: 'perc' },
  sbass:  { name: 'SYNTH BASS',  soft: null, accent: null, group: 'tonal' },
  sbass3: { name: 'JAMES BASS',  soft: null, accent: null, group: 'tonal' },
  sbass4: { name: 'PUNK BASS',   soft: null, accent: null, group: 'tonal' },
  stab:   { name: 'STAB',        soft: null, accent: null, group: 'tonal' },
  sstring:{ name: 'CYBER PAD',   soft: null, accent: null, group: 'tonal' },
  sleg:   { name: 'SOLAR PAD',   soft: null, accent: null, group: 'tonal' },
  sparkle:{ name: 'MUTED STR',   soft: null, accent: null, group: 'tonal' },
  rhodes: { name: 'THMB PIANO',       soft: null, accent: null, group: 'tonal' },
  rhodes2:{ name: 'RHODES',      soft: null, accent: null, group: 'tonal' },
  sflute: { name: 'SYN FLUTE',   soft: null, accent: null, group: 'tonal' },
  satk:   { name: 'TALK BOX',    soft: null, accent: null, group: 'tonal' },
  boog:   { name: 'BOOG',        soft: null, accent: null, group: 'tonal' },
  fflute: { name: 'GLASS BELL', soft: null, accent: null, group: 'tonal' },
  blunt:  { name: 'BLUNT',        soft: null, accent: null, group: 'tonal' },
};
const INSTRUMENT_KEYS = Object.keys(INSTRUMENTS);
let ctx = null, masterGain = null;
let masterVol = 0.8; // actual master output volume

function setMasterVol(v) {
  masterVol = Math.max(0, Math.min(1, v));
  if (masterGain && ctx) masterGain.gain.setTargetAtTime(masterVol, ctx.currentTime, 0.01);
  const slider = document.getElementById('masterVolBar');
  if (slider) slider.value = Math.round(masterVol * 100);
}

let swingVal = 0.625; // 0-1, independent of master vol — default ~25ms

function setSwingVal(v) {
  swingVal = Math.max(0, Math.min(1, v));
  const slider = document.getElementById('swingBar');
  if (slider) slider.value = Math.round(swingVal * 100);
  updateSwingReadout();
}

function syncSettingsPanel() {
  const bv = document.getElementById('bpmVal');
  if (bv) bv.textContent = bpm + ' BPM';
  const bs = document.getElementById('bpmSettingsSlider');
  if (bs) bs.value = bpm;
  const kd = document.getElementById('keyDisplay');
  if (kd) kd.textContent = (getKeyName() || '').replace(/-/g, ' ');
  updateSwingReadout();
}
function updateSwingReadout() {
  const readout = document.getElementById('swingReadout');
  if (!readout) return;
  const liveMs = Math.round(swingVal * 40);
  const committedMs = Math.round(_committedSwing * 40);
  readout.textContent = liveMs + 'ms';
  readout.style.opacity = (liveMs !== committedMs && playing) ? '0.45' : '1';
}
let _committedSwing = 0.625; // only updates at bar start to avoid mid-bar timing artifacts
function getSwingOffsetMs() {
  return _committedSwing * 40; // 0 at min, 40ms at max
}
function updateMasterVolCells() {
  const slider = document.getElementById('masterVolBar');
  if (slider) slider.value = Math.round(masterVol * 100);
  const swSlider = document.getElementById('swingBar');
  if (swSlider) swSlider.value = Math.round(swingVal * 100);
  updateSwingReadout();
}

// setupMasterVolBar called after buildUI at bottom of script
const buffers = {};

function playUiSound(name) {
  if (!ctx || !window._uiSoundBufs || !window._uiSoundBufs[name]) return;
  const src = ctx.createBufferSource(); src.buffer = window._uiSoundBufs[name];
  src.playbackRate.value = name === 'rewind' ? 1.5 : 1.0; // rewind plays faster
  const g = ctx.createGain(); g.gain.value = name === 'rewind' ? 0.625 : 0.7;
  src.connect(g); g.connect(masterGain);
  src.start();
}
function resumeCtx() { if (ctx && ctx.state !== 'running') ctx.resume(); }
document.addEventListener('touchstart', resumeCtx, false);
document.addEventListener('touchend',   resumeCtx, false);
document.addEventListener('mousedown',  resumeCtx, false);
function attachCtxStateWatch() {
  if (!ctx) return;
  ctx.addEventListener('statechange', () => { if (ctx.state === 'suspended') ctx.resume().catch(()=>{}); });
}
if (typeof navigator.mediaDevices !== 'undefined' && navigator.mediaDevices.addEventListener)
  navigator.mediaDevices.addEventListener('devicechange', () => { if (ctx) ctx.resume().catch(()=>{}); });

async function loadSamples() {
  const msg = document.getElementById('loadingMsg');
  let loaded = 0, total = INSTRUMENT_KEYS.length * 2;
  await Promise.all(INSTRUMENT_KEYS.map(async key => {
    const inst = INSTRUMENTS[key]; buffers[key] = {};
    for (const vel of ['soft','accent']) {
      if (!inst[vel]) { buffers[key][vel] = null; loaded++; continue; }
      try {
        const res = await fetch(inst[vel]);
        if (!res.ok) throw new Error('HTTP '+res.status);
        buffers[key][vel] = await ctx.decodeAudioData(await res.arrayBuffer());
      } catch(e) { console.warn('Failed:',inst[vel],e); buffers[key][vel] = null; }
      msg.textContent = `Loading... ${++loaded}/${total}`;
    }
  }));
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('status').textContent = '';
}

// ── FX: XY pad per track ─────────────────────────────────────────────────────

// x=0 clean, x=1 maximum waveshaper drive
const trackFxNodes = [];

function makeDistCurve(drive) {
  const n = 512, c = new Float32Array(n), k = drive * 400;
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    c[i] = k > 0 ? ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x)) : x;
  }
  return c;
}

function buildFxChain(trackGain) {
  const dryGain = ctx.createGain(); dryGain.gain.value = 1; dryGain.connect(trackGain);
  const fxSend  = ctx.createGain(); fxSend.gain.value = 0;
  const gateGain = ctx.createGain(); gateGain.gain.value = 0;
  const preGain = ctx.createGain(); preGain.gain.value = 0;
  const ws = ctx.createWaveShaper(); ws.oversample = 'none'; ws.curve = makeDistCurve(0.5);
  const postGain = ctx.createGain(); postGain.gain.value = 0.5;
  // crunch path: fxSend → preGain → ws → postGain → trackGain (no compressor = no latency)
  fxSend.connect(preGain); preGain.connect(ws); ws.connect(postGain); postGain.connect(trackGain);
  return { dryGain, fxSend, gateGain, preGain, postGain, ws };
}

function setFxActive(tr, fxVal) {
  if (!trackFxNodes[tr]) return;
  const on = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  const { dryGain, fxSend, preGain } = trackFxNodes[tr];
  const now = ctx.currentTime;
  dryGain.gain.cancelScheduledValues(now); dryGain.gain.setValueAtTime(on ? 0 : 1, now);
  fxSend.gain.cancelScheduledValues(now);  fxSend.gain.setValueAtTime(on ? 1 : 0, now);
  preGain.gain.cancelScheduledValues(now);  preGain.gain.setValueAtTime(on ? 0.12 : 0, now);
  // Compensate for crunch loudness in postGain (×0.5 when on = -6dB)
  // so fader position sounds the same with or without FX
  if (trackFxNodes[tr].postGain) {
    trackFxNodes[tr].postGain.gain.cancelScheduledValues(now);
    trackFxNodes[tr].postGain.gain.setValueAtTime(0.5, now); // no volume change on FX toggle
  }
  if (trackGainNodes[tr]) {
    const fxComp = trackVolume[tr];
    trackGainNodes[tr].gain.cancelScheduledValues(now);
    trackGainNodes[tr].gain.setValueAtTime(fxComp, now);
  }
}

function getSynthConnectNode(tr) {
  // Returns the node synth voices should connect to — routes through FX chain if active
  const fxVal = tr !== undefined ? trackFx[tr] : null;
  const fxOn = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  const baseNode = (tr !== undefined && trackFxNodes[tr])
    ? (fxOn ? trackFxNodes[tr].fxSend : trackFxNodes[tr].dryGain)
    : ((tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain);

  return baseNode;
}

function playBuffer(key, isAccent, time, tr, stepIdx) {
  if (key === 'skick')  { playSynthKick(isAccent, time, tr); return; }
  if (key === 'ssnare') { playSynthSnare(isAccent, time, tr); return; }
  if (key === 'shihat') { playSynthHihat(isAccent, time, tr); return; }
  if (key === 'sbass')   { return; } // handled in scheduler with legato duration
  if (key === 'ngate')   { return; } // handled in scheduler
  if (key === 'sbass3')  { return; }
  if (key === 'sbass4')  { return; }
  if (key === 'stab')    { return; }
  if (key === 'sstring') { return; } // handled in scheduler
  if (key === 'sleg')    { return; } // handled in scheduler
  if (key === 'sparkle') { return; } // handled in scheduler
  if (key === 'rhodes')  { return; } // handled in scheduler
  if (key === 'rhodes2')  { return; }
  if (key === 'sflute')   { return; }
  if (key === 'satk')     { return; }
  if (key === 'boog')     { return; }
  if (key === 'fflute')   { return; }
  if (key === 'blunt')    { return; }
  const buf = buffers[key]?.[isAccent ? 'accent' : 'soft'];
  if (!buf) return;

  const src = ctx.createBufferSource(); src.buffer = buf;
  const instrumentGain = ctx.createGain();
  instrumentGain.gain.value = (key === 'shak') ? 0.25 : (key === 'clap') ? 0.177 : (key === 'tamb') ? 0.397 : (key === 'guiro') ? 0.178 : (key === 'ride') ? 0.225 : (key === 'congHi' || key === 'congLo' || key === 'bongHi' || key === 'bongLo') ? 0.355 : 0.5;

  const fxVal = trackFx[tr];
  const on = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  if (tr !== undefined && trackFxNodes[tr] && on) {
    src.connect(instrumentGain); instrumentGain.connect(trackFxNodes[tr].fxSend);
    // Always crunch path — waveshaper handles distortion via preGain/ws/postGain
  } else if (tr !== undefined && trackFxNodes[tr]) {
    src.connect(instrumentGain); instrumentGain.connect(trackFxNodes[tr].dryGain);
  } else {
    src.connect(instrumentGain); instrumentGain.connect((tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain);
  }
  src.start(time);
}


const NUM_TRACKS = 6, NUM_STEPS = 16, VOL_NODES_COUNT = 10;

const trackInstruments = ['shak','sleg','sparkle','sbass3','congHi','congLo'];
const grid        = Array.from({length: NUM_TRACKS}, () => new Array(NUM_STEPS).fill(0));
const trackOffset = new Array(NUM_TRACKS).fill(0);
const trackMuted  = new Array(NUM_TRACKS).fill(false);
const trackSweep  = new Array(NUM_TRACKS).fill(false); // L button toggle
const trackChop   = new Array(NUM_TRACKS).fill(false);
const trackVolume = [0.30, 0.30, 0.30, 0.30, 0.30, 0.30];
const trackFx = Array.from({length: NUM_TRACKS}, () => ({ x: 0, y: 0 }));
const trackFxMode = new Array(NUM_TRACKS).fill(0); // 0=CHOKE/SLAP, 1=CRUNCH/ENV
const trackGainNodes = [];
const trackEnvFilters = [];
let bpm = 110, playing = false, currentStep = -1, nextStepTime = 0, scheduleInterval = null;
const LOOKAHEAD = 0.1, SCHEDULE_MS = 25;
function stepDuration() { return 60 / bpm / 4; }

function scheduler() {
  while (nextStepTime < ctx.currentTime + LOOKAHEAD) {
    const step = (currentStep + 1) % NUM_STEPS; currentStep = step;
    // Swing: offbeat (odd) steps get delayed by up to 60ms based on master slider
    const swingMs = (step % 2 === 1) ? getSwingOffsetMs() : 0;
    const t = nextStepTime + (swingMs / 1000);
    // Fire pending auto-rand on downbeat
    if (step === 0) {
      _committedSwing = swingVal; // commit swing amount only at bar start
      requestAnimationFrame(updateSwingReadout);
      // Flip reels forward when recalled pattern starts playing
      if (window._reelReversePending) {
        window._reelReversePending = false;
        requestAnimationFrame(() => {
          document.querySelectorAll('.reel-wrap').forEach(r => {
            r.classList.remove('spinning-reverse');
            r.classList.add('spinning');
          });
        });
      }
      if (_autoRandPending) {
        _autoRandPending = false;
        _recallSnapB = snapshotState(); // save current as previous before change
        randAll(_autoRandMode); _autoRandMode = undefined;
        clearBtnBlueHeld('randBtn');
      }
    }
    // Apply pending slot swap before audio is scheduled so step 0 plays from the new pattern
    if ((step === 0 || step === 4 || step === 8 || step === 12) && _pendingSlot >= 0) {
      const pi = _pendingSlot; _pendingSlot = -1;
      const snap = slots[pi];
      const now = ctx.currentTime;
      // Brief master gain dip to mask FX node reconnection clicks
      if (masterGain) {
        masterGain.gain.setTargetAtTime(0, now, 0.008);
        masterGain.gain.setTargetAtTime(masterVol, now + 0.04, 0.012);
      }
      // Audio-critical state only — no DOM work here
      for (let tr = 0; tr < NUM_TRACKS; tr++) {
        grid[tr] = [...snap.grid[tr]];
        trackOffset[tr] = snap.trackOffset[tr];
        trackInstruments[tr] = snap.trackInstruments[tr];
        trackMuted[tr] = snap.trackMuted[tr];
        if (snap.trackBassScale?.[tr]) trackBassScale[tr] = [...snap.trackBassScale[tr]];
        else delete trackBassScale[tr];
        if (snap.trackVolume) {
          trackVolume[tr] = snap.trackVolume[tr];
          if (trackGainNodes[tr]) trackGainNodes[tr].gain.setTargetAtTime(trackVolume[tr], now + 0.04, 0.02);
        }
        if (snap.trackFx) { trackFx[tr] = snap.trackFx[tr] || {x:0,y:0}; setFxActive(tr, trackFx[tr]); }
        if (snap.trackFxMode) trackFxMode[tr] = snap.trackFxMode[tr] || 0;
        if (snap.trackSweep !== undefined) trackSweep[tr] = !!snap.trackSweep[tr];
        if (snap.trackChop)  trackChop[tr]  = snap.trackChop[tr]  || false;
        if (snap.trackRLevel) trackRLevel[tr] = snap.trackRLevel[tr] ?? 0;
        if (snap.trackAutoRand) {
          const isAuto = !!snap.trackAutoRand[tr];
          const lane = document.getElementById(`lane-${tr}`);
          const rb = document.getElementById(`randbtn-${tr}`);
          if (isAuto) {
            if (lane) lane.style.setProperty('--track-color', '#f71aff');
            if (rb) { rb.classList.add('rand-auto'); rb.textContent = 'A'; }
            if (!autoShiftStops[tr] && rb && rb._restartAuto) rb._restartAuto();
          } else {
            if (lane) lane.style.removeProperty('--track-color');
            if (rb) { rb.classList.remove('rand-auto'); rb.textContent = 'R'; }
            if (autoShiftStops[tr]) autoShiftStops[tr]();
            setTrackNameColor(tr, trackInstruments[tr]);
          }
        }
      }
      if (snap.bpm) bpm = snap.bpm;
      // masterVol is now swing — don't restore it from old slot saves to avoid surprise changes
      // if (snap.masterVol !== undefined) setMasterVol(snap.masterVol);
      if (snap.beatPlaying !== undefined) {
        beatPlaying = snap.beatPlaying;
        _beatPending = false;
      }
      activeSlot = pi;
      // Defer all DOM updates to next frame
      requestAnimationFrame(() => {
        for (let tr = 0; tr < NUM_TRACKS; tr++) {
          redrawTrackCells(tr);
          const tb = document.getElementById(`tbtn-${tr}`);
          if (tb) { tb.textContent = INSTRUMENTS[trackInstruments[tr]]?.name||(tr+1); tb.classList.toggle('muted', trackMuted[tr]); setTrackNameColor(tr, trackInstruments[tr]); }
          const sb = document.getElementById(`swpbtn-${tr}`);
          if (sb) { sb.textContent = 'L'; sb.classList.toggle('sweep-on', !!trackSweep[tr]); }
          const fb = document.getElementById(`fxbtn-${tr}`); if (fb) fb.classList.toggle('on', trackFx[tr].x > 0 || trackFx[tr].y > 0);
          const row = document.getElementById(`ctrlrow-${tr}`); if (row) row.classList.toggle('row-muted', trackMuted[tr]);
          const vb = document.getElementById(`vbar-${tr}`); if (vb) { vb.classList.toggle('muted', trackMuted[tr]); const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = Math.round(trackVolume[tr]*100)+'%'; }
        }
        document.getElementById('bpmSlider').value = bpm;
        syncSettingsPanel();
        const bb = document.getElementById('beatBtn');
        if (bb) bb.classList.toggle('active', beatPlaying);
        updateBeatPulse();
        // Restore species name and bar color
        if (snap.speciesName) { _currentSpecies = snap.speciesName; const nd = document.getElementById('nameDisplay'); if (nd) nd.textContent = _currentSpecies; }
        if (snap.barColor) {
          _currentBarColor = snap.barColor;
          const barEl = document.querySelector('#nameDisplay')?.parentElement;
          applyBarColor(_currentBarColor);
        }
        if (snap.currentScaleName) { currentScaleName = snap.currentScaleName; }
        const kd = document.getElementById('keyDisplay'); if (kd) kd.textContent = (getKeyName()||'').replace(/-/g,' ');
        updateSlotButtons();
      });
    }
    requestAnimationFrame(() => updatePlayhead(step));
    for (let tr = 0; tr < NUM_TRACKS; tr++) {
      if (trackMuted[tr]) continue;
      const gs = (step - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
      const rawVal = grid[tr][gs];
      const is32Split = rawVal === 3;
      const val = is32Split ? 2 : rawVal; // treat split as accent-level for the main hit
      if (val > 0) {
        const key = trackInstruments[tr];
        if (key === 'sbass' || key === 'sbass3' || key === 'sbass4' || key === 'stab' || key === 'sstring' || key === 'sleg' || key === 'sparkle' || key === 'rhodes' || key === 'rhodes2' || key === 'sflute' || key === 'satk' || key === 'boog' || key === 'fflute' || key === 'blunt') {
          const scale = trackBassScale[tr] || [110];
          const noteIdx = gs % scale.length;
          const freq = scale[noteIdx];
          let dur = stepDuration();
          if (!trackChop[tr]) {
            for (let ld = 1; ld < NUM_STEPS; ld++) {
              const ngs = (gs + ld) % NUM_STEPS;
              if (grid[tr][ngs] > 0) { dur = stepDuration() * ld; break; }
            }
          }
          // Sidechain duck on accent
          if (val === 2 && window._duckGain) {
            const dg = window._duckGain;
            const duckDur = stepDuration() * 0.9;
            dg.gain.cancelScheduledValues(t);
            dg.gain.setValueAtTime(1, t);
            dg.gain.linearRampToValueAtTime(0.63, t + 0.008); // -4dB
            dg.gain.setValueAtTime(0.63, t + duckDur * 0.5);
            dg.gain.linearRampToValueAtTime(1, t + duckDur);
          }
          const sfxOn = !!(trackFx[tr] && (trackFx[tr].x > 0 || trackFx[tr].y > 0));
          const sfxMode = trackFxMode[tr] || 0;
          // X axis: choke (mode 0) or crunch (mode 1, doesn't affect duration)
          if (sfxOn && sfxMode === 0 && trackFx[tr].x > 0) {
            dur = Math.max(0.01, dur * (1 - trackFx[tr].x) + 0.01 * trackFx[tr].x);
          }
          if (key === 'sbass')   playSynthBass(freq, dur, val === 2, t, tr);
          if (key === 'sbass3')  playMotownBass(freq, dur, val === 2, t, tr);
          if (key === 'sbass4')  playPlunkBass(freq, dur, val === 2, t, tr);
          if (key === 'stab')    playStab(freq, dur, val === 2, t, tr);
          if (key === 'sstring') playStringSynth(freq, dur, val === 2, t, tr);
          if (key === 'sleg')    playSynthLeg(freq, dur, val === 2, t, tr);
          if (key === 'sparkle') playSparkle(freq, dur, val === 2, t, tr);
          if (key === 'rhodes')  playRhodes(freq, dur, val === 2, t, tr);
          if (key === 'rhodes2') playRhodes2(freq, dur, val === 2, t, tr);
          if (key === 'sflute')  playSynthFlute(freq, dur, val === 2, t, tr);
          if (key === 'satk')    playSynthAttack(freq, dur, val === 2, t, tr);
          if (key === 'boog')    playBoog(freq, dur, val === 2, t, tr);
          if (key === 'fflute')  playGlassBell(freq, dur, val === 2, t, tr);
          if (key === 'blunt')   playBlunt(freq, dur, val === 2, t, tr);
          // E: filter envelope — bright open, sweep closed over note duration
          if (trackChop[tr] && trackEnvFilters[tr]) {
            const ef = trackEnvFilters[tr];
            const peakFreq = val === 2 ? 12000 : 7000;
            const closeFreq = Math.max(freq * 1.2, 120);
            const sweepDur = Math.min(dur * 0.85, stepDuration() * 2.5);
            ef.frequency.cancelScheduledValues(t);
            ef.frequency.setValueAtTime(peakFreq, t);
            ef.frequency.exponentialRampToValueAtTime(closeFreq, t + sweepDur);
            ef.frequency.setValueAtTime(22050, t + sweepDur + 0.01); // reopen instantly after
          }

        } else if (key === 'ride') {
          playRide(val === 2, t, tr);
        } else if (key === 'ngate') {
          // Noise gate triggered by its own grid notes
          triggerNoiseGate(tr, val === 2, t);
        } else {
          playBuffer(key, val === 2, t, tr, step);
          // If any other track has ngate, trigger it from this hit
          for (let ng = 0; ng < NUM_TRACKS; ng++) {
            if (ng !== tr && !trackMuted[ng] && trackInstruments[ng] === 'ngate') {
              triggerNoiseGate(ng, val === 2, t);
            }
          }
        }
        // 32nd-note split: fire a second quick hit half a 16th later
        if (is32Split) {
          const t2 = t + stepDuration() * 0.5;
          if (key === 'ride') {
            playRide(false, t2, tr);
          } else if (key === 'ngate') {
            triggerNoiseGate(tr, false, t2);
          } else if (TONAL_KEYS.has(key)) {
            const scale2 = trackBassScale[tr] || [110];
            const noteIdx2 = gs % scale2.length;
            const freq2 = scale2[noteIdx2];
            const dur2 = stepDuration() * 0.5;
            if (key === 'sbass')   playSynthBass(freq2, dur2, false, t2, tr);
            if (key === 'sbass3')  playMotownBass(freq2, dur2, false, t2, tr);
            if (key === 'sbass4')  playPlunkBass(freq2, dur2, false, t2, tr);
            if (key === 'stab')    playStab(freq2, dur2, false, t2, tr);
            if (key === 'sstring') playStringSynth(freq2, dur2, false, t2, tr);
            if (key === 'sleg')    playSynthLeg(freq2, dur2, false, t2, tr);
            if (key === 'sparkle') playSparkle(freq2, dur2, false, t2, tr);
            if (key === 'rhodes')  playRhodes(freq2, dur2, false, t2, tr);
            if (key === 'rhodes2') playRhodes2(freq2, dur2, false, t2, tr);
            if (key === 'sflute')  playSynthFlute(freq2, dur2, false, t2, tr);
            if (key === 'satk')    playSynthAttack(freq2, dur2, false, t2, tr);
            if (key === 'boog')    playBoog(freq2, dur2, false, t2, tr);
            if (key === 'fflute')  playGlassBell(freq2, dur2, false, t2, tr);
            if (key === 'blunt')   playBlunt(freq2, dur2, false, t2, tr);
          } else {
            playBuffer(key, false, t2, tr);
          }
        }
      }
    }
    // Metronome: fire on every beat when all tracks silent and beat not engaged
    if (step % 4 === 0 && !beatPlaying) {
      const allEmpty = grid.every(row => row.every(v => v === 0));
      if (allEmpty) playMetronome(t, step === 0);
    }
    // Beat: fire from main clock on downbeats only
    if (step % 8 === 0 || step % 8 === 4) {
      // Activate pending beat on next downbeat
      if (_beatPending) {
        beatPlaying = true; _beatPending = false;
        requestAnimationFrame(() => {
          const bb = document.getElementById('beatBtn');
          if (bb) bb.classList.add('active');
          updateBeatPulse();
        });
      }
      if (beatPlaying) {
        if (step === 0 || step === 8) {
          // Kick on beats 1 and 3
          playKick(t);
          if (window._duckGain) {
            const dg = window._duckGain.gain;
            dg.cancelScheduledValues(t); dg.setValueAtTime(1, t);
            dg.linearRampToValueAtTime(0.5, t + 0.005);
            dg.setTargetAtTime(1, t + 0.020, 0.08);
          }
        } else if (step === 4 || step === 12) {
          // Snare on beats 2 and 4
          playSnare(t);
        }
      }
    }
    nextStepTime += stepDuration();
  }
}

function updatePlayhead(step) {
  document.querySelectorAll('.step-cell').forEach(el => el.classList.remove('playing'));
    if (window._duckGain) { window._duckGain.gain.cancelScheduledValues(ctx.currentTime); window._duckGain.gain.setValueAtTime(1, ctx.currentTime); }
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    const el = document.querySelector(`[data-track="${tr}"][data-step="${step}"]`);
    if (el) el.classList.add('playing');
    const gs = (step - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
    const tbtn = document.getElementById(`tbtn-${tr}`);
    if (tbtn && grid[tr][gs] > 0 && !trackMuted[tr]) {
      tbtn.classList.add('playing');
      setTimeout(() => tbtn.classList.remove('playing'), 80);

    }
  }
  // Pulse active slot + transport buttons on every beat (every 4 steps)
  if (step % 4 === 0) {
    if (activeSlot >= 0) {
      const sb = document.getElementById(`slot-${activeSlot}`);
      if (sb) { sb.classList.remove('beat-pulse'); void sb.offsetWidth; sb.classList.add('beat-pulse'); }
    }
    const pb = document.getElementById('playBtn');
    if (pb) { pb.classList.remove('btn-beat-pulse'); void pb.offsetWidth; pb.classList.add('btn-beat-pulse'); }
    if (beatPlaying) {
      const bb = document.getElementById('beatBtn');
      if (bb) { bb.classList.remove('btn-beat-pulse'); void bb.offsetWidth; bb.classList.add('btn-beat-pulse'); }
    }
    // Flash R buttons in auto mode on every beat
    document.querySelectorAll('.rand-btn.rand-auto').forEach(rb => {
      rb.classList.remove('rand-auto'); void rb.offsetWidth; rb.classList.add('rand-auto');
    });
    if (_recArmed) {
      const rb = document.getElementById('saveBtn');
      if (rb) { rb.classList.remove('rec-beat-pulse'); void rb.offsetWidth; rb.classList.add('rec-beat-pulse'); }
    }
    document.querySelectorAll('.reel-wrap').forEach(r => {
      r.classList.remove('reel-beat-pulse'); void r.offsetWidth; r.classList.add('reel-beat-pulse');
    });
  }
}

function updateBeatPulse() {
  const bb = document.getElementById('beatBtn');
  if (bb) bb.classList.toggle('beat-pulse', beatPlaying && playing);
}

function togglePlay() {
  if (ctx) ctx.resume();
  playUiSound(playing ? 'clickoff' : 'play');
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    currentStep = -1; nextStepTime = ctx.currentTime + 0.05;
    // Reset duck gain in case it got stuck
    if (window._duckGain) { window._duckGain.gain.cancelScheduledValues(ctx.currentTime); window._duckGain.gain.setValueAtTime(1, ctx.currentTime); }
    // Ensure all tonal tracks with notes have a scale
    for (let tr = 0; tr < NUM_TRACKS; tr++) {
      if (TONAL_KEYS.has(trackInstruments[tr]) && grid[tr].some(v => v > 0) && !trackBassScale[tr]) {
        const root = transposeRootToRange(globalScaleRoot || BASS_ROOTS[0], getRangeRoots(trackInstruments[tr]));
        trackBassScale[tr] = buildScaleFromRoot(root);
      }
    }

const _revBufCache = new WeakMap();
function reverseBuffer(buf, revLen) {
  if (!buf || !ctx) return null;
  // Cache by buffer object — same buffer always reversed the same way
  if (_revBufCache.has(buf)) return _revBufCache.get(buf);
  const numCh = buf.numberOfChannels, sr = buf.sampleRate;
  const totalSamples = buf.length;
  const revSamples = Math.min(Math.ceil(revLen * sr), totalSamples);
  const out = ctx.createBuffer(numCh, revSamples, sr);
  for (let ch = 0; ch < numCh; ch++) {
    const src = buf.getChannelData(ch);
    const dst = out.getChannelData(ch);
    for (let i = 0; i < revSamples; i++) dst[i] = src[revSamples - 1 - i];
  }
  _revBufCache.set(buf, out);
  return out;
}

  filt.frequency.exponentialRampToValueAtTime(Math.max(freq * 3.5, 20), time + slideTime);

  const ampEnv = ctx.createGain();
  ampEnv.gain.setValueAtTime(0, time);
  ampEnv.gain.linearRampToValueAtTime(vel, time + 0.008);

// Pentatonic minor intervals (semitones from root): 0,3,5,7,10
const SCALES = {
  'penta-min': [0,3,5,7,10],
  'penta-maj': [0,2,4,7,9],
  'major':     [0,2,4,5,7,9,11],
  'minor':     [0,2,3,5,7,8,10],
  'dorian':    [0,2,3,5,7,9,10],
  'mixolydian':[0,2,4,5,7,9,10],
  'blues':     [0,3,5,6,7,10],
};
let currentScaleName = 'penta-min';
let PENTA_MINOR = SCALES['penta-min']; // alias used by buildScaleFromRoot
// Bass roots: A1–A2 range
const BASS_ROOTS    = [55, 58, 62, 65, 69, 73];   // A1 B1 D2 F2 A2 C#2
const MELODY_ROOTS  = [220, 247, 262, 294, 330];   // A3 B3 C4 D4 E4
const MID_ROOTS     = [110, 123, 131, 147, 165];   // A2 B2 C3 D3 E3
const HIGH_ROOTS    = [440, 494, 523, 587, 659];   // A4 B4 C5 D5 E5
const SPARKLE_ROOTS = [82, 98, 110, 130, 147, 165];  // E2 G2 A2 C3 D3 E3

// Per-track pentatonic scale (set on each R press for tonal tracks)
const trackBassScale = {}; // tr -> [freq, ...]

// Global scale root — shared by all tonal tracks, cleared by CLEAR
let globalScaleRoot = null;
const TONAL_KEYS = new Set(['sbass','sbass3','sbass4','stab','sstring','sleg','sparkle','rhodes','rhodes2','sflute','satk','boog','fflute','blunt']);

function buildScaleFromRoot(root) {
  const scale = [];
  for (let oct = 0; oct < 2; oct++)
    PENTA_MINOR.forEach(s => scale.push(root * Math.pow(2, (s + oct * 12) / 12)));
  return scale;
}
function transposeRootToRange(root, roots) {
  const mid = roots[Math.floor(roots.length / 2)];

  while (r < mid / 1.5) r *= 2;
  while (r > mid * 1.5) r /= 2;

}
function getRangeRoots(key) {
  if (key === 'sparkle') return SPARKLE_ROOTS;
  if (key === 'sflute' || key === 'boog' || key === 'fflute') return HIGH_ROOTS;
  if (key === 'blunt') return MID_ROOTS;
  if (key === 'stab') return MID_ROOTS;
  if (key === 'sstring' || key === 'sleg' || key === 'rhodes' || key === 'rhodes2') return MELODY_ROOTS;
  return BASS_ROOTS;

function randomizeBassTrack(tr, level) {
  if (level === undefined) level = 0;
  const key = trackInstruments[tr];

  let root;
  if (globalScaleRoot !== null) {
    // Transpose existing global root into this instrument's range
    root = transposeRootToRange(globalScaleRoot, getRangeRoots(key));
  } else {
    // Pick a new root and set as global
    const roots = getRangeRoots(key);
    root = roots[Math.floor(Math.random() * roots.length)];
    globalScaleRoot = root;
    // Rebuild all other tonal tracks' scales to match
    for (let t = 0; t < NUM_TRACKS; t++) {
      if (t !== tr && TONAL_KEYS.has(trackInstruments[t]) && trackBassScale[t]) {
        const r2 = transposeRootToRange(root, getRangeRoots(trackInstruments[t]));
        trackBassScale[t] = buildScaleFromRoot(r2);
      }
    }
  }

  trackBassScale[tr] = buildScaleFromRoot(root);

  // Per-instrument note density rules
  const noteTables = {
    sstring: [[1,2,0.50],[1,3,0.70],[2,3,0.80]],   // Choir — very few, mostly accented
    sleg:    [[1,2,0.10],[2,3,0.20],[2,5,0.30]],   // Strings — fewest
    satk:    [[1,2,0.25],[2,3,0.40],[2,3,0.50]],   // Syn Attack — max 3
    rhodes:  [[2,3,0.15],[3,6,0.30],[5,8,0.45]],   // Piano — medium
    rhodes2: [[2,3,0.15],[3,6,0.30],[5,8,0.45]],   // Rhodes — medium
  };
  const levelTable = noteTables[key] || [
    [2, 5,  0.20],
    [5, 8,  0.40],
    [8, 13, 0.60],
  ];
  const [minN, maxN, accentRatio] = levelTable[level];
  const noteCount = minN + Math.floor(Math.random() * (maxN - minN + 1));
  placeNotes(tr, noteCount, accentRatio, level);

  // Choir: redistribute notes to beat positions for longer legato stretches
  if (key === 'sstring') {
    const beatSteps = [0, 4, 8, 12];
    const notes = [];
    for (let s = 0; s < NUM_STEPS; s++) if (grid[tr][s] > 0) notes.push(grid[tr][s]);
    grid[tr].fill(0);
    // Place on random beat steps
    const shuffledBeats = beatSteps.sort(() => Math.random() - 0.5);
    notes.forEach((val, i) => { if (shuffledBeats[i] !== undefined) grid[tr][shuffledBeats[i]] = val; });
    redrawTrackCells(tr);
  }

  // RAND-time only: chance to promote a soft hit to a 32nd-split for select instruments.
  // This is the ONLY place split-32 notes are ever assigned — never during live playback.
  const split32Keys = new Set(['shihat','sparkle','congHi','bongHi','rhodes','rhodes2']);
  if (split32Keys.has(key)) {
    let splitCount = 0;
    const maxSplits = (key === 'rhodes' || key === 'rhodes2') ? 3 : 99;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 1 && splitCount < maxSplits && Math.random() < 0.18) {
        grid[tr][s] = 3;
        splitCount++;
      }
    }
  }

  redrawTrackCells(tr); markModified();

// ── Strings: natural bowed string feel with strong attack and warm body ──
const _slegGlide = {};
// ── SOLAR PAD: slow lush pad — thick layered sines, very gentle shimmer, evolving filter ──
function playSynthLeg(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vol = isAccent ? 0.330 : 0.216;
  const tail = 2.4;

  // 7 detuned sine voices — thick, warm, chorus-like spread
  // Slight beating between voices creates slow natural shimmer without any LFO flutter
  const detunes = [-18, -11, -5, 0, 5, 11, 18];
  const masterEnv = ctx.createGain();
  masterEnv.gain.setValueAtTime(0, time);
  masterEnv.gain.linearRampToValueAtTime(vol, time + 0.55);   // very slow pad swell
  masterEnv.gain.setValueAtTime(vol, time + Math.max(durSec, 0.5));
  masterEnv.gain.exponentialRampToValueAtTime(0.0006, time + durSec + tail);

  detunes.forEach(det => {
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = freq; osc.detune.value = det;
    const vg = ctx.createGain(); vg.gain.value = 1 / detunes.length;
    osc.connect(vg); vg.connect(masterEnv);
    osc.start(time); osc.stop(time + durSec + tail);
  });

  // Upper octave layer — adds air and space, very quiet
  const octDets = [-8, 0, 8];
  octDets.forEach(det => {
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = freq * 2; osc.detune.value = det;
    const vg = ctx.createGain(); vg.gain.value = 0.08;
    osc.connect(vg); vg.connect(masterEnv);
    osc.start(time); osc.stop(time + durSec + tail);
  });

  // Sparkle: three very quiet high-ratio sines with long gentle decay — not chirpy, just shimmer
  [4.01, 6.0, 8.02].forEach((ratio, i) => {
    const sp = ctx.createOscillator(); sp.type = 'sine';
    sp.frequency.value = freq * ratio;
    const spEnv = ctx.createGain();
    spEnv.gain.setValueAtTime(0, time);
    spEnv.gain.linearRampToValueAtTime(vol * 0.04, time + 0.3 + i * 0.1);
    spEnv.gain.exponentialRampToValueAtTime(0.0001, time + durSec * 0.7 + i * 0.3);
    sp.connect(spEnv); spEnv.connect(masterEnv);
    sp.start(time); sp.stop(time + durSec + 0.5);
  });

  // Slowly evolving lowpass — opens gradually then breathes back down
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 0.8;
  lp.frequency.setValueAtTime(freq * 2.0, time);
  lp.frequency.linearRampToValueAtTime(freq * 6.0, time + durSec * 0.5);
  lp.frequency.linearRampToValueAtTime(freq * 3.0, time + durSec + tail);

  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 80; hp.Q.value = 0.5;

  // Lush reverb tail — generous wet mix for spaciousness
  const irLen = Math.floor(ctx.sampleRate * 1.1);
  const irBuf = ctx.createBuffer(2, irLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 1.2);
  }
  const rev = ctx.createConvolver(); rev.buffer = irBuf;
  const dryG = ctx.createGain(); dryG.gain.value = 0.5; dryG.connect(dest);
  const revG = ctx.createGain(); revG.gain.value = 0.6; revG.connect(dest);

  masterEnv.connect(lp); lp.connect(hp);
  hp.connect(dryG); hp.connect(rev); rev.connect(revG);
}

  thump.start(time);

  // String resonance body — short convolution-like noise burst
  const bodyLen = 0.04;
  const bodyBuf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * bodyLen), ctx.sampleRate);
  const bd = bodyBuf.getChannelData(0);
  for (let i = 0; i < bd.length; i++) bd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bd.length, 1.2);
  const body = ctx.createBufferSource(); body.buffer = bodyBuf;
  const bodyBP = ctx.createBiquadFilter(); bodyBP.type = 'bandpass';
  bodyBP.frequency.value = freq * 2; bodyBP.Q.value = 3;

const _noiseGateNodes = {};

// ── Guiro: scraped gourd — pitched ridge clicks with woody resonance ──
function initNoiseGate(tr) {
  if (!ctx) return;
  if (_noiseGateNodes[tr]) { try { _noiseGateNodes[tr].src.stop(); } catch(e) {} }
  const dest = (trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain;
  const bufLen = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
  const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.Q.value = 2.5; filt.frequency.value = 800;
  // Waveshaper for crunch
  const ws = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = (i * 2) / 256 - 1; curve[i] = Math.tanh(x * 3); }
  ws.curve = curve; ws.oversample = 'none';
  const gate = ctx.createGain(); gate.gain.value = 0;
  src.connect(filt); filt.connect(ws); ws.connect(gate); gate.connect(dest);
  src.start();

}

function triggerNoiseGate(tr, isAccent, time) {
  if (!ctx || !_noiseGateNodes[tr]) return;
  const { gate, filt } = _noiseGateNodes[tr];
  // Velocity variation: accent is louder and brighter with more randomness
  const velBase = isAccent ? 0.221 : 0.095;
  const vel = velBase * (0.75 + Math.random() * 0.5); // ±25% randomness
  const sweepStart = isAccent ? (2000 + Math.random() * 2000) : (600 + Math.random() * 800);
  const sweepEnd   = isAccent ? (100 + Math.random() * 200)  : (300 + Math.random() * 200);
  const dur = stepDuration() * (0.6 + Math.random() * 0.4);
  filt.frequency.cancelScheduledValues(time);
  filt.frequency.setValueAtTime(sweepStart, time);
  filt.frequency.exponentialRampToValueAtTime(sweepEnd, time + dur * 0.5);
  gate.gain.cancelScheduledValues(time);
  gate.gain.setValueAtTime(0, time);
  gate.gain.linearRampToValueAtTime(vel, time + 0.003);
  gate.gain.setValueAtTime(vel * 0.65, time + dur * 0.25);
  gate.gain.exponentialRampToValueAtTime(0.0001, time + dur);

// ── James Bass: dry finger-picked Motown feel ──
const _motownGlide = {};

  const saw1 = ctx.createOscillator(); saw1.type = 'sawtooth'; saw1.frequency.value = freq; saw1.detune.value = -3;
  const saw2 = ctx.createOscillator(); saw2.type = 'sawtooth'; saw2.frequency.value = freq; saw2.detune.value = 3;

function playSparkle(freq, durSec, isAccent, time, tr) {
  // Karplus-Strong style: noise burst into tuned comb gives dry woody dampened string tone
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 1.35 : 0.97;
  const period = 1 / freq;
  const bufLen = Math.ceil(ctx.sampleRate * period);

  // Seed: short noise burst
  const noiseBuf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) nd[i] = (Math.random() * 2 - 1);

  const src = ctx.createBufferSource();
  src.buffer = noiseBuf;
  src.loop = true;

  // Lowpass to kill brightness fast — gives the dampened/muted character
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.setValueAtTime(freq * 6, time);

  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.002);
  env.gain.exponentialRampToValueAtTime(0.001, time + decay);

  src.connect(lp); lp.connect(notch); notch.connect(env); env.connect(dest);
  src.start(time); src.stop(time + decay + 0.02);

  const cBP = ctx.createBiquadFilter(); cBP.type = 'bandpass'; cBP.frequency.value = 4000; cBP.Q.value = 3;
  const cEnv = ctx.createGain(); cEnv.gain.value = vel * 0.3;
  click.connect(cBP); cBP.connect(cEnv); cEnv.connect(dest);
  click.start(time);
}

// ── SAX: punchy honking saxophone with growl and breath ──
const _ffluteGlide = {};
function playForestFlute(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.111 : 0.072;

  const prevFreq = _ffluteGlide[tr] || freq;
  _ffluteGlide[tr] = freq;
  const glide = Math.min(durSec * 0.15, 0.04); // short glide — sax doesn't slide much

  // Core: sawtooth — sax is rich in harmonics
  const osc1 = ctx.createOscillator(); osc1.type = 'sawtooth';
  osc1.frequency.setValueAtTime(Math.max(prevFreq, 1), time);
  osc1.frequency.exponentialRampToValueAtTime(Math.max(freq, 1), time + glide);

  // Sub octave square for body/weight
  const osc2 = ctx.createOscillator(); osc2.type = 'square';
  osc2.frequency.setValueAtTime(Math.max(prevFreq * 0.5, 1), time);
  osc2.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.5, 1), time + glide);

  // Honk bandpass — mid-high peak gives the nasal sax character
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.setValueAtTime(freq * 3.5, time); // bright honk on attack
  bp.frequency.exponentialRampToValueAtTime(freq * 1.8, time + 0.04); // settle to body
  bp.Q.value = 4;

  // Second peak for growl — lower mid emphasis
  const bp2 = ctx.createBiquadFilter(); bp2.type = 'peaking';
  bp2.frequency.value = freq * 1.2; bp2.gain.value = 8; bp2.Q.value = 2;

  // Punch envelope — fast attack, slight swell
  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel * 1.3, time + 0.008); // punchy attack
  env.gain.exponentialRampToValueAtTime(vel, time + 0.04);   // slight drop
  env.gain.setValueAtTime(vel * 0.9, time + durSec * 0.7);
  env.gain.linearRampToValueAtTime(0, time + durSec + 0.05);

  const subEnv = ctx.createGain(); subEnv.gain.value = vel * 0.4;

  // Vibrato LFO — kicks in after attack
  const lfo = ctx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 5.5;
  const lfoGain = ctx.createGain();
  lfoGain.gain.setValueAtTime(0, time);
  lfoGain.gain.linearRampToValueAtTime(freq * 0.007, time + 0.08); // vibrato after attack
  lfo.connect(lfoGain); lfoGain.connect(osc1.frequency);

  // Breath noise for air character
  const noiseLen = Math.ceil(ctx.sampleRate * Math.min(durSec + 0.1, 0.5));
  const nBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = Math.random() * 2 - 1;
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const nhp = ctx.createBiquadFilter(); nhp.type = 'highpass'; nhp.frequency.value = freq * 2;
  const nEnv = ctx.createGain();
  nEnv.gain.setValueAtTime(vel * 0.06, time);
  nEnv.gain.exponentialRampToValueAtTime(0.001, time + 0.12);
  noise.connect(nhp); nhp.connect(nEnv); nEnv.connect(dest);

  osc1.connect(bp); bp.connect(bp2); bp2.connect(env); env.connect(dest);
  osc2.connect(subEnv); subEnv.connect(dest);

  lfo.start(time); lfo.stop(time + durSec + 0.1);
  osc1.start(time); osc1.stop(time + durSec + 0.1);
  osc2.start(time); osc2.stop(time + durSec + 0.1);
  noise.start(time);
}

// ── BLUNT: sci-fi patch with long tail ──
function playBlunt(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.080 : 0.054;
  const tail = 2.0;
  [-14, 14].forEach(det => {
    const osc = ctx.createOscillator(); osc.type = 'sawtooth';
    osc.frequency.value = freq; osc.detune.value = det;
    const env = ctx.createGain();
    env.gain.setValueAtTime(vel * 0.6, time);
    env.gain.linearRampToValueAtTime(vel, time + 0.02);
    env.gain.setValueAtTime(vel * 0.7, time + 0.1);
    env.gain.exponentialRampToValueAtTime(0.001, time + tail);
    osc.connect(env); env.connect(dest);
    osc.start(time); osc.stop(time + tail + 0.1);
  });
  const sub = ctx.createOscillator(); sub.type = 'sine';
  sub.frequency.value = freq * 0.5;
  const subEnv = ctx.createGain();
  subEnv.gain.setValueAtTime(vel * 0.4, time);
  subEnv.gain.exponentialRampToValueAtTime(0.001, time + tail * 0.6);
  sub.connect(subEnv); subEnv.connect(dest);
  sub.start(time); sub.stop(time + tail * 0.7);
  const shimmer = ctx.createOscillator(); shimmer.type = 'sine';
  shimmer.frequency.value = freq * 3.01;
  const shimEnv = ctx.createGain();
  shimEnv.gain.setValueAtTime(vel * 0.45, time);
  shimEnv.gain.exponentialRampToValueAtTime(0.001, time + tail * 0.7); // more sparkle
  shimmer.connect(shimEnv); shimEnv.connect(dest);
  shimmer.start(time); shimmer.stop(time + tail * 0.6);
}

// ── BOOG: fluid legato synth lead with strong portamento ──
const _boogGlide = {};
function playBoog(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.055 : 0.038;

  const prevFreq = _boogGlide[tr] || freq;
  _boogGlide[tr] = freq;

  // Long glide time — the defining characteristic
  const glide = Math.min(durSec * 0.6, 0.18);

  // Two oscillators: main sine + detuned sub for body
  const osc1 = ctx.createOscillator(); osc1.type = 'sine';
  osc1.frequency.setValueAtTime(Math.max(prevFreq, 1), time);
  osc1.frequency.exponentialRampToValueAtTime(Math.max(freq, 1), time + glide);

  const osc2 = ctx.createOscillator(); osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(Math.max(prevFreq * 0.5, 1), time);
  osc2.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.5, 1), time + glide);
  osc2.detune.value = 7;

  // Thin LP filter
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.Q.value = 2;
  lp.frequency.setValueAtTime(freq * 6, time);
  lp.frequency.exponentialRampToValueAtTime(freq * 2.5, time + 0.08);
  lp.frequency.exponentialRampToValueAtTime(freq * 2, time + durSec);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.025);
  env.gain.setValueAtTime(vel * 0.9, time + durSec - 0.04);
  env.gain.linearRampToValueAtTime(0, time + durSec + 0.08);

  const env2 = ctx.createGain(); env2.gain.value = vel * 0.35;

  osc1.connect(lp); lp.connect(env); env.connect(dest);
  osc2.connect(env2); env2.connect(dest);

  osc1.start(time); osc1.stop(time + durSec + 0.12);
  osc2.start(time); osc2.stop(time + durSec + 0.12);
}

// ── Synth Flute: 80s FM-style breathy flute ──
function playSynthFlute(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.070 : 0.045;

  // FM synthesis: carrier sine + modulator for breathiness
  const modFreq = freq * 2.01; // modulator slightly detuned
  const modDepth = freq * 1.8;

  const mod = ctx.createOscillator(); mod.type = 'sine'; mod.frequency.value = modFreq;
  const modGain = ctx.createGain();
  modGain.gain.setValueAtTime(0, time);
  modGain.gain.linearRampToValueAtTime(modDepth, time + 0.05);
  modGain.gain.setValueAtTime(modDepth * 0.7, time + durSec * 0.3);
  modGain.gain.linearRampToValueAtTime(0, time + durSec + 0.1);
  mod.connect(modGain);

  const carrier = ctx.createOscillator(); carrier.type = 'sine';
  carrier.frequency.value = freq;
  modGain.connect(carrier.frequency); // FM connection
  // Pitch wobble LFO
  const pitchLfo = ctx.createOscillator(); pitchLfo.type = 'sine';
  pitchLfo.frequency.value = 5.0 + Math.random() * 1.5;
  const pitchLfoGain = ctx.createGain(); pitchLfoGain.gain.value = freq * 0.008; // subtle ±0.8% wobble
  pitchLfo.connect(pitchLfoGain); pitchLfoGain.connect(carrier.frequency);

  // Breath noise layer
  const noiseLen = Math.ceil(ctx.sampleRate * Math.min(durSec + 0.2, 1.5));
  const nBuf = ctx.createBuffer(1, noiseLen, ctx.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < noiseLen; i++) nd[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource(); noise.buffer = nBuf;
  const nbp = ctx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = freq * 3; nbp.Q.value = 8;
  const nGain = ctx.createGain();
  nGain.gain.setValueAtTime(0, time);
  nGain.gain.linearRampToValueAtTime(vel * 0.15, time + 0.03);
  nGain.gain.linearRampToValueAtTime(vel * 0.08, time + durSec * 0.4);
  nGain.gain.linearRampToValueAtTime(0, time + durSec + 0.05);
  noise.connect(nbp); nbp.connect(nGain); nGain.connect(dest);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.04); // soft attack
  env.gain.setValueAtTime(vel * 0.85, time + durSec * 0.5);
  env.gain.linearRampToValueAtTime(0, time + durSec + 0.12);

  carrier.connect(env); env.connect(dest);
  pitchLfo.start(time); pitchLfo.stop(time + durSec + 0.2);
  mod.start(time); mod.stop(time + durSec + 0.2);
  carrier.start(time); carrier.stop(time + durSec + 0.2);
  noise.start(time);
}

// ── Synth Attack: sharp attack with long shimmer tail ──
// ── TALK BOX: sawtooth through sweeping vowel formants — "ooh-wah" without speech ──
function playSynthAttack(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.27 : 0.18;
  const tail = Math.max(durSec * 0.5, 0.25);

  // Bright sawtooth core — raw buzzy source, like the talkbox driver tone
  const osc = ctx.createOscillator(); osc.type = 'sawtooth';
  osc.frequency.value = freq;
  const osc2 = ctx.createOscillator(); osc2.type = 'sawtooth';
  osc2.frequency.value = freq; osc2.detune.value = 7; // slight thickening

  // Two vowel formants sweeping from "OO" to "AH" — the talkbox vowel sweep
  // OO: F1~300, F2~870 | AH: F1~700, F2~1100
  const f1 = ctx.createBiquadFilter(); f1.type = 'bandpass'; f1.Q.value = 12;
  f1.frequency.setValueAtTime(300, time);
  f1.frequency.linearRampToValueAtTime(700, time + durSec * 0.6);

  const f2 = ctx.createBiquadFilter(); f2.type = 'bandpass'; f2.Q.value = 14;
  f2.frequency.setValueAtTime(870, time);
  f2.frequency.linearRampToValueAtTime(1100, time + durSec * 0.6);

  const f1Gain = ctx.createGain(); f1Gain.gain.value = 1.0;
  const f2Gain = ctx.createGain(); f2Gain.gain.value = 0.6;

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vel, time + 0.012); // punchy attack
  env.gain.setValueAtTime(vel * 0.85, time + durSec * 0.7);
  env.gain.exponentialRampToValueAtTime(0.001, time + durSec + tail);

  const mix = ctx.createGain(); mix.gain.value = 1;
  osc.connect(mix); osc2.connect(mix);
  mix.connect(f1); f1.connect(f1Gain); f1Gain.connect(env);
  mix.connect(f2); f2.connect(f2Gain); f2Gain.connect(env);
  env.connect(dest);

  osc.start(time); osc.stop(time + durSec + tail + 0.1);
  osc2.start(time); osc2.stop(time + durSec + tail + 0.1);
}


// ── GLASS BELL: inharmonic FM bell/bowl tone — metallic, glassy, struck ──
function playGlassBell(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vel = isAccent ? 0.045 : 0.028;
  const tail = isAccent ? 2.6 : 1.8;

  // Inharmonic partials — classic bell ratios, not integer multiples
  const partials = [
    { ratio: 1.00, amp: 1.00, dec: 1.00 },
    { ratio: 2.76, amp: 0.55, dec: 0.55 },
    { ratio: 5.40, amp: 0.32, dec: 0.32 },
    { ratio: 8.93, amp: 0.18, dec: 0.20 },
    { ratio: 3.51, amp: 0.22, dec: 0.40 }, // slightly detuned partial for shimmer beating
  ];

  partials.forEach(p => {
    const carrier = ctx.createOscillator(); carrier.type = 'sine';
    carrier.frequency.value = freq * p.ratio;

    // FM modulator for metallic edge on the fundamental partial only
    let modGain = null, mod = null;
    if (p.ratio === 1.00) {
      mod = ctx.createOscillator(); mod.type = 'sine';
      mod.frequency.value = freq * 1.41; // inharmonic mod ratio for clangorous attack
      modGain = ctx.createGain();
      modGain.gain.setValueAtTime(freq * 1.2, time);
      modGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15); // FM decays fast — metallic strike only
      mod.connect(modGain); modGain.connect(carrier.frequency);
      mod.start(time); mod.stop(time + 0.2);
    }

    const env = ctx.createGain();
    const partialDec = tail * p.dec;
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(vel * p.amp, time + 0.004); // near-instant strike
    env.gain.exponentialRampToValueAtTime(0.0001, time + partialDec);

    carrier.connect(env); env.connect(dest);
    carrier.start(time); carrier.stop(time + partialDec + 0.05);
  });

  // Soft noise click for the strike transient
  const clickLen = 0.006;
  const clickBuf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * clickLen), ctx.sampleRate);
  const cd = clickBuf.getChannelData(0);
  for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / cd.length, 2);
  const click = ctx.createBufferSource(); click.buffer = clickBuf;
  const clickHP = ctx.createBiquadFilter(); clickHP.type = 'highpass'; clickHP.frequency.value = freq * 3;
  const clickEnv = ctx.createGain(); clickEnv.gain.value = vel * 0.5;
  click.connect(clickHP); clickHP.connect(clickEnv); clickEnv.connect(dest);
  click.start(time);
}

// Permanently mark the grid step as a 32nd-split when a runtime flam fires, and redraw the cell
// stepNow must be captured by the caller at trigger time, not read later — currentStep keeps advancing
function markStepAsSplit32(tr, stepNow) {
  if (stepNow == null || stepNow < 0) return;
  const gs = (stepNow - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
  if (grid[tr][gs] === 0) return; // only mark steps that actually have a note
  grid[tr][gs] = 3;
  const cell = document.querySelector(`[data-track="${tr}"][data-step="${stepNow}"]`);
  if (cell) { cell.classList.remove('on','soft'); cell.classList.add('split32'); }
  markModified();
}
