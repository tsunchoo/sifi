const CMAP_VIEW = {w: 3000, h: 3000};
let _cmapAnimFrame = null;
function showCelestialMap() {
  const overlay = document.getElementById('cmapOverlay');
  const svg = document.getElementById('cmapSvg');
  if (!overlay || !svg) return;
  if (_cmapAnimFrame) cancelAnimationFrame(_cmapAnimFrame);
  const name = (_currentSpecies || '').toLowerCase();
  const coord = CMAP_COORDS[name];
  overlay.classList.add('active');

  // Start fully zoomed out
  const startVB = { x: 0, y: 0, w: CMAP_VIEW.w, h: CMAP_VIEW.h };
  svg.setAttribute('viewBox', `${startVB.x} ${startVB.y} ${startVB.w} ${startVB.h}`);

  // Random starting rotation, unwinds to 0 as we zoom in
  const startRotation = Math.random() * 360;
  const rotator = null; // cmapRotator removed

  if (!coord) return; // no target — stay zoomed out

  const [tx, ty] = coord;

  // Phase 1: zoom from full map down to the name (150x150)
  const midW = 150, midH = 150;
  const midVB = {
    x: Math.max(0, Math.min(CMAP_VIEW.w - midW, tx - midW/2)),
    y: Math.max(0, Math.min(CMAP_VIEW.h - midH, ty - midH/2)),
    w: midW, h: midH
  };
  // Phase 2: continue zooming through the star center to near-zero
  const finalW = 6, finalH = 6;
  const finalVB = { x: tx - finalW/2, y: ty - finalH/2, w: finalW, h: finalH };

  const phase1Ms = 5000;   // time to reach name
  const phase2Ms = 2000;   // time to punch through
  const totalMs  = phase1Ms + phase2Ms;
  const startTime = performance.now();
  const easeOut  = t => 1 - Math.pow(1 - t, 3);
  const easeIn   = t => t * t * t;

  function animate(now) {
    const elapsed = now - startTime;
    if (elapsed < phase1Ms) {
      const t = elapsed / phase1Ms;
      const e = easeOut(t);
      const x = startVB.x + (midVB.x - startVB.x) * e;
      const y = startVB.y + (midVB.y - startVB.y) * e;

function concatAudioBuffers(buffers, sampleRate) {

  for (const buf of buffers) {

function audioBufferToWav(buffer, tempoHint) {
  const numCh = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
  const pcmBytes = len * numCh * 2;

  // bext chunk (858 bytes content)
  const bextContent = 858;
  const bextChunkTotal = 8 + bextContent;

  const totalBytes = 4 + 4 + 4 +
                     8 + 16 +
                     bextChunkTotal +
                     8 + pcmBytes;

  const ab = new ArrayBuffer(totalBytes);
  const view = new DataView(ab);
  let p = 0;

  function wStr(s, pad) {
    const n = pad || s.length;
    for (let i = 0; i < n; i++) view.setUint8(p + i, i < s.length ? s.charCodeAt(i) : 0);
    p += n;
  }
  function wU32(v) { view.setUint32(p, v, true); p += 4; }
  function wU16(v) { view.setUint16(p, v, true); p += 2; }
  function wZero(n) { p += n; } // ArrayBuffer already zeroed

  // RIFF header
  wStr('RIFF'); wU32(totalBytes - 8); wStr('WAVE');

  // fmt chunk
  wStr('fmt '); wU32(16); wU16(1); wU16(numCh);
  wU32(sr); wU32(sr * numCh * 2); wU16(numCh * 2); wU16(16);

  // bext chunk (602 bytes content)
  wStr('bext'); wU32(bextContent);
  wStr('BOOMBOX', 256);  // Description (256)
  wZero(32);                 // Originator (32)
  wZero(32);                 // OriginatorReference (32)
  wZero(10);                 // OriginationDate (10)
  wZero(8);                  // OriginationTime (8)
  wU32(0); wU32(0);          // TimeReference low+high (8)
  wU16(1);                   // Version (2)
  wZero(64);                 // UMID (64)
  wU16(0); wU16(0); wU16(0); wU16(0); wU16(0); // Loudness (10)
  wZero(180);                // Reserved (180)
  wStr(`BPM=${Math.round(tempoHint || 120)}\r\n`, 256); // CodingHistory (256)

  // Verify bext size
  // data chunk
  wStr('data'); wU32(pcmBytes);
  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < numCh; c++) {
      const s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7FFF, true); p += 2;
    }
  }
  return ab;
}

function randAll(mode) {
  _split32CycleCount = 0;
  mode = mode || 'all';

  Object.keys(autoShiftStops).forEach(tr => {
    autoShiftStops[tr]();
  });
  randAllLevel = (randAllLevel + 1) % 3;
  // Pick a fresh random scale and root for this randomize pass
  const scaleNames = Object.keys(SCALES);
  currentScaleName = scaleNames[Math.floor(Math.random() * scaleNames.length)];
  PENTA_MINOR = SCALES[currentScaleName];
  const allRoots = [...BASS_ROOTS, ...MELODY_ROOTS];
  globalScaleRoot = allRoots[Math.floor(Math.random() * allRoots.length)];
  const bassKeys = new Set(['sbass','sbass3','sbass4']);
  const soloPercKeys = new Set(['tamb','shak','ngate','clap','guiro']); // max one of these
  const soloLeadKeys = new Set(['sflute','boog','fflute']); // max one of these
  // Exclude instruments already locked on other tracks
  const lockedInstruments = new Set();
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    if (trackSweep[tr]) lockedInstruments.add(trackInstruments[tr]);
  }
  // Prefer non-locked instruments but allow locked ones if category is depleted
  const percKeysAll = Object.keys(INSTRUMENTS).filter(k => !TONAL_KEYS.has(k) && !(k === 'guiro' && Math.random() < 0.5));
  const tonalKeysAll = Object.keys(INSTRUMENTS).filter(k => TONAL_KEYS.has(k));
  const percKeys = percKeysAll.filter(k => !lockedInstruments.has(k)).length > 0
    ? percKeysAll.filter(k => !lockedInstruments.has(k))
    : percKeysAll;
  const tonalKeys = tonalKeysAll.filter(k => !lockedInstruments.has(k)).length > 0
    ? tonalKeysAll.filter(k => !lockedInstruments.has(k))
    : tonalKeysAll;
  const allKeys = Object.keys(INSTRUMENTS);

  function buildPool(keys) {
    const shuffled = [...keys].sort(() => Math.random() - 0.5);
    const result = []; let bassUsed = false; let soloPercUsed = false; let soloLeadUsed = false;
    for (const k of shuffled) {
      if (bassKeys.has(k)) { if (bassUsed) continue; bassUsed = true; }
      if (soloPercKeys.has(k)) { if (soloPercUsed) continue; soloPercUsed = true; }
      if (soloLeadKeys.has(k)) { if (soloLeadUsed) continue; soloLeadUsed = true; }
      result.push(k);
      if (result.length === NUM_TRACKS) break;
    }
    // Fill remaining from keys excluding solo perc if already used
    while (result.length < NUM_TRACKS) {
      const fill = keys.filter(k => !(soloPercUsed && soloPercKeys.has(k) && !result.includes(k)));
      result.push(fill[Math.floor(Math.random() * fill.length)] || keys[0]);
    }
    return result;
  }

  if (mode === 'perc') {
    pool = buildPool(percKeys);
  } else if (mode === 'tonal') {
    pool = buildPool(tonalKeys);
  } else {
    // Equal chance: pick 3 tonal and 3 perc, then shuffle
    // Fixed 50/50 split: always 3 tonal + 3 perc for full deck
    // Count how many of each are already locked in
    const lockedTonal = [...Array(NUM_TRACKS)].filter((_, tr) => trackSweep[tr] && TONAL_KEYS.has(trackInstruments[tr])).length;
    const lockedPerc = [...Array(NUM_TRACKS)].filter((_, tr) => trackSweep[tr] && !TONAL_KEYS.has(trackInstruments[tr])).length;
    // Remaining slots needed to fill out the 3/3 split
    const tonalSlots = Math.max(0, 3 - lockedTonal);
    const percSlots = Math.max(0, 3 - lockedPerc);

    // Build exact pool for unlocked slots
    // Never duplicate anything already in the current deck
    const currentDeck = new Set(trackInstruments);

    // Bass: max one across all tracks — skip if a locked track already has bass
    const bassAlreadyLocked = [...Array(NUM_TRACKS)].some((_, tr) => trackSweep[tr] && bassKeys.has(trackInstruments[tr]));
    let bassChoice = null;
    if (!bassAlreadyLocked && tonalSlots > 0) {
      const bassAvail = tonalKeys.filter(k => bassKeys.has(k) && !currentDeck.has(k));
      const allBassAvail = Object.keys(INSTRUMENTS).filter(k => bassKeys.has(k) && !currentDeck.has(k));
      const pool2 = bassAvail.length > 0 ? bassAvail : allBassAvail;
      if (pool2.length > 0) bassChoice = pool2[Math.floor(Math.random() * pool2.length)];
    }

    const nonBassAvail = tonalKeys.filter(k => !bassKeys.has(k) && !currentDeck.has(k));
    const nonBassShuffle = [...nonBassAvail].sort(() => Math.random() - 0.5).slice(0, Math.max(0, tonalSlots - (bassChoice ? 1 : 0)));
    const tPool = [...(bassChoice ? [bassChoice] : []), ...nonBassShuffle].slice(0, tonalSlots);

    const percAvail = percKeys.filter(k => !currentDeck.has(k));
    const pShuffle = [...percAvail].sort(() => Math.random() - 0.5);
    const pPool = percSlots > 0 ? buildPool(pShuffle).slice(0, percSlots) : [];

    // Deduplicate and enforce max one bass
    const seenInPool = new Set();
    let bassInPool = false;
    pool = [...tPool, ...pPool].filter(k => {
      if (seenInPool.has(k)) return false;
      if (bassKeys.has(k)) {
        if (bassInPool) return false; // already have a bass
        bassInPool = true;
      }
      seenInPool.add(k);
      return true;
    });
  }

  // Sort pool: hihat top → perc → tonal → bass → kick bottom
  pool.sort((a, b) => {
    const rank = k => {
      if (k === 'shihat') return 0;
      if (!TONAL_KEYS.has(k) && k !== 'skick') return 1;
      if (TONAL_KEYS.has(k) && !['sbass','sbass3','sbass4'].includes(k)) return 2;
      if (['sbass','sbass3','sbass4'].includes(k)) return 3;
      return 4; // skick
    };
    return rank(a) - rank(b);
  });

  // At highest density level, only fill 5 tracks
  const skipTrack = (level === 2) ? Math.floor(Math.random() * NUM_TRACKS) : -1;

  // Sort pool into fixed visual order: top=hihat, perc, tonal, bass, kick=bottom
  const kickKeys = new Set(['skick']);
  const bassKeys2 = new Set(['sbass','sbass3','sbass4']);
  const hihatKeys = new Set(['shihat']);
  const tonalNonBassKeys = new Set([...TONAL_KEYS].filter(k => !bassKeys2.has(k)));

  // Rank each instrument: 0=hihat, 1=perc, 2=tonal, 3=bass, 4=kick
  function trackRank(k) {
    if (hihatKeys.has(k)) return 0;
    if (kickKeys.has(k)) return 4;
    if (bassKeys2.has(k)) return 3;
    if (tonalNonBassKeys.has(k)) return 2;
    return 1; // perc
  }
  pool = [...pool].sort((a, b) => trackRank(a) - trackRank(b));

  // Assign sorted pool sequentially to unlocked tracks
  let poolIdx = 0;
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    if (trackSweep[tr]) continue; // L button locked — skip
    if (tr === skipTrack) {
      grid[tr].fill(0);
      delete trackBassScale[tr];
      redrawTrackCells(tr);
      poolIdx++;
      continue;
    }
    const k = pool[poolIdx++] || pool[pool.length - 1];
    if (trackInstruments[tr] === 'ngate' && k !== 'ngate' && typeof _noiseGateNodes !== 'undefined' && _noiseGateNodes[tr]) {
      try { _noiseGateNodes[tr].src.stop(); } catch(e) {} delete _noiseGateNodes[tr];
    }
    trackInstruments[tr] = k;
    if (k === 'ngate' && typeof initNoiseGate === 'function' && ctx) initNoiseGate(tr);
    const tb = document.getElementById(`tbtn-${tr}`); if (tb) tb.textContent = INSTRUMENTS[k]?.name || k;
    setTrackNameColor(tr, k);
    const sb = document.getElementById(`swpbtn-${tr}`);
    if (sb) { sb.textContent = 'L'; sb.classList.toggle('sweep-on', !!trackSweep[tr]); }
    trackRLevel[tr] = level;
    randomizeTrack(tr);
    trackVolume[tr] = 0.30;
    if (ctx && trackGainNodes[tr]) trackGainNodes[tr].gain.setValueAtTime(trackVolume[tr], ctx.currentTime);
    const vb = document.getElementById(`vbar-${tr}`); if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = Math.round(trackVolume[tr]*100)+'%'; }
    // Reset FX to off first — setFxActive will apply -6dB if FX gets turned on
    trackFx[tr] = { x: 0, y: 0 };
    if (ctx && trackFxNodes[tr]) setFxActive(tr, { x: 0, y: 0 });
    const fxBtn = document.getElementById(`fxbtn-${tr}`); if (fxBtn) fxBtn.classList.remove('on');
  }
  // Randomize FX for tonal instruments (25% chance, higher for synth/punk bass)
  // setFxActive handles both gain node and vol bar correctly
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    if (trackSweep[tr]) continue; // locked
    if (TONAL_KEYS.has(pool[tr])) {
      const isBass = (pool[tr] === 'sbass' || pool[tr] === 'sbass4');
      const fxOn = Math.random() < (isBass ? 0.6 : 0.25);
      const newFxVal = fxOn ? { x: 0.5, y: 0.5 } : { x: 0, y: 0 };
      trackFx[tr] = newFxVal;
      if (ctx) setFxActive(tr, newFxVal);
      else {
        // No ctx yet — just set vol bar
        const vb = document.getElementById(`vbar-${tr}`);
        if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = fxOn ? '25%' : '50%'; }
      }
      const fb = document.getElementById(`fxbtn-${tr}`);
      if (fb) fb.classList.toggle('on', fxOn);
    } else if (!trackSweep[tr]) {
      // Perc/non-tonal: FX already reset above, just update bar
      const vb = document.getElementById(`vbar-${tr}`);
      if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = '50%'; }
      if (trackGainNodes[tr] && ctx) trackGainNodes[tr].gain.setValueAtTime(0.5, ctx.currentTime);
    }
  }
  // Voice harmony: if >1 melody tonal track, shift 2nd+ up an octave + minor third
  const melodyKeys = new Set(['sstring','sleg','sparkle','rhodes','rhodes2','stab']);
  const melodyTracks = [];
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    if (melodyKeys.has(pool[tr])) melodyTracks.push(tr);
  }
  if (melodyTracks.length > 1) {
    const stringKeys = new Set(['sstring','sleg']);
    const minorThird = Math.pow(2, 3/12);
    for (let i = 1; i < melodyTracks.length; i++) {
      const tr = melodyTracks[i];
      const prev = melodyTracks[i - 1];
      if (trackBassScale[tr]) {
        if (stringKeys.has(pool[tr]) && stringKeys.has(pool[prev])) {
          // Two string instruments — set an octave apart
          trackBassScale[tr] = trackBassScale[tr].map(f => f * 2);
        } else {
          // Other melody instruments — voice a third higher
          trackBassScale[tr] = trackBassScale[tr].map(f => f * Math.pow(minorThird, i));
        }
      }
    }
  }

  _currentSpecies = getSpeciesName();
  _currentBarColor = BAR_COLORS[Math.floor(Math.random() * BAR_COLORS.length)];
  const barEl = document.querySelector('#nameDisplay').parentElement;
  if (barEl) { barEl.style.background = _currentBarColor; document.documentElement.style.setProperty('--bar-color', _currentBarColor); }
  // Update key/scale display
  const nd = document.getElementById('nameDisplay'); if (nd) nd.textContent = (_currentSpecies || '');
  const kd = document.getElementById('keyDisplay');
  if (kd) { const kn = getKeyName(); kd.textContent = (kn || '').replace(/-/g, ' '); }
  markModified();
}

// RAND button wiring
// On iOS, touchend fires during long-press before we can detect hold duration.
// So: tap = single randAll. Hold = user must tap again to stop auto-mode.
(function() {
  const btn = document.getElementById('randBtn');
  if (!btn) return;
  let autoRandInterval = null;

  const stopAuto = () => {
    if (autoRandInterval) {
      clearInterval(autoRandInterval); autoRandInterval = null;
      _autoRandPending = false;
      btn.classList.remove('pulsing');
    }
  };

  const startAuto = () => {
    if (autoRandInterval) { stopAuto(); return; } // second tap stops it
    btn.classList.add('pulsing');
    _autoRandPending = true; // fires on next step 0
    // Then re-trigger every 4 bars
    autoRandInterval = setInterval(() => { _autoRandPending = true; }, 4 * 4 * (60 / bpm) * 1000);
  };

  // Single tap = one rand. Double tap = start/stop auto mode.
  let lastTap = 0;
  const onTap = () => {
    const now = Date.now();
    if (now - lastTap < 400) {
      // Double tap — toggle auto mode
      startAuto();
    } else {
      // Single tap — one rand
      if (autoRandInterval) { stopAuto(); }
      else { setBtnBlueHeld('randBtn'); queueRand(); }
    }
    lastTap = now;
  };

  btn.addEventListener('touchstart', e => { e.preventDefault(); }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); onTap(); }, { passive: false });
  btn.addEventListener('click', onTap);
  btn.addEventListener('mouseup', () => { if (!ctx) initAudio(); else ctx.resume().catch(()=>{}); setBtnBlueHeld('randBtn'); queueRand(); setTimeout(() => clearBtnBlueHeld('randBtn'), 300); }); // drag-over
})();

const NUM_SLOTS = 6, slots = new Array(NUM_SLOTS).fill(null);
let activeSlot = -1;
function snapshotState() {
  return {
    grid: grid.map(r=>[...r]),
    trackOffset: [...trackOffset],
    trackInstruments: [...trackInstruments],
    trackMuted: [...trackMuted],
    trackVolume: [...trackVolume],
    trackFx: trackFx.map(f => f ? {...f} : {x:0,y:0}),
    trackFxMode: [...trackFxMode],
    trackSweep: [...trackSweep],
    trackChop: [...trackChop],
    trackRLevel: [...trackRLevel],
    trackBassScale: Object.fromEntries(Object.entries(trackBassScale).map(([k,v])=>[k,[...v]])),
    globalScaleRoot,
    currentScaleName,
    bpm, masterVol,
    speciesName: _currentSpecies,
    barColor: _currentBarColor,
    beatPlaying: beatPlaying,
    trackAutoRand: [...Array(NUM_TRACKS)].map((_, tr) => !!autoShiftStops[tr])
  };
}
function restoreState(snap) {

  if (snap.currentScaleName) { currentScaleName = snap.currentScaleName; PENTA_MINOR = SCALES[currentScaleName] || PENTA_MINOR; }
  for (let tr=0; tr<NUM_TRACKS; tr++) {
    grid[tr]=[...snap.grid[tr]]; trackOffset[tr]=snap.trackOffset[tr];
    const snapInst = snap.trackInstruments[tr];
    trackInstruments[tr] = INSTRUMENTS[snapInst] ? snapInst : Object.keys(INSTRUMENTS)[0];
    trackMuted[tr]=snap.trackMuted[tr];
    if (snap.trackRLevel) trackRLevel[tr] = snap.trackRLevel[tr] ?? 0;
    if (snap.trackBassScale?.[tr]) trackBassScale[tr] = [...snap.trackBassScale[tr]];
    else delete trackBassScale[tr];
    if (snap.trackVolume) { trackVolume[tr]=snap.trackVolume[tr]; if(trackGainNodes[tr]&&ctx) trackGainNodes[tr].gain.setTargetAtTime(trackVolume[tr],ctx.currentTime,0.01); }
    if (snap.trackFx) { trackFx[tr] = snap.trackFx[tr] || {x:0,y:0}; const fb=document.getElementById(`fxbtn-${tr}`); const on=trackFx[tr].x>0||trackFx[tr].y>0; if(fb){ fb.classList.toggle('on',on); } if(ctx) setFxActive(tr,trackFx[tr]); }
    if (snap.trackFxMode) { trackFxMode[tr] = snap.trackFxMode[tr] || 0; }
    if (snap.trackSweep) { trackSweep[tr] = snap.trackSweep[tr] || false; }
    if (snap.trackChop)  { trackChop[tr]  = snap.trackChop[tr]  || false; }
    const sb=document.getElementById(`swpbtn-${tr}`);
    if (sb) { sb.textContent = 'L'; sb.classList.toggle('sweep-on', !!trackSweep[tr]); }
    const tb=document.getElementById(`tbtn-${tr}`);
    if(tb) {

    const vb=document.getElementById(`vbar-${tr}`); if(vb) { vb.classList.toggle('muted', trackMuted[tr]); const f=vb.querySelector('.track-vol-fill'); if(f) f.style.width=Math.round(trackVolume[tr]*100)+'%'; }
    redrawTrackCells(tr);

  const kd = document.getElementById('keyDisplay'); if (kd) kd.textContent = (getKeyName()||''). replace(/-/g,' ');

  if (snap.trackAutoRand) {

      const lane = document.getElementById(`lane-${tr}`);

        if (rb) { rb.classList.add('rand-auto'); rb.textContent = 'A'; }

  }
}
function markModified() {
  // Any edit deactivates the active slot (turns it back to green)
  activeSlot = -1;
  updateSlotButtons();
}
let _pendingSlot = -1;
function slotPress(i) {
  if (slots[i] === null) {
    // Empty slot — save current state immediately
    slots[i] = snapshotState();
    activeSlot = i;
    _pendingSlot = -1;
    updateSlotButtons();
  } else if (!playing) {
    // Not playing — switch immediately
    _pendingSlot = -1;
    restoreState(slots[i]);
    activeSlot = i;
    updateSlotButtons();
  } else {
    // Playing — queue to next quarter note to avoid mid-note click/noise
    _pendingSlot = i;
    activeSlot = i;
    updateSlotButtons();
  }
}
function updateSlotButtons() {
  for (let i=0;i<NUM_SLOTS;i++) {
    const btn=document.getElementById(`slot-${i}`); if (!btn) continue;
    btn.classList.remove('saved','loaded','pending');
    btn.style.background = '';
    btn.style.color = '';
    if (i === _pendingSlot) {
      btn.classList.add('pending');
      if (slots[i]?.barColor) btn.style.background = slots[i].barColor;
    } else if (slots[i] !== null) {
      const color = slots[i].barColor || '#aa64a6';
      btn.style.background = color;

        btn.classList.add('loaded');
        btn.style.color = '#ffe033';
        btn.style.border = 'none';
      } else {

        btn.style.border = 'none';

}
function buildSlotBar() {
  const bar=document.getElementById('slotBar'); bar.innerHTML='';
  for (let i=0;i<NUM_SLOTS;i++) {
    const btn=document.createElement('button');
    btn.className='slot-btn'; btn.id=`slot-${i}`; btn.textContent=i+1;
    let holdTimer = null, didHold = false;
    const onDown = () => {
      didHold = false;
      holdTimer = setTimeout(() => { didHold = true; }, 600);
    };
    const onUp = () => {
      clearTimeout(holdTimer); holdTimer = null;
      if (didHold && slots[i] !== null) {

        slots[i] = null; if (activeSlot===i) activeSlot=-1;

// Per-track R press level (cycles 0→1→2→0)
const trackRLevel = new Array(NUM_TRACKS).fill(0);

function placeNotes(tr, noteCount, accentRatio, level) {
  grid[tr].fill(0);
  const positions = [];
  while (positions.length < noteCount) {
    const p = Math.floor(Math.random() * NUM_STEPS);
    if (!positions.includes(p)) positions.push(p);
  }
  const accentCount = Math.round(noteCount * accentRatio);
  const shuffled = [...positions].sort(() => Math.random() - 0.5);
  const accentSet = new Set(shuffled.slice(0, accentCount));
  positions.forEach(p => { grid[tr][p] = accentSet.has(p) ? 2 : 1; });

  const key = trackInstruments[tr];
  // Kick: never land on beat 1 (step 0) or beat 3 (step 8) — those belong to the BEAT
  if (key === 'skick') { grid[tr][0] = 0; grid[tr][8] = 0; }
  // Handclap: beats 2+4 (steps 4,12) or beats 1+3 (steps 0,8) — 50/50
  if (key === 'clap') {
    for (let s = 0; s < NUM_STEPS; s++) grid[tr][s] = 0;
    if (Math.random() < 0.5) { grid[tr][4] = 2; grid[tr][12] = 2; }  // beats 2+4
    else { grid[tr][0] = 2; grid[tr][8] = 2; }  // beats 1+3
  }
  // Guiro: max 2 accents per measure, 40% chance of accent on beat 1
  if (key === 'guiro') {
    if (Math.random() < 0.4) { grid[tr][0] = 2; } // accent on the 1
    let accCount = 0;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 2) { if (accCount >= 2) grid[tr][s] = 1; else accCount++; }
    }
  }
  const maxConsec = (key === 'skick' || key === 'ssnare' || key === 'clap' || key === 'ride') ? 2 : (level === 2 ? 4 : 99);
  const maxAccentConsec = level === 2 ? 2 : 99;

  // Iterate until no violations remain
  for (let pass = 0; pass < NUM_STEPS; pass++) {
    let anyChange = false;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 0) continue;
      // Count run starting at s
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] > 0) run++;
      if (run > maxConsec) {
        grid[tr][(s + maxConsec) % NUM_STEPS] = 0;
        anyChange = true;
      }
    }
    // Check accent runs
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] !== 2) continue;
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] === 2) run++;
      if (run > maxAccentConsec) {
        grid[tr][(s + maxAccentConsec) % NUM_STEPS] = 1;
        anyChange = true;
      }
    }
    if (!anyChange) break;
  }

}

function randomizeTrack(tr) {
  const key = trackInstruments[tr];
  const cappedLevel = (key === 'skick' || key === 'clap') ? Math.min(trackRLevel[tr], 1) : trackRLevel[tr];
  const level = cappedLevel;
  trackRLevel[tr] = (trackRLevel[tr] + 1) % 3;

  if (trackInstruments[tr] === 'sbass' || trackInstruments[tr] === 'sbass3' || trackInstruments[tr] === 'sbass4' || trackInstruments[tr] === 'stab' || trackInstruments[tr] === 'sstring' || trackInstruments[tr] === 'sleg' || trackInstruments[tr] === 'sparkle' || trackInstruments[tr] === 'rhodes' || trackInstruments[tr] === 'rhodes2' || trackInstruments[tr] === 'sflute' || trackInstruments[tr] === 'satk' || trackInstruments[tr] === 'boog' || trackInstruments[tr] === 'fflute' || trackInstruments[tr] === 'blunt') {
    randomizeBassTrack(tr, level); return;
  }

  // Straight pattern logic
  const straightKeys = new Set(['shihat','shak','clap','sleg']);
  // All tonal instruments: 25% chance of downbeats or upbeats
  const isTonalStraight = TONAL_KEYS.has(key) && !straightKeys.has(key) && Math.random() < 0.125;

  if (straightKeys.has(key) && Math.random() < 0.3 || isTonalStraight) {
    const isEighths = Math.random() < 0.5;
    const step = isEighths ? 2 : 4;
    // Downbeats (0,4,8,12) or upbeats (2,6,10,14) — 50/50 for all straight instruments
    const isUpbeat = Math.random() < 0.5;
    for (let s = 0; s < NUM_STEPS; s++) {
      const gs = (s - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
      const hits = isUpbeat
        ? (s % 4 === 2) // upbeats: steps 2,6,10,14
        : (s % step === 0); // downbeats
      grid[tr][gs] = hits ? (s === 0 || s === 8 ? 2 : 1) : 0;
    }
    redrawTrackCells(tr); markModified(); return;
  }

  // NOISE: always straight, full measure, either all downbeats or all upbeats
  if (key === 'ngate') {
    const isUpbeat = Math.random() < 0.5;
    for (let s = 0; s < NUM_STEPS; s++) {
      const gs = (s - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
      const hits = isUpbeat ? (s % 4 === 2) : (s % 4 === 0);
      grid[tr][gs] = hits ? (s === 0 ? 2 : 1) : 0;
    }
    redrawTrackCells(tr); markModified(); return;
  }

  const [minN, maxN, accentRatio] = [
    [4, 7,  0.20],
    [7, 11, 0.40],
    [11, 16, 0.60],
  ][level];
  const noteCount = minN + Math.floor(Math.random() * (maxN - minN + 1));
  placeNotes(tr, noteCount, accentRatio, level);

  // Choir: redistribute notes to beat positions for longer legato stretches
  if (key === 'sstring') {
    const beatSteps = [0, 4, 8, 12];
    const notes = [];
    for (let s = 0; s < NUM_STEPS; s++) if (grid[tr][s] > 0) notes.push(grid[tr][s]);
    grid[tr].fill(0);
    // Place on random beat steps
    const shuffledBeats = beatSteps.sort(() => Math.random() - 0.5);
    notes.forEach((val, i) => { if (shuffledBeats[i] !== undefined) grid[tr][shuffledBeats[i]] = val; });
    redrawTrackCells(tr);
  }

  // RAND-time only: chance to promote a soft hit to a 32nd-split for select instruments.
  // This is the ONLY place split-32 notes are ever assigned — never during live playback.
  const split32Keys = new Set(['shihat','sparkle','congHi','bongHi','rhodes','rhodes2']);
  if (split32Keys.has(key)) {
    let splitCount = 0;
    const maxSplits = (key === 'rhodes' || key === 'rhodes2') ? 3 : 99;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 1 && splitCount < maxSplits && Math.random() < 0.18) {
        grid[tr][s] = 3;
        splitCount++;
      }
    }
  }

  redrawTrackCells(tr); markModified();
}

function wireShiftButton(btn, tr, dir) {
  let interval = null, holdTimer = null, active = false;
  const doShift = () => {
    if (!active) return;
    if (grid[tr].every(v => v === 0)) return;
    trackOffset[tr] = (trackOffset[tr] + dir + NUM_STEPS) % NUM_STEPS;
    redrawTrackCells(tr); markModified();
  };
  const startHold = () => {
    if (interval) return;
    interval = setInterval(doShift, (60000 / bpm) * 4 * 4);
  };
  const stop = () => {
    active = false;
    clearTimeout(holdTimer); holdTimer = null;
    clearInterval(interval); interval = null;
  };
  const onDown = () => {
    active = true;
    doShift();
    holdTimer = setTimeout(startHold, 400);
  };
  btn.addEventListener('mousedown', onDown);
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
  btn.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, { passive: false });
  btn.addEventListener('touchend', e => { e.preventDefault(); stop(); }, { passive: false });
  btn.addEventListener('touchcancel', stop);
}

// SWEEP button wiring — hold = rising noise sweep, release = descend
(function() {
  const btn = document.getElementById('clearBtn');
  if (!btn) return;
  let sweepNodes = null;

  // Sidechain analyser on master output — reads current mix level to duck the sweep
  let _sweepAnalyser = null, _sweepAnalyserData = null, _sweepDuckLoop = null;
  function ensureSweepAnalyser() {
    if (_sweepAnalyser || !ctx || !masterGain) return;
    _sweepAnalyser = ctx.createAnalyser();
    _sweepAnalyser.fftSize = 256;
    _sweepAnalyser.smoothingTimeConstant = 0.6;
    masterGain.connect(_sweepAnalyser);
    _sweepAnalyserData = new Uint8Array(_sweepAnalyser.frequencyBinCount);
  }

  function startSweep() {
    if (!ctx || sweepNodes) return;
    ctx.resume();
    ensureSweepAnalyser();
    window._sweepStartMs = Date.now();
    const dur = stepDuration() * 16; // full sweep duration
    const t = ctx.currentTime;
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * (dur + 1)), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < buf.length; i++) d[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 3;
    bp.frequency.setValueAtTime(200, t);
    bp.frequency.exponentialRampToValueAtTime(8000, t + dur * 0.5); // up to peak
    bp.frequency.exponentialRampToValueAtTime(200, t + dur); // back down

    // baseGain holds the "intended" envelope level; duckGain applies sidechain ducking on top
    const baseGain = ctx.createGain();
    baseGain.gain.setValueAtTime(0, t);
    baseGain.gain.linearRampToValueAtTime(0.303, t + 0.008);
    const duckGain = ctx.createGain();
    duckGain.gain.value = 1;

    noise.connect(bp); bp.connect(baseGain); baseGain.connect(duckGain); duckGain.connect(masterGain);
    noise.start(t);
    sweepNodes = { noise, bp, gain: baseGain, duckGain };
    btn.classList.add('active');

    // Continuously sample master output level and duck the sweep inversely
    const duckLoop = () => {
      if (!sweepNodes || !_sweepAnalyser) return;
      _sweepAnalyser.getByteTimeDomainData(_sweepAnalyserData);
      let sumSq = 0;
      for (let i = 0; i < _sweepAnalyserData.length; i++) {
        const v = (_sweepAnalyserData[i] - 128) / 128;
        sumSq += v * v;
      }
      const rms = Math.sqrt(sumSq / _sweepAnalyserData.length); // 0-1ish
      const duckAmount = Math.min(1, rms * 6.5); // sensitivity — more reactive
      const targetGain = 1 - duckAmount * 0.95; // duck down to 5% at loudest — near silent at peaks
      duckGain.gain.setTargetAtTime(targetGain, ctx.currentTime, 0.02); // faster response
      _sweepDuckLoop = requestAnimationFrame(duckLoop);
    };
    duckLoop();
  }

  function stopSweep() {
    if (!sweepNodes || !ctx) return;
    const { bp, gain, noise, duckGain } = sweepNodes;
    sweepNodes = null;
    if (_sweepDuckLoop) cancelAnimationFrame(_sweepDuckLoop);
    btn.classList.remove('active');
    const t = ctx.currentTime;
    const quarterNote = stepDuration() * 2; // half a beat fade
    bp.frequency.cancelScheduledValues(t);
    bp.frequency.exponentialRampToValueAtTime(200, t + quarterNote);
    gain.gain.cancelScheduledValues(t);
    gain.gain.setValueAtTime(gain.gain.value, t);
    gain.gain.linearRampToValueAtTime(0, t + quarterNote);
    setTimeout(() => { try { noise.stop(); } catch(e) {} }, quarterNote * 1000 + 100);
  }

  btn.addEventListener('touchstart', e => { e.preventDefault(); startSweep(); }, { passive: false });
  btn.addEventListener('touchend', e => {
    e.preventDefault();
    const minMs = 2000; // quick tap still plays a full 2-second sweep
    const elapsed = Date.now() - (window._sweepStartMs || 0);
    if (elapsed < minMs) setTimeout(stopSweep, minMs - elapsed);
    else stopSweep();
  }, { passive: false });
  btn.addEventListener('touchcancel', stopSweep);
  btn.addEventListener('mousedown', startSweep);
  btn.addEventListener('mouseup', stopSweep);
  btn.addEventListener('mouseleave', stopSweep);

  // Drag from SWEEP onto BEAT or RAND to trigger them simultaneously
  // Also fire on document touchmove so drag works even if touchstart hit the loading overlay
  const sweepMoveHandler = e => {
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return;
    // Only act if finger is over SWEEP or dragging across transport buttons
    const onSweep = el.closest('#clearBtn');
    const target = el.closest('#beatBtn, #randBtn, #scratchBtn');
    if (!onSweep && !target) return;
    if (e.cancelable) e.preventDefault();
    if (target && !target.dataset.sweepTriggered) {
      target.dataset.sweepTriggered = '1';
      if (target.id === 'beatBtn') toggleBeat();
      if (target.id === 'randBtn') { queueRand(); requestAnimationFrame(() => flashBtnBlue('randBtn')); }
      if (target.id === 'scratchBtn') { if (_recallSnapB) { const _cur = snapshotState(); restoreState(_recallSnapB); flashBtnOrange('scratchBtn'); window._reelReversePending = true; _recallSnapB = _cur; playUiSound(Math.random() < 0.5 ? 'rewind' : 'rewind2'); } }
    }
  };
  btn.addEventListener('touchmove', sweepMoveHandler, { passive: false });
  document.addEventListener('touchmove', sweepMoveHandler, { passive: false });
  btn.addEventListener('touchend', () => {
    document.querySelectorAll('[data-sweep-triggered]').forEach(el => delete el.dataset.sweepTriggered);
  }, { passive: false });
})();

// ── Tape hiss — toggled by tapping either reel ──
let _hissNode = null, _hissGain = null, _hissOn = false;

function startHiss() {
  if (!ctx || _hissNode) return;
  const sr = ctx.sampleRate;

  // ── Hiss: shaped white noise (pink-ish, high shelf) ──
  const hissBuf = ctx.createBuffer(2, sr * 4, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = hissBuf.getChannelData(ch);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for (let i = 0; i < d.length; i++) {
      const w = Math.random() * 2 - 1;
      // Paul Kellet pink noise approximation
      b0=0.99886*b0+w*0.0555179; b1=0.99332*b1+w*0.0750759;
      b2=0.96900*b2+w*0.1538520; b3=0.86650*b3+w*0.3104856;
      b4=0.55000*b4+w*0.5329522; b5=-0.7616*b5-w*0.0168980;
      d[i] = (b0+b1+b2+b3+b4+b5+b6+w*0.5362) * 0.11;
      b6 = w * 0.115926;
    }
  }
  _hissNode = ctx.createBufferSource(); _hissNode.buffer = hissBuf; _hissNode.loop = true;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 2000;
  const peak = ctx.createBiquadFilter(); peak.type = 'peaking';
  peak.frequency.value = 6000; peak.Q.value = 0.8; peak.gain.value = 6;
  _hissGain = ctx.createGain(); _hissGain.gain.value = 0.0032;
  _hissNode.connect(hp); hp.connect(peak); peak.connect(_hissGain);

  // ── Crackle: sparse random impulses ──
  const crackleLen = sr * 8;
  const crackBuf = ctx.createBuffer(2, crackleLen, sr);
  for (let ch = 0; ch < 2; ch++) {
    const d = crackBuf.getChannelData(ch);
    for (let i = 0; i < crackleLen; i++) {
      // Sparse spikes — approx 40 per second
      d[i] = Math.random() < (40 / sr) ? (Math.random() * 2 - 1) * (Math.random() < 0.3 ? 1 : 0.3) : 0;
    }
  }
  const crackNode = ctx.createBufferSource(); crackNode.buffer = crackBuf; crackNode.loop = true;
  const crackLP = ctx.createBiquadFilter(); crackLP.type = 'lowpass'; crackLP.frequency.value = 8000;
  const crackGain = ctx.createGain(); crackGain.gain.value = 0.0107;
  crackNode.connect(crackLP); crackLP.connect(crackGain);

  // ── Rumble: very low frequency wobble ──
  const rumble = ctx.createOscillator(); rumble.type = 'sine'; rumble.frequency.value = 30;
  const rumbleLFO = ctx.createOscillator(); rumbleLFO.type = 'sine'; rumbleLFO.frequency.value = 0.3;
  const rumbleLFOGain = ctx.createGain(); rumbleLFOGain.gain.value = 5;
  rumbleLFO.connect(rumbleLFOGain); rumbleLFOGain.connect(rumble.frequency);
  const rumbleGain = ctx.createGain(); rumbleGain.gain.value = 0.0014;
  rumble.connect(rumbleGain);

  // Connect noise directly to destination (bypasses master limiter)
  // Use a separate gain that we modulate based on master output level
  const hissMix = ctx.createGain(); hissMix.gain.value = 1;
  _hissGain.connect(hissMix);
  crackGain.connect(hissMix);
  rumbleGain.connect(hissMix);
  hissMix.connect(ctx.destination);
  _hissNode._hissMix = hissMix;

  // Analyser to follow master output and duck hiss gain
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  masterGain.connect(analyser);
  const rmsBuffer = new Float32Array(analyser.frequencyBinCount);
  const _hissInterval = setInterval(() => {
    if (!_hissOn || !_hissMix) { clearInterval(_hissInterval); return; }
    analyser.getFloatTimeDomainData(rmsBuffer);
    let rms = 0;
    for (let i = 0; i < rmsBuffer.length; i++) rms += rmsBuffer[i] * rmsBuffer[i];
    rms = Math.sqrt(rms / rmsBuffer.length);
    // Scale hiss: loud signal (rms>0.1) ducks hiss to near zero
    const hissLevel = Math.max(0, 1 - rms * 8);
    hissMix.gain.setTargetAtTime(hissLevel, ctx.currentTime, 0.3);
  }, 80);
  _hissNode._hissInterval = _hissInterval;

  _hissNode.start(); crackNode.start();
  rumble.start(); rumbleLFO.start();

  // Store all nodes for cleanup
  _hissNode._extras = { crackNode, crackGain, rumble, rumbleLFO, rumbleGain };
}


// ── Turbo Boost: hard brickwall limiting ──
let _turboOn = false;
function toggleTurbo() {
  _turboOn = !_turboOn;
  const btn = document.getElementById('turboBtn');
  if (window.masterLimiter) {
    if (_turboOn) {
      window.masterLimiter.threshold.value = -20;
      window.masterLimiter.ratio.value = 20;
      window.masterLimiter.knee.value = 0;
      window.masterLimiter.attack.value = 0.001;
      window.masterLimiter.release.value = 0.05;
    } else {
      window.masterLimiter.threshold.value = -1;
      window.masterLimiter.ratio.value = 20;
      window.masterLimiter.knee.value = 0;
      window.masterLimiter.attack.value = 0.0003;
      window.masterLimiter.release.value = 0.1;
    }
  }
  if (btn) btn.style.background = _turboOn ? '#f17d21' : '#555';
}


// Wire reel hold — opens settings panel
let _reelHoldTimer = null;
document.querySelectorAll('.reel-wrap').forEach(r => {
  const open = e => { e.preventDefault(); showSettings(); };
  r.addEventListener('touchstart', e => { e.preventDefault(); showSettings(); }, { passive: false });
  r.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });
  r.addEventListener('mousedown', showSettings);
});

</script>
