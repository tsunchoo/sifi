<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BOOMBLAP v14</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
:root {
  --bg: #f5f0e8; --panel: #ede8df; --border: #b0a898;
  --text: #1e1e1e; --dim: #999; --soft: #666;
  --playhead: #ff2200; --muted-bg: #ff2200;
  --slot-saved: #7ecf3a; --slot-loaded: #ff2200;
  --vol-fill: #7ecf3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow: hidden; height: 100%; }
button, .step-cell, .track-header-btn, .vol-mute-col, .fx-btn { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding: 16px 4px 80px 4px; user-select: none; -webkit-user-select: none;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: url('boombox.jpg') no-repeat right top / contain;
  opacity: 0.16;
}
body > * { position: relative; z-index: 1; }
header {
  width: 100%; max-width: 960px; display: flex; align-items: center;
  justify-content: space-between;
  margin-top: 12px;
  margin-bottom: 5px; padding-bottom: 5px;
}
header h1 { font-family: 'DM Sans', sans-serif; font-size: 1.4rem; letter-spacing: 4px; }
header .sub { font-size: 0.44rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
.tape-reels { display: flex; gap: 78px; align-items: center; margin-right: 38px; margin-left: 30px; }
.reel-wrap { position: relative; width: 42px; height: 42px; flex-shrink: 0; }
.reel { width: 42px; height: 42px; display: block; transition: filter 0.2s; }
.reel.recording { filter: sepia(1) saturate(5) hue-rotate(-10deg) brightness(0.9); }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.reel-wrap.spinning { animation: spin 2s linear infinite; transform-origin: center; }
.transport {
  width: 100%; max-width: 960px; display: flex; align-items: stretch;
  gap: 5px; margin-bottom: 6px;
}
.transport .btn {
  flex: 1; padding: 0 4px; flex-shrink: 1;
}
.btn {
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.5px; padding: 0 10px; cursor: pointer; text-transform: uppercase;
  transition: background 0.1s, color 0.1s; height: 54px; flex-shrink: 0; white-space: nowrap;
  touch-action: manipulation;
}
.btn.active { background: var(--text); color: var(--bg); }
#playBtn.playing { background: var(--playhead); color: #fff; }
.btn:active { opacity: 0.7; }

#beatBtn.active { background: var(--playhead) !important; color: #fff !important; }
#beatBtn.beat-pulse { animation: beat-red 0.5s infinite alternate; }
@keyframes beat-red { from { background: var(--playhead); color: #fff; } to { background: #7a1000; color: #fff; } }
#saveBtn.rec-active { animation: rec-pulse 0.5s infinite alternate; }
#saveBtn, #randBtn { touch-action: none; }
@keyframes rec-pulse { from { background: var(--playhead); color: #fff; } to { background: #7a1000; color: #fff; } }
.btn-flash { background: var(--slot-saved) !important; color: #000 !important; border: none !important; transition: none !important; }
.rand-overlay-btn {
  font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  padding: 20px 0; background: #b0b0b0; border: none; color: var(--text);
  touch-action: manipulation;
}
.rand-overlay-btn:active { background: var(--text); color: var(--bg); }
#bpmSlider::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; background: var(--text); border-radius: 0; cursor: pointer; }
#bpmSlider::-moz-range-thumb { width: 32px; height: 32px; background: var(--text); border-radius: 0; border: none; }
.bpm-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
.bpm-val { font-size: 0.9rem; font-weight: 700; min-width: 32px; text-align: right; flex-shrink: 0; }
input[type=range] { -webkit-appearance: none; flex: 1; height: 3px; background: var(--text); outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 32px; height: 32px; background: var(--text); cursor: pointer; border-radius: 0; }
input[type=range]::-moz-range-thumb { width: 32px; height: 32px; background: var(--text); cursor: pointer; border-radius: 0; border: none; }
.vol-wrap { display: flex; align-items: center; gap: 8px; width: 100%; max-width: 960px; margin-top: 6px; padding: 6px 0; }
.master-vol-slider { flex: 1; }
.vol-section { width: 100%; max-width: 960px; margin-top: 12px; display: flex; align-items: center; gap: 6px; }
.vol-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text); font-family: 'DM Sans', sans-serif; flex-shrink: 0; }
.vol-label { font-size: 0.6rem; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; font-weight: 700; flex-shrink: 0; }

/* ── Per-track inline control row ── */
.track-ctrl-row {
  display: flex; align-items: stretch; gap: 5px;
  height: 32px;
}
.track-name-btn {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  cursor: pointer; background: #b0b0b0; color: var(--text);
  border: none; padding: 0 8px; white-space: nowrap; overflow: hidden;
  font-family: 'DM Sans', sans-serif; flex-shrink: 0; width: 96px;
  display: flex; align-items: center;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
  transition: background 0.06s, color 0.06s;
}
.track-name-btn.has-notes { background: var(--text); color: var(--bg); }
.track-name-btn.muted { background: var(--dim); color: var(--bg); opacity: 0.55; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; opacity: 1; transition: background 0.3s; }
.track-name-btn.shifting { background: var(--playhead) !important; color: #fff !important; animation: pulse 0.5s infinite alternate; }
.track-ctrl-icon-btn {
  width: 32px; flex-shrink: 0;
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.5px; text-transform: uppercase; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; transition: background 0.1s, color 0.1s;
}
.track-ctrl-icon-btn.on { background: var(--playhead); color: #fff; }
.track-ctrl-icon-btn.sweep-on { background: #5bbcb8; color: #fff; }
.rand-btn.pulsing { color: #fff; animation: pulse 0.5s infinite alternate; }
#randBtn.pulsing { background: var(--playhead); color: #fff; animation: pulse 0.5s infinite alternate; }
@keyframes pulse { from { background: var(--playhead); color: #fff; } to { background: #ff7755; color: #fff; } }
.track-ctrl-icon-btn.playing { opacity: 0.45; }
.shift-btn {
  width: 32px; flex-shrink: 0; background: #b0b0b0;
  border: none;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 700; transition: opacity 0.1s; padding: 0;
  touch-action: manipulation;
}
.shift-btn:active { opacity: 0.4; }
.track-vol-bar {
  flex: 1; position: relative; overflow: hidden;
  background: #b0b0b0; border: none;
  cursor: ew-resize; touch-action: none;
  -webkit-tap-highlight-color: transparent;
}
.track-vol-fill {
  position: absolute; top: 0; left: 0; bottom: 0;
  background: var(--vol-fill); pointer-events: none; transition: width 0.05s;
}
.track-vol-bar.muted { background: #ccc; }
.track-vol-bar.muted .track-vol-fill { background: transparent; }
.row-muted .track-ctrl-icon-btn,
.row-muted .shift-btn {
  background: #ccc !important; border: none !important; color: #888 !important;
  animation: none !important;
}



/* ── Sound picker overlay (grid) ── */
#soundPicker {
  display: none; position: fixed; inset: 0; z-index: 300;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.95);
}
#soundPicker.visible { display: flex; }
.sound-picker-inner {
  background: var(--bg); border: none;
  min-width: 320px; padding: 16px;
}
.sound-picker-title {
  padding: 0 0 12px 0; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--dim); margin-bottom: 12px;
}
#soundPickerList {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.sound-option {
  padding: 16px 8px; font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; color: var(--text); text-align: center;
  border: none; background: #b0b0b0; font-family: 'DM Sans', sans-serif;
  transition: background 0.05s, color 0.05s; touch-action: manipulation;
  user-select: none;
}
.sound-option:hover { background: var(--text); color: var(--bg); }
.sound-option.active { background: var(--text); color: var(--bg); border: none; }
/* Instrument group colours */
.inst-kit   { background: #1a3a6b; color: #fff; }
.inst-perc  { background: #2a7a3a; color: #fff; }
.inst-tonal { background: #ff6600; color: #fff; }
.inst-kit:hover   { background: #0d1f40; color: #fff; }
.inst-perc:hover  { background: #1a5228; color: #fff; }
.inst-tonal:hover { background: #cc5200; color: #fff; }
.inst-kit.active, .inst-perc.active, .inst-tonal.active { background: var(--text); color: var(--bg); border: none; }
/* Track name buttons inherit group color */
.track-name-btn.inst-kit   { background: #1a3a6b; color: #fff; }
.track-name-btn.inst-perc  { background: #2a7a3a; color: #fff; }
.track-name-btn.inst-tonal { background: #ff6600; color: #fff; }
.track-name-btn.has-notes.inst-kit   { background: #1a3a6b; }
.track-name-btn.has-notes.inst-perc  { background: #2a7a3a; }
.track-name-btn.has-notes.inst-tonal { background: #ff6600; }
.track-name-btn.playing { background: var(--playhead) !important; color: #fff !important; }

/* ── Vol overlay ── */
#volOverlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  align-items: center; justify-content: center;
  background: rgba(245,240,232,0.92);
  cursor: ns-resize;
}
#volOverlay.visible { display: flex; }
.vol-overlay-inner {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 24px 36px; border: none; background: var(--bg);
  pointer-events: none;
}
.vol-overlay-label { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.vol-overlay-pct { font-size: 2.5rem; font-weight: 700; line-height: 1; min-width: 3ch; text-align: center; }
.vol-bar-track {
  width: 100px; height: 20px; background: var(--border); position: relative;
  border: none;
}
.vol-bar-fill {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: var(--text); transition: height 0.05s;
}

/* ── Sequencer grid (middle) ── */
.seq-wrap { width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 0; display: flex; flex-direction: column; gap: 20px; }
.track-wrap { display: flex; flex-direction: column; gap: 3px; }
.track-row {
  display: flex; align-items: stretch;
}

.step-lane {
  flex: 1; display: flex; flex-direction: column;
  border: none;
  border-bottom: 1px solid var(--border);
  overflow: visible;
}
.step-lane-cells {
  display: grid; grid-template-columns: repeat(16, 1fr);
  overflow: visible;
}
.step-cell {
  aspect-ratio: 1;
  position: relative; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  min-height: 0; box-sizing: border-box;
  overflow: visible;
}
/* teeth — positioned so bottom edge sits exactly on the lane border */
.step-cell::before {
  content: ''; position: absolute; bottom: -3px; left: -1px;
  width: 3px; background: var(--text); height: calc(30% + 3px); pointer-events: none;
  z-index: 1;
}
/* beat markers taller */
.step-cell[data-step="4"]::before,
.step-cell[data-step="8"]::before,
.step-cell[data-step="12"]::before { height: calc(55% + 3px); }
/* step 0 uses the lane's left border */
.step-cell[data-step="0"]::before { display: none; }

.step-cell::after {
  content: '';
  position: absolute;
  background: transparent;
  pointer-events: none;
  transition: background 0.05s, opacity 0.05s;
  top: 0; bottom: 0; left: 0; right: 0;
}
.step-cell.soft::after { background: var(--track-color, var(--text)); opacity: 0.4; }
.step-cell.on::after   { background: var(--track-color, var(--text)); opacity: 1; }
.step-cell.playing { background: rgba(192,57,43,0.07); }
.step-cell.on.playing::after   { background: var(--playhead); opacity: 1; }
.step-cell.soft.playing::after { background: var(--playhead); opacity: 0.7; }

/* ── Track lane label — now inside ctrl row, removed ── */

/* ── Footer ── */
.footer {
  width: 100%; max-width: 960px; margin-top: 0; margin-bottom: 0;
  display: flex; justify-content: space-between; align-items: center;
  border-top: none; padding-top: 0; height: 0; overflow: hidden;
}
.ghost-btn {
  font-size: 0.55rem; letter-spacing: 1px; color: var(--dim);
  background: none; border: none; cursor: pointer; text-transform: uppercase;
  font-family: 'DM Sans', sans-serif; transition: color 0.1s; padding: 4px 0;
}
.ghost-btn:hover { color: var(--playhead); }
.status { font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; }

/* ── Slot bar ── */
.slot-bar {
  width: 100%; max-width: 960px; display: grid;
  grid-template-columns: repeat(6, 1fr); gap: 4px; margin-top: 2px;
}
.slot-btn {
  background: #b0b0b0; border: none; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 1.6rem; font-weight: 700; letter-spacing: 0;
  padding: 16px 0; cursor: pointer; text-align: center;
  touch-action: manipulation; transition: background 0.1s, color 0.1s;
}
.slot-btn.saved  { background: var(--slot-saved); color: #fff; }
.slot-btn.pending { animation: slot-pending 0.4s infinite alternate; color: #fff; }
@keyframes slot-pending { from { background: var(--slot-saved); } to { background: var(--bg); } }
.slot-btn.loaded { background: var(--slot-loaded); color: #fff; }
.slot-btn.loaded.beat-pulse { animation: slot-pulse 0.12s ease-out; }
@keyframes slot-pulse { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
#playBtn.btn-beat-pulse, #beatBtn.btn-beat-pulse { animation: slot-pulse 0.12s ease-out; }
.slot-btn:active { opacity: 0.7; }

#loadingOverlay {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 16px; z-index: 999; cursor: pointer;
  border: none; width: 100%; font-family: 'DM Sans', sans-serif;
  touch-action: manipulation; -webkit-tap-highlight-color: transparent;
}
#loadingOverlay h2 { font-family: 'DM Sans', sans-serif; font-size: 2.5rem; letter-spacing: 4px; }
#loadingOverlay p { font-size: 0.65rem; color: var(--dim); letter-spacing: 2px; text-transform: uppercase; }
#loadingOverlay.hidden { display: none; }
</style>
</head>
<body>

<button id="loadingOverlay" onclick="document.getElementById('loadingMsg').textContent='TAPPED - LOADING...'; initAudio()">
  <h2>BOOMBLAP</h2>
  <p id="loadingMsg">Tap to load</p>
</button>

<!-- Sound picker: flat list for one track at a time -->
<div id="soundPicker">
  <div class="sound-picker-inner">
    <div class="sound-picker-title" id="soundPickerTitle">TRK 1 — SOUND</div>
    <div id="soundPickerList"></div>
  </div>
</div>

<!-- Vol overlay -->
<div id="volOverlay">
  <div class="vol-overlay-inner">
    <div class="vol-overlay-label" id="volOverlayLabel">TRK 1</div>
    <div class="vol-bar-track"><div class="vol-bar-fill" id="volBarFill"></div></div>
    <div class="vol-overlay-pct" id="volOverlayPct">80%</div>
  </div>
</div>

<header>
  <h1>BOOMBLAP</h1>
  <div id="tapeReels" class="tape-reels">
    <div class="reel-wrap">
      <img class="reel" id="reel1" src="tape_spool.png" alt="">
    </div>
    <div class="reel-wrap">
      <img class="reel" id="reel2" src="tape_spool.png" alt="">
    </div>
  </div>
</header>

<div class="transport">
  <button class="btn" id="playBtn" onclick="togglePlay()">PLAY</button>
  <button class="btn" id="beatBtn" onclick="toggleBeat()">BEAT</button>
  <button class="btn" id="clearBtn" onclick="fullClear()">CLEAR</button>
  <button class="btn" id="randBtn">RAND</button>
  <button class="btn" id="bpmBtn" onclick="toggleBpmOverlay()"><span id="bpmVal">110</span> BPM</button>
  <button class="btn" id="saveBtn" onclick="onRecClick()">REC</button>
</div>



<!-- Save overlay -->
<div id="saveOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:rgba(245,240,232,0.95);align-items:center;justify-content:center;touch-action:none;">
  <div style="display:flex;flex-direction:column;gap:12px;padding:24px;border:none;background:var(--bg);width:min(320px,88vw);">
    <div style="font-size:0.65rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:'DM Sans',sans-serif;">EXPORT</div>
    <button class="rand-overlay-btn" id="saveSeparateBtn">EXPORT SLOTS</button>
    <button class="rand-overlay-btn" id="saveCombinedBtn">EXPORT LOOP</button>
  </div>
</div>

<!-- BPM overlay -->
<div id="bpmOverlay" style="display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.4);align-items:center;justify-content:center;">
  <div id="bpmOverlayInner" style="background:var(--bg);border:none;padding:32px 40px;display:flex;flex-direction:column;align-items:center;gap:20px;">
    <div style="display:flex;align-items:center;justify-content:center;height:65vh;width:64px;position:relative;">
      <input type="range" id="bpmSlider" min="40" max="200" value="110"
        style="position:absolute;width:65vh;height:3px;background:var(--text);outline:none;transform:rotate(-90deg);left:calc(50% - 32.5vh);top:calc(50% - 1.5px);-webkit-appearance:none;appearance:none;"
        oninput="bpm=+this.value; document.getElementById('bpmVal').textContent=this.value; document.getElementById('bpmOverlayVal').textContent=this.value+' BPM'">
    </div>
    <div id="bpmOverlayVal" style="font-size:1.2rem;font-weight:700;letter-spacing:2px;font-family:'DM Sans',sans-serif;">110 BPM</div>
  </div>
</div>

<!-- Sequencer grid -->
<div class="seq-wrap" id="seqWrap"></div>

<div class="footer">
  <button class="ghost-btn" onclick="randomize()">+</button>
  <span class="status" id="status"></span>
  <button class="ghost-btn" onclick="fullClear()">&#10005;</button>
</div>
<div class="vol-title" style="margin-top:4px;margin-bottom:2px;width:100%;max-width:960px;text-align:left;">SAVED PATTERNS</div>
<div class="slot-bar" id="slotBar"></div>
<div class="vol-section">
  <div class="vol-title">MAIN VOL</div>
  <input type="range" id="masterVolBar" min="0" max="100" value="80" class="master-vol-slider">
</div>

<script>
const INSTRUMENTS = {
  skick:  { name: 'KICK',        soft: null, accent: null, group: 'kit' },
  ssnare: { name: 'SNARE',       soft: null, accent: null, group: 'kit' },
  shihat: { name: 'HIHAT',       soft: null, accent: null, group: 'kit' },
  tamb:   { name: 'TAMB',        soft: 'Sounds/Tamb50.wav',   accent: 'Sounds/Tamb100.wav',   group: 'perc' },
  shak:   { name: 'SHAKER',      soft: 'Sounds/Shak50.wav',   accent: 'Sounds/Shak100.wav',   group: 'perc' },
  clap:   { name: 'HANDCLAP',    soft: 'Sounds/Clap50.wav',   accent: 'Sounds/Clap100.wav',   group: 'perc' },
  congHi: { name: 'CONGA HI',    soft: 'Sounds/CongHi50.wav', accent: 'Sounds/CongHi100.wav', group: 'perc' },
  congLo: { name: 'CONGA LO',    soft: 'Sounds/CongLo50.wav', accent: 'Sounds/CongLo100.wav', group: 'perc' },
  bongHi: { name: 'BONGO HI',    soft: 'Sounds/BongHi50.wav', accent: 'Sounds/BongHi100.wav', group: 'perc' },
  bongLo: { name: 'BONGO LO',    soft: 'Sounds/BongLo50.wav', accent: 'Sounds/BongLo100.wav', group: 'perc' },
  cowb:   { name: 'COWBELL',     soft: 'Sounds/Cowb50.wav',   accent: 'Sounds/Cowb100.wav',   group: 'perc' },
  sbass:  { name: 'SYNTH BASS',  soft: null, accent: null, group: 'tonal' },
  ngate:  { name: 'NOISE',       soft: null, accent: null, group: 'perc'  },
  sbass3: { name: 'JAMES BASS',  soft: null, accent: null, group: 'tonal' },
  sbass4: { name: 'PUNK BASS',   soft: null, accent: null, group: 'tonal' },
  stab:   { name: 'STAB',        soft: null, accent: null, group: 'tonal' },
  sstring:{ name: 'STRINGS',     soft: null, accent: null, group: 'tonal' },
  sleg:   { name: 'STRINGS+',    soft: null, accent: null, group: 'tonal' },
  sparkle:{ name: 'MUTED STR',   soft: null, accent: null, group: 'tonal' },
  rhodes: { name: 'PIANO',       soft: null, accent: null, group: 'tonal' },
  rhodes2:{ name: 'RHODES',      soft: null, accent: null, group: 'tonal' },
};
const INSTRUMENT_KEYS = Object.keys(INSTRUMENTS);
let ctx = null, masterGain = null;
let masterVol = 0.8;

function setMasterVol(v) {
  masterVol = Math.max(0, Math.min(1, v));
  if (masterGain && ctx) masterGain.gain.setTargetAtTime(masterVol, ctx.currentTime, 0.01);
  const slider = document.getElementById('masterVolBar');
  if (slider) slider.value = Math.round(masterVol * 100);
}

const buffers = {};

function resumeCtx() { if (ctx && ctx.state !== 'running') ctx.resume(); }
document.addEventListener('touchstart', resumeCtx, false);

  navigator.mediaDevices.addEventListener('devicechange', () => { if (ctx) ctx.resume().catch(()=>{}); });

async function loadSamples() {
  const msg = document.getElementById('loadingMsg');
  let loaded = 0, total = INSTRUMENT_KEYS.length * 2;
  await Promise.all(INSTRUMENT_KEYS.map(async key => {
    const inst = INSTRUMENTS[key]; buffers[key] = {};
    for (const vel of ['soft','accent']) {

// ── FX: XY pad per track ─────────────────────────────────────────────────────

// x=0 clean, x=1 maximum waveshaper drive
const trackFxNodes = [];

function makeDistCurve(drive) {
  const n = 512, c = new Float32Array(n), k = drive * 400;
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    c[i] = k > 0 ? ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x)) : x;
  }
  return c;
}

function buildFxChain(trackGain) {
  const dryGain = ctx.createGain(); dryGain.gain.value = 1; dryGain.connect(trackGain);
  const fxSend  = ctx.createGain(); fxSend.gain.value = 0;
  const gateGain = ctx.createGain(); gateGain.gain.value = 0;
  const preGain = ctx.createGain(); preGain.gain.value = 0;
  const ws = ctx.createWaveShaper(); ws.oversample = 'none'; ws.curve = makeDistCurve(0.5);
  const postGain = ctx.createGain(); postGain.gain.value = 0.5;
  // crunch path: fxSend → preGain → ws → postGain → trackGain (no compressor = no latency)
  fxSend.connect(preGain); preGain.connect(ws); ws.connect(postGain); postGain.connect(trackGain);
  return { dryGain, fxSend, gateGain, preGain, postGain, ws };
}

function setFxActive(tr, fxVal) {
  if (!trackFxNodes[tr]) return;
  const on = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  const { dryGain, fxSend, preGain } = trackFxNodes[tr];
  const now = ctx.currentTime;
  dryGain.gain.cancelScheduledValues(now); dryGain.gain.setValueAtTime(on ? 0 : 1, now);
  fxSend.gain.cancelScheduledValues(now);  fxSend.gain.setValueAtTime(on ? 1 : 0, now);
  preGain.gain.cancelScheduledValues(now);  preGain.gain.setValueAtTime(on ? 0.25 : 0, now);
  if (trackGainNodes[tr]) {
    const fxComp = on ? trackVolume[tr] * 0.5 : trackVolume[tr];
    trackGainNodes[tr].gain.cancelScheduledValues(now);
    trackGainNodes[tr].gain.setValueAtTime(fxComp, now);
    const vb = document.getElementById(`vbar-${tr}`);
    if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = Math.round(fxComp * 100) + '%'; }
  }
}

function getSynthConnectNode(tr) {
  // Returns the node synth voices should connect to — routes through FX chain if active
  const fxVal = tr !== undefined ? trackFx[tr] : null;
  const fxOn = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  if (tr !== undefined && trackFxNodes[tr]) {
    return fxOn ? trackFxNodes[tr].fxSend : trackFxNodes[tr].dryGain;
  }
  return (tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain;
}

function playBuffer(key, isAccent, time, tr) {
  if (key === 'skick')  { playSynthKick(isAccent, time, tr); return; }
  if (key === 'ssnare') { playSynthSnare(isAccent, time, tr); return; }
  if (key === 'shihat') { playSynthHihat(isAccent, time, tr); return; }
  if (key === 'sbass')   { return; } // handled in scheduler with legato duration
  if (key === 'ngate')   { return; } // handled in scheduler
  if (key === 'sbass3')  { return; }
  if (key === 'sbass4')  { return; }
  if (key === 'stab')    { return; }
  if (key === 'sstring') { return; } // handled in scheduler
  if (key === 'sleg')    { return; } // handled in scheduler
  if (key === 'sparkle') { return; } // handled in scheduler
  if (key === 'rhodes')  { return; } // handled in scheduler
  if (key === 'rhodes2')  { return; }
  const buf = buffers[key]?.[isAccent ? 'accent' : 'soft'];
  if (!buf) return;

  // S: stutter gate — hard chop at 35% of step duration
  if (tr !== undefined && trackSweep[tr] && trackEnvFilters[tr]) {
    const chopLen = stepDuration() * 0.35;
    const ef = trackEnvFilters[tr];
    ef.frequency.cancelScheduledValues(time);
    ef.frequency.setValueAtTime(22050, time);
    // No filter action for samples — just amplitude gate via instrumentGain below
  }
  const src = ctx.createBufferSource(); src.buffer = buf;
  const instrumentGain = ctx.createGain();
  instrumentGain.gain.value = (key === 'shak') ? 0.5 : (key === 'clap') ? 0.707 : 1.0;
  const fxVal = trackFx[tr];
  const on = fxVal && (fxVal.x > 0 || fxVal.y > 0);
  if (tr !== undefined && trackFxNodes[tr] && on) {
    src.connect(instrumentGain); instrumentGain.connect(trackFxNodes[tr].fxSend);
    // Always crunch path — waveshaper handles distortion via preGain/ws/postGain
  } else if (tr !== undefined && trackFxNodes[tr]) {
    src.connect(instrumentGain); instrumentGain.connect(trackFxNodes[tr].dryGain);
  } else {
    src.connect(instrumentGain); instrumentGain.connect((tr !== undefined && trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain);
  }
  // Stutter gate: hard cut after chopLen
  if (tr !== undefined && trackSweep[tr]) {
    const chopLen = stepDuration() * 0.35;
    instrumentGain.gain.setValueAtTime(instrumentGain.gain.value, time);
    instrumentGain.gain.setValueAtTime(instrumentGain.gain.value, time + chopLen);
    instrumentGain.gain.linearRampToValueAtTime(0, time + chopLen + 0.008);
  }
  src.start(time);
}


const NUM_TRACKS = 6, NUM_STEPS = 16, VOL_NODES_COUNT = 10;

const trackInstruments = ['shak','sleg','sparkle','sbass3','congHi','congLo'];
const grid        = Array.from({length: NUM_TRACKS}, () => new Array(NUM_STEPS).fill(0));
const trackOffset = new Array(NUM_TRACKS).fill(0);
const trackMuted  = new Array(NUM_TRACKS).fill(false);
const trackSweep  = new Array(NUM_TRACKS).fill(false);
const trackChop   = new Array(NUM_TRACKS).fill(false);
const trackVolume = [0.8, 0.505, 0.8, 0.8, 0.8, 0.8];
const trackFx = Array.from({length: NUM_TRACKS}, () => ({ x: 0, y: 0 }));
const trackFxMode = new Array(NUM_TRACKS).fill(0); // 0=CHOKE/SLAP, 1=CRUNCH/ENV
const trackGainNodes = [];
const trackEnvFilters = [];
let bpm = 110, playing = false, currentStep = -1, nextStepTime = 0, scheduleInterval = null;
const LOOKAHEAD = 0.1, SCHEDULE_MS = 25;
function stepDuration() { return 60 / bpm / 4; }

function scheduler() {
  while (nextStepTime < ctx.currentTime + LOOKAHEAD) {
    const step = (currentStep + 1) % NUM_STEPS; currentStep = step;
    const t = nextStepTime;
    // Apply pending slot swap before audio is scheduled so step 0 plays from the new pattern
    if (step === 0 && _pendingSlot >= 0) {
      const pi = _pendingSlot; _pendingSlot = -1;
      const snap = slots[pi];
      // Audio-critical state only — no DOM work here
      for (let tr = 0; tr < NUM_TRACKS; tr++) {
        grid[tr] = [...snap.grid[tr]];
        trackOffset[tr] = snap.trackOffset[tr];
        trackInstruments[tr] = snap.trackInstruments[tr];
        trackMuted[tr] = snap.trackMuted[tr];
        if (snap.trackBassScale?.[tr]) trackBassScale[tr] = [...snap.trackBassScale[tr]];
        else delete trackBassScale[tr];
        if (snap.trackVolume) {
          trackVolume[tr] = snap.trackVolume[tr];
          if (trackGainNodes[tr]) trackGainNodes[tr].gain.setTargetAtTime(trackVolume[tr], ctx.currentTime, 0.02);
        }
        if (snap.trackFx) { trackFx[tr] = snap.trackFx[tr] || {x:0,y:0}; setFxActive(tr, trackFx[tr]); }
        if (snap.trackFxMode) trackFxMode[tr] = snap.trackFxMode[tr] || 0;
        if (snap.trackSweep) trackSweep[tr] = snap.trackSweep[tr] || false;
        if (snap.trackChop)  trackChop[tr]  = snap.trackChop[tr]  || false;
        if (snap.trackRLevel) trackRLevel[tr] = snap.trackRLevel[tr] ?? 0;
      }
      if (snap.bpm) bpm = snap.bpm;
      if (snap.masterVol !== undefined) setMasterVol(snap.masterVol);
      activeSlot = pi;
      // Defer all DOM updates to next frame
      requestAnimationFrame(() => {
        for (let tr = 0; tr < NUM_TRACKS; tr++) {
          redrawTrackCells(tr);
          const tb = document.getElementById(`tbtn-${tr}`);
          if (tb) { tb.textContent = INSTRUMENTS[trackInstruments[tr]]?.name||(tr+1); tb.classList.toggle('muted', trackMuted[tr]); setTrackNameColor(tr, trackInstruments[tr]); }
          const sb = document.getElementById(`swpbtn-${tr}`);
          if (sb) { const tonal = TONAL_KEYS.has(trackInstruments[tr]); sb.textContent = tonal ? 'E' : 'S'; sb.classList.toggle('sweep-on', tonal ? trackChop[tr] : trackSweep[tr]); }
          const fb = document.getElementById(`fxbtn-${tr}`); if (fb) fb.classList.toggle('on', trackFx[tr].x > 0 || trackFx[tr].y > 0);
          const row = document.getElementById(`ctrlrow-${tr}`); if (row) row.classList.toggle('row-muted', trackMuted[tr]);
          const vb = document.getElementById(`vbar-${tr}`); if (vb) { vb.classList.toggle('muted', trackMuted[tr]); const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = Math.round(trackVolume[tr]*100)+'%'; }
        }
        document.getElementById('bpmVal').textContent = bpm;
        document.getElementById('bpmSlider').value = bpm;
        updateSlotButtons();
      });
    }
    requestAnimationFrame(() => updatePlayhead(step));
    for (let tr = 0; tr < NUM_TRACKS; tr++) {
      if (trackMuted[tr]) continue;
      const gs = (step - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
      const val = grid[tr][gs];
      if (val > 0) {
        const key = trackInstruments[tr];
        if (key === 'sbass' || key === 'sbass3' || key === 'sbass4' || key === 'stab' || key === 'sstring' || key === 'sleg' || key === 'sparkle' || key === 'rhodes' || key === 'rhodes2') {
          const scale = trackBassScale[tr] || [110];
          const noteIdx = gs % scale.length;
          const freq = scale[noteIdx];
          let dur = stepDuration();
          if (!trackChop[tr]) {
            for (let ld = 1; ld < NUM_STEPS; ld++) {
              const ngs = (gs + ld) % NUM_STEPS;
              if (grid[tr][ngs] > 0) { dur = stepDuration() * ld; break; }
            }
          }
          // Sidechain duck on accent
          if (val === 2 && window._duckGain) {
            const dg = window._duckGain;
            const duckDur = stepDuration() * 0.9;
            dg.gain.cancelScheduledValues(t);
            dg.gain.setValueAtTime(1, t);
            dg.gain.linearRampToValueAtTime(0.63, t + 0.008); // -4dB
            dg.gain.setValueAtTime(0.63, t + duckDur * 0.5);
            dg.gain.linearRampToValueAtTime(1, t + duckDur);
          }
          const sfxOn = !!(trackFx[tr] && (trackFx[tr].x > 0 || trackFx[tr].y > 0));
          const sfxMode = trackFxMode[tr] || 0;
          // X axis: choke (mode 0) or crunch (mode 1, doesn't affect duration)
          if (sfxOn && sfxMode === 0 && trackFx[tr].x > 0) {
            dur = Math.max(0.01, dur * (1 - trackFx[tr].x) + 0.01 * trackFx[tr].x);
          }
          if (key === 'sbass')   playSynthBass(freq, dur, val === 2, t, tr);
          if (key === 'sbass3')  playMotownBass(freq, dur, val === 2, t, tr);
          if (key === 'sbass4')  playPlunkBass(freq, dur, val === 2, t, tr);
          if (key === 'stab')    playStab(freq, dur, val === 2, t, tr);
          if (key === 'sstring') playStringSynth(freq, dur, val === 2, t, tr);
          if (key === 'sleg')    playSynthLeg(freq, dur, val === 2, t, tr);
          if (key === 'sparkle') playSparkle(freq, dur, val === 2, t, tr);
          if (key === 'rhodes')  playRhodes(freq, dur, val === 2, t, tr);
          if (key === 'rhodes2') playRhodes2(freq, dur, val === 2, t, tr);
          // E: filter envelope — bright open, sweep closed over note duration
          if (trackChop[tr] && trackEnvFilters[tr]) {
            const ef = trackEnvFilters[tr];
            const peakFreq = val === 2 ? 12000 : 7000;
            const closeFreq = Math.max(freq * 1.2, 120);
            const sweepDur = Math.min(dur * 0.85, stepDuration() * 2.5);
            ef.frequency.cancelScheduledValues(t);
            ef.frequency.setValueAtTime(peakFreq, t);
            ef.frequency.exponentialRampToValueAtTime(closeFreq, t + sweepDur);
            ef.frequency.setValueAtTime(22050, t + sweepDur + 0.01); // reopen instantly after
          }

        } else if (key === 'ngate') {
          // Noise gate triggered by its own grid notes
          triggerNoiseGate(tr, val === 2, t);
        } else {
          playBuffer(key, val === 2, t, tr);
          // If any other track has ngate, trigger it from this hit
          for (let ng = 0; ng < NUM_TRACKS; ng++) {
            if (ng !== tr && !trackMuted[ng] && trackInstruments[ng] === 'ngate') {
              triggerNoiseGate(ng, val === 2, t);
            }
          }
        }
      }
    }
    // Beat: fire from main clock on downbeats only
    if (step % 8 === 0 || step % 8 === 4) {
      // Activate pending beat on next downbeat
      if (_beatPending && (step % 4 === 0)) {
        beatPlaying = true; _beatPending = false;
        requestAnimationFrame(() => {
          const bb = document.getElementById('beatBtn');
          if (bb) bb.classList.add('active');
          updateBeatPulse();
        });
      }
      if (beatPlaying) {
        if (step % 8 === 0) {
          playKick(t);
          if (window._duckGain) {
            const dg = window._duckGain.gain;
            dg.cancelScheduledValues(t); dg.setValueAtTime(1, t);
            dg.linearRampToValueAtTime(0.5, t + 0.005);
            dg.setTargetAtTime(1, t + 0.020, 0.08);
          }
        } else {
          playSnare(t);
        }
      }
    }
    nextStepTime += stepDuration();
  }
}

function updatePlayhead(step) {
  document.querySelectorAll('.step-cell').forEach(el => el.classList.remove('playing'));
  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    const el = document.querySelector(`[data-track="${tr}"][data-step="${step}"]`);
    if (el) el.classList.add('playing');
    const gs = (step - trackOffset[tr] + NUM_STEPS) % NUM_STEPS;
    const tbtn = document.getElementById(`tbtn-${tr}`);
    if (tbtn && grid[tr][gs] > 0 && !trackMuted[tr]) {
      tbtn.classList.add('playing');
      setTimeout(() => tbtn.classList.remove('playing'), 80);

    }
  }
  // Pulse active slot + transport buttons on every beat (every 4 steps)
  if (step % 4 === 0) {
    if (activeSlot >= 0) {
      const sb = document.getElementById(`slot-${activeSlot}`);
      if (sb) { sb.classList.remove('beat-pulse'); void sb.offsetWidth; sb.classList.add('beat-pulse'); }
    }
    const pb = document.getElementById('playBtn');
    if (pb) { pb.classList.remove('btn-beat-pulse'); void pb.offsetWidth; pb.classList.add('btn-beat-pulse'); }
    if (beatPlaying) {
      const bb = document.getElementById('beatBtn');
      if (bb) { bb.classList.remove('btn-beat-pulse'); void bb.offsetWidth; bb.classList.add('btn-beat-pulse'); }
    }
  }
}

function updateBeatPulse() {
  const bb = document.getElementById('beatBtn');
  if (bb) bb.classList.toggle('beat-pulse', beatPlaying && playing);
}

function togglePlay() {
  if (ctx) ctx.resume();
  playing = !playing;
  const btn = document.getElementById('playBtn');
  if (playing) {
    currentStep = -1; nextStepTime = ctx.currentTime + 0.05;
    scheduleInterval = setInterval(scheduler, SCHEDULE_MS);
    btn.classList.add('playing'); btn.textContent = 'STOP';
    updateBeatPulse();
    document.querySelectorAll('.reel-wrap').forEach(r => r.classList.add('spinning'));

    // Auto-start recording if armed
    if (_recArmed && _mediaRecorder && _mediaRecorder.state === 'inactive') {
      _mediaRecorder.start();
      updateRecBtn();
    }
  } else {
    clearInterval(scheduleInterval); scheduleInterval = null;
    btn.classList.remove('playing'); btn.textContent = 'PLAY';
    updateBeatPulse();
    document.querySelectorAll('.reel-wrap').forEach(r => r.classList.remove('spinning'));
    // Stop and deactivate beat
    beatPlaying = false; _beatPending = false;
    const _bb = document.getElementById('beatBtn');
    if (_bb) _bb.classList.remove('active');
    updateBeatPulse();
    document.querySelectorAll('.step-cell').forEach(el => el.classList.remove('playing'));
    // Auto-stop recording after half-bar delay (to capture reverb tail)
    if (_recArmed && _mediaRecorder && _mediaRecorder.state === 'recording') {
      const tailMs = (stepDuration() * 8) * 1000; // half bar
      setTimeout(() => {
        if (_mediaRecorder && _mediaRecorder.state === 'recording') _mediaRecorder.stop();
        _recArmed = false;
        updateRecBtn();
      }, tailMs);
    }
  }
}

// ── Beat button: Kick on 1&3, Snare on 2&4 ──
let beatPlaying = false, _beatPending = false;

function reverseBuffer(buf, revLen) {
  if (!buf || !ctx) return null;
  const numCh = buf.numberOfChannels, sr = buf.sampleRate;
  const totalSamples = buf.length;
  const revSamples = Math.min(Math.ceil(revLen * sr), totalSamples);
  const out = ctx.createBuffer(numCh, revSamples, sr);
  for (let ch = 0; ch < numCh; ch++) {
    const src = buf.getChannelData(ch);
    const dst = out.getChannelData(ch);
    for (let i = 0; i < revSamples; i++) {
      dst[i] = src[revSamples - 1 - i];
    }
  }
  return out;
}

function playSynthKick(isAccent, time, tr) {
  if (!ctx) return;
  const dest = getSynthConnectNode(tr);
  const osc = ctx.createOscillator(), g = ctx.createGain();
  osc.connect(g); g.connect(dest);
  osc.frequency.setValueAtTime(isAccent ? 180 : 140, time);
  osc.frequency.exponentialRampToValueAtTime(35, time + 0.35);
  g.gain.setValueAtTime(isAccent ? 0.9 : 0.6, time);
  g.gain.exponentialRampToValueAtTime(0.001, time + 0.45);
  osc.start(time); osc.stop(time + 0.46);
}
function playSynthSnare(isAccent, time, tr) {
  if (!ctx) return;
  const dest = getSynthConnectNode(tr);
  const dur = isAccent ? 0.28 : 0.20, vol = isAccent ? 0.65 : 0.42;
  const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 1.5);
  const src = ctx.createBufferSource(), g = ctx.createGain();
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 300;
  const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 500; bp.Q.value = 0.8;
  const body = ctx.createOscillator(), bg = ctx.createGain();
  body.frequency.setValueAtTime(200, time); body.frequency.exponentialRampToValueAtTime(75, time + 0.08);
  bg.gain.setValueAtTime(vol * 0.6, time); bg.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
  body.connect(bg); bg.connect(dest); body.start(time); body.stop(time + 0.1);
  src.buffer = buf; src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(dest);
  g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  src.start(time);
}
function playSynthHihat(isAccent, time, tr) {
  if (!ctx) return;
  const dest = getSynthConnectNode(tr);
  const dur = isAccent ? 0.12 : 0.06, vol = isAccent ? 0.35 : 0.22;
  const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
  const d = buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = Math.random()*2-1;
  const src = ctx.createBufferSource(), g = ctx.createGain();
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 7000;
  src.buffer = buf; src.connect(hp); hp.connect(g); g.connect(dest);
  g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + dur);
  src.start(time);
}

// ── Synth Bass with legato glide (ported from SMPLJAK) ──
const _bassGlideState = {}; // tr -> lastFreq
function playSynthBass(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq || freq < 10) return;
  const vel = isAccent ? 0.425 : 0.3;
  const startFreq = _bassGlideState[tr] || freq;
  _bassGlideState[tr] = freq;
  const dest = (tr !== undefined && trackFxNodes[tr])
    ? (trackFx[tr] && (trackFx[tr].x > 0 || trackFx[tr].y > 0) ? trackFxNodes[tr].fxSend : trackFxNodes[tr].dryGain)
    : (trackGainNodes[tr] || masterGain);

  const saw = ctx.createOscillator(); saw.type = 'sawtooth';
  const sub = ctx.createOscillator(); sub.type = 'sine';
  const sawG = ctx.createGain(); sawG.gain.value = 0.25;
  const subG = ctx.createGain(); subG.gain.value = 0.38;

  const slideTime = Math.min(durSec * 0.3, 0.12);
  saw.frequency.setValueAtTime(Math.max(startFreq, 1), time);
  saw.frequency.exponentialRampToValueAtTime(Math.max(freq, 1), time + slideTime);
  sub.frequency.setValueAtTime(Math.max(startFreq * 0.5, 1), time);
  sub.frequency.exponentialRampToValueAtTime(Math.max(freq * 0.5, 1), time + slideTime);

  const filt = ctx.createBiquadFilter(); filt.type = 'lowpass'; filt.Q.value = 3.5;
  filt.frequency.setValueAtTime(Math.max(startFreq * 3.5, 20), time);
  filt.frequency.exponentialRampToValueAtTime(Math.max(freq * 3.5, 20), time + slideTime);

  const ampEnv = ctx.createGain();
  ampEnv.gain.setValueAtTime(0, time);
  ampEnv.gain.linearRampToValueAtTime(vel, time + 0.008);
  ampEnv.gain.setValueAtTime(vel, time + durSec * 0.8);
  ampEnv.gain.linearRampToValueAtTime(0.001, time + durSec);

  sub.connect(subG); subG.connect(filt);

// Pentatonic minor intervals (semitones from root): 0,3,5,7,10
const PENTA_MINOR = [0, 3, 5, 7, 10];
// Bass roots: A1–A2 range
const BASS_ROOTS    = [55, 58, 62, 65, 69, 73];   // A1 B1 D2 F2 A2 C#2
const MELODY_ROOTS  = [220, 247, 262, 294, 330];   // A3 B3 C4 D4 E4
const SPARKLE_ROOTS = [82, 98, 110, 130, 147, 165];  // E2 G2 A2 C3 D3 E3

// Per-track pentatonic scale (set on each R press for tonal tracks)
const trackBassScale = {}; // tr -> [freq, ...]

// Global scale root — shared by all tonal tracks, cleared by CLEAR
let globalScaleRoot = null;
const TONAL_KEYS = new Set(['sbass','sbass3','sbass4','stab','sstring','sleg','sparkle','rhodes','rhodes2']);

function buildScaleFromRoot(root) {
  const scale = [];
  for (let oct = 0; oct < 2; oct++)
    PENTA_MINOR.forEach(s => scale.push(root * Math.pow(2, (s + oct * 12) / 12)));
  return scale;
}
function transposeRootToRange(root, roots) {
  const mid = roots[Math.floor(roots.length / 2)];
  let r = root;
  while (r < mid / 1.5) r *= 2;
  while (r > mid * 1.5) r /= 2;
  return r;
}
function getRangeRoots(key) {
  if (key === 'sparkle') return SPARKLE_ROOTS;
  if (key === 'sstring' || key === 'sleg' || key === 'rhodes' || key === 'rhodes2') return MELODY_ROOTS;
  return BASS_ROOTS;
}

function randomizeBassTrack(tr, level) {
  if (level === undefined) level = 0;
  const key = trackInstruments[tr];

  let root;
  if (globalScaleRoot !== null) {
    // Transpose existing global root into this instrument's range
    root = transposeRootToRange(globalScaleRoot, getRangeRoots(key));
  } else {
    // Pick a new root and set as global
    const roots = getRangeRoots(key);
    root = roots[Math.floor(Math.random() * roots.length)];
    globalScaleRoot = root;
    // Rebuild all other tonal tracks' scales to match
    for (let t = 0; t < NUM_TRACKS; t++) {
      if (t !== tr && TONAL_KEYS.has(trackInstruments[t]) && trackBassScale[t]) {
        const r2 = transposeRootToRange(root, getRangeRoots(trackInstruments[t]));
        trackBassScale[t] = buildScaleFromRoot(r2);
      }
    }
  }

  trackBassScale[tr] = buildScaleFromRoot(root);

  const [minN, maxN, accentRatio] = [
    [3, 6,  0.20],
    [6, 10, 0.40],
    [10, 16, 0.60],
  ][level];
  const noteCount = minN + Math.floor(Math.random() * (maxN - minN + 1));
  placeNotes(tr, noteCount, accentRatio, level);
  redrawTrackCells(tr); markModified();
}

function playStringSynth(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vol = isAccent ? 0.027 : 0.018;
  const env = ctx.createGain();

  // Grainy: shorter, noisier IR
  const irLen = Math.floor(ctx.sampleRate * 0.4);
  const irBuf = ctx.createBuffer(2, irLen, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 1.2);
  }
  const rev = ctx.createConvolver(); rev.buffer = irBuf;
  const dryG = ctx.createGain(); dryG.gain.value = 0.5;
  const revG = ctx.createGain(); revG.gain.value = 0.5;

  [0, 7, -7, 12, -3].forEach(detune => {

    osc.type = 'sawtooth'; osc.frequency.value = freq; osc.detune.value = detune;
    osc.connect(env); osc.start(time); osc.stop(time + durSec + 0.4);
  });
  env.connect(hp); hp.connect(dryG); dryG.connect(dest);
  hp.connect(rev); rev.connect(revG); revG.connect(dest);
  env.gain.setValueAtTime(0, time);
  env.gain.linearRampToValueAtTime(vol, time + 0.08);
  env.gain.setValueAtTime(vol * 3, time + durSec - 0.1);
  env.gain.exponentialRampToValueAtTime(0.001, time + durSec + 0.3);
}

// ── Synth Leg: detuned strings layer + square lead with legato glide ──

function playSynthLeg(freq, durSec, isAccent, time, tr) {
  if (!ctx || !freq) return;
  const dest = getSynthConnectNode(tr);
  const vol = isAccent ? 0.055 : 0.038;
  const prevFreq = _slegGlide[tr] || freq;
  _slegGlide[tr] = freq;

  const irLen = Math.floor(ctx.sampleRate * 0.5);
  const irBuf = ctx.createBuffer(2, irLen, ctx.sampleRate);

    const d = irBuf.getChannelData(ch);
    for (let i = 0; i < irLen; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/irLen, 1.5);
  }
  const rev = ctx.createConvolver(); rev.buffer = irBuf;
  const hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 500; hp.Q.value = 0.7;
  const dryG = ctx.createGain(); dryG.gain.value = 0.5;
  const revG = ctx.createGain(); revG.gain.value = 0.5;
  [0, 6, -6, 11].forEach(det => {
    const o = ctx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(prevFreq, time);
    o.frequency.exponentialRampToValueAtTime(freq, time + glide);
    o.detune.value = det;
    o.connect(strEnv); o.start(time); o.stop(time + durSec + 0.4);
  });
  strEnv.connect(hp); hp.connect(dryG); dryG.connect(dest);
  hp.connect(rev); rev.connect(revG); revG.connect(dest);
  strEnv.gain.setValueAtTime(0, time);
  strEnv.gain.linearRampToValueAtTime(vol, time + 0.07);
  strEnv.gain.setValueAtTime(vol * 2.5, time + durSec - 0.08);
  strEnv.gain.exponentialRampToValueAtTime(0.001, time + durSec + 0.25);

  const leadEnv = ctx.createGain();
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2200; lp.Q.value = 2.5;

  leadOsc.frequency.setValueAtTime(Math.max(prevFreq, 1), time);
  leadOsc.frequency.exponentialRampToValueAtTime(Math.max(freq, 1), time + glide);
  leadOsc.connect(lp); lp.connect(leadEnv); leadEnv.connect(dest);
  leadEnv.gain.setValueAtTime(0, time);
  leadEnv.gain.linearRampToValueAtTime(vol * 0.7, time + 0.005);
  leadEnv.gain.setValueAtTime(vol * 0.7, time + durSec - 0.02);
  leadEnv.gain.linearRampToValueAtTime(0, time + durSec + 0.01);
  leadOsc.start(time); leadOsc.stop(time + durSec + 0.05);
}

const _sparkleGlideState = {};

// ── Piano: additive partials with inharmonicity + hammer transient ──
const _rhodesGlide = {};
function playRhodes(freq, durSec, isAccent, time, tr) {

  const vel = isAccent ? 0.38 : 0.26;
  _rhodesGlide[tr] = freq;

  // Inharmonicity factor — real piano strings stretch slightly
  const B = 0.00015;
  const inharmonic = n => freq * n * Math.sqrt(1 + B * n * n);

  // Natural decay — short at high freqs, longer at low
  const baseDec = Math.min(durSec + 0.6, 1.8) * (1 + Math.max(0, (300 - freq) / 300) * 0.8);

  // Partials: amplitude and decay multiplier
  const partials = [
    { n: 1, amp: 1.00, dec: 1.00 },
    { n: 2, amp: 0.50, dec: 0.65 },
    { n: 3, amp: 0.25, dec: 0.42 },
    { n: 4, amp: 0.12, dec: 0.28 },
    { n: 5, amp: 0.05, dec: 0.18 },
    { n: 6, amp: 0.02, dec: 0.12 },
  ];

  partials.forEach(({ n, amp, dec }) => {
    const osc = ctx.createOscillator(); osc.type = 'sine';
    osc.frequency.value = inharmonic(n);
    const env = ctx.createGain();
    const pk = vel * amp;
    const decT = baseDec * dec;
    env.gain.setValueAtTime(0, time);
    env.gain.linearRampToValueAtTime(pk, time + 0.002);       // instant attack
    env.gain.exponentialRampToValueAtTime(pk * 0.55, time + 0.015); // fast initial drop
    env.gain.exponentialRampToValueAtTime(0.0001, time + decT);

  const td = thumpBuf.getChannelData(0);
  for (let i = 0; i < td.length; i++) td[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / td.length, 2);
  const thump = ctx.createBufferSource(); thump.buffer = thumpBuf;

  const bd = bodyBuf.getChannelData(0);
  for (let i = 0; i < bd.length; i++) bd[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bd.length, 1.2);
  const body = ctx.createBufferSource(); body.buffer = bodyBuf;
  const bodyBP = ctx.createBiquadFilter(); bodyBP.type = 'bandpass';
  bodyBP.frequency.value = freq * 2; bodyBP.Q.value = 3;
  const bodyEnv = ctx.createGain(); bodyEnv.gain.value = vel * 0.12;
  body.connect(bodyBP); bodyBP.connect(bodyEnv); bodyEnv.connect(dest);
  body.start(time);
}

// ── Noise Gate: continuous white noise gated by hits from a random other track ──

function initNoiseGate(tr) {
  if (!ctx) return;
  if (_noiseGateNodes[tr]) { try { _noiseGateNodes[tr].src.stop(); } catch(e) {} }
  const dest = (trackGainNodes[tr]) ? trackGainNodes[tr] : masterGain;
  const bufLen = ctx.sampleRate * 2;
  const buf = ctx.createBuffer(1, bufLen, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) d[i] = Math.random() * 2 - 1;

  const filt = ctx.createBiquadFilter(); filt.type = 'bandpass'; filt.Q.value = 2.5; filt.frequency.value = 800;

  const vel = isAccent ? 0.55 : 0.35;

  gate.gain.linearRampToValueAtTime(vel, time + 0.004);
  gate.gain.setValueAtTime(vel * 0.7, time + dur * 0.3);
  gate.gain.exponentialRampToValueAtTime(0.0001, time + dur);

function playSparkle(freq, durSec, isAccent, time, tr) {

      const rev = offline.createConvolver(); rev.buffer=irBuf;

      const rev = offline.createConvolver(); rev.buffer=irBuf;
      const dryG = offline.createGain(); dryG.gain.value=0.5; dryG.connect(offDest);
      const revG = offline.createGain(); revG.gain.value=0.5; revG.connect(offDest);
      slegHP = offline.createBiquadFilter(); slegHP.type='highpass'; slegHP.frequency.value=500; slegHP.Q.value=0.7;

      const isAccent = val === 2;
      if (key === 'skick') {
        const osc = offline.createOscillator(), g = offline.createGain(); osc.connect(g); g.connect(offDest);
        osc.frequency.setValueAtTime(isAccent?180:140,t); osc.frequency.exponentialRampToValueAtTime(35,t+0.35);
        g.gain.setValueAtTime(isAccent?0.9:0.6,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
        osc.start(t); osc.stop(t+0.46); continue;
      }
      if (key === 'ssnare') {
        const dur2=isAccent?0.28:0.20, vol=isAccent?0.65:0.42;
        const nb=offline.createBuffer(1,Math.ceil(sampleRate*dur2),sampleRate);
        const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*Math.pow(1-i/nd.length,1.5);
        const s2=offline.createBufferSource(), g=offline.createGain();
        const hp=offline.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=300;
        s2.buffer=nb; s2.connect(hp); hp.connect(g); g.connect(offDest);
        g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur2); s2.start(t); continue;
      }
      if (key === 'shihat') {
        const dur3=isAccent?0.12:0.06;
        const nb=offline.createBuffer(1,Math.ceil(sampleRate*dur3),sampleRate);
        const nd=nb.getChannelData(0); for(let i=0;i<nd.length;i++) nd[i]=Math.random()*2-1;
        const s3=offline.createBufferSource(), g=offline.createGain();
        const hp=offline.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=7000;
        s3.buffer=nb; s3.connect(hp); hp.connect(g); g.connect(offDest);
        g.gain.setValueAtTime(isAccent?0.35:0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur3); s3.start(t); continue;
      }
      const buf = buffers[key]?.[isAccent ? 'accent' : 'soft'];

      // Synth voices — rendered to match live voices exactly
      if (TONAL_KEYS.has(key)) {
        const scale = snap.trackBassScale?.[tr];
        if (!scale) continue;
        let dur = 60 / slotBpm / 4;
        for (let ld = 1; ld < NUM_STEPS; ld++) {
          const ngs = (gs + ld) % NUM_STEPS;
          if (slotGrid[ngs] > 0) { dur = ld * 60 / slotBpm / 4; break; }
        }
        const freq = scale[gs % scale.length];
        if (!freq) continue;
        const o = offline; // alias for brevity

        if (key === 'sbass') {
          // Match playSynthBass exactly
          const vel = isAccent ? 0.425 : 0.3;
          const saw = o.createOscillator(); saw.type = 'sawtooth';
          const sub = o.createOscillator(); sub.type = 'sine';
          const sawG = o.createGain(); sawG.gain.value = 0.25;
          const subG = o.createGain(); subG.gain.value = 0.38;
          saw.frequency.value = freq; sub.frequency.value = freq * 0.5;
          const filt = o.createBiquadFilter(); filt.type = 'lowpass'; filt.Q.value = 3.5; filt.frequency.value = freq * 3.5;
          const env = o.createGain();
          env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(vel,t+0.008);
          env.gain.setValueAtTime(vel,t+dur*0.8); env.gain.linearRampToValueAtTime(0.001,t+dur);
          saw.connect(sawG); sub.connect(subG); sawG.connect(filt); subG.connect(filt); filt.connect(env); env.connect(offDest);
          saw.start(t); saw.stop(t+dur+0.05); sub.start(t); sub.stop(t+dur+0.05);

        } else if (key === 'sbass3') {
          // Match playMotownBass exactly
          const vel = isAccent ? 0.8 : 0.58;
          const saw1 = o.createOscillator(); saw1.type='sawtooth'; saw1.frequency.value=freq; saw1.detune.value=-3;
          const saw2 = o.createOscillator(); saw2.type='sawtooth'; saw2.frequency.value=freq; saw2.detune.value=3;
          const sub  = o.createOscillator(); sub.type='sine'; sub.frequency.value=freq*0.5;
          const mix = o.createGain(); mix.gain.value=0.3;
          const filt = o.createBiquadFilter(); filt.type='lowpass'; filt.Q.value=0.8;
          filt.frequency.setValueAtTime(freq*3,t); filt.frequency.exponentialRampToValueAtTime(freq*1.1,t+0.03);
          const ampEnv = o.createGain();
          const decay = Math.min(dur*0.55,0.18);
          ampEnv.gain.setValueAtTime(0,t); ampEnv.gain.linearRampToValueAtTime(vel,t+0.004);
          ampEnv.gain.exponentialRampToValueAtTime(vel*0.35,t+decay);
          ampEnv.gain.exponentialRampToValueAtTime(0.001,t+dur*0.85);
          saw1.connect(mix); saw2.connect(mix); sub.connect(mix);
          mix.connect(filt); filt.connect(ampEnv); ampEnv.connect(offDest);
          [saw1,saw2,sub].forEach(osc=>{ osc.start(t); osc.stop(t+dur+0.02); });

        } else if (key === 'sbass4') {
          // Match playPlunkBass exactly
          const vel = isAccent ? 0.9 : 0.65;
          const osc1 = o.createOscillator(); osc1.type='sawtooth'; osc1.frequency.value=freq;
          const osc2 = o.createOscillator(); osc2.type='sawtooth'; osc2.frequency.value=freq*0.5;
          const mix = o.createGain(); mix.gain.value=0.4;
          const bp = o.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=1.8;
          bp.frequency.setValueAtTime(freq*4,t); bp.frequency.exponentialRampToValueAtTime(freq*1.5,t+0.02);
          const ws = o.createWaveShaper();
          const curve = new Float32Array(256);
          for (let i=0;i<256;i++){const x=(i*2)/256-1; curve[i]=Math.tanh(x*4);} ws.curve=curve;
          const ampEnv = o.createGain(); const decay=Math.min(dur*0.7,0.22);
          ampEnv.gain.setValueAtTime(0,t); ampEnv.gain.linearRampToValueAtTime(vel,t+0.003);
          ampEnv.gain.exponentialRampToValueAtTime(vel*0.25,t+decay);
          ampEnv.gain.exponentialRampToValueAtTime(0.001,t+Math.min(dur,0.45));
          osc1.connect(mix); osc2.connect(mix); mix.connect(bp); bp.connect(ws); ws.connect(ampEnv); ampEnv.connect(offDest);
          [osc1,osc2].forEach(osc=>{ osc.start(t); osc.stop(t+Math.min(dur,0.5)); });

        } else if (key === 'stab') {
          // Match playStab exactly
          const vel = isAccent ? 0.347 : 0.240;
          const env = o.createGain();
          [-7,0,7,12].forEach(det => {
            const osc = o.createOscillator(); osc.type='sawtooth';
            osc.frequency.value = freq*(det===12?2:1); osc.detune.value=det===12?0:det*2;
            osc.connect(env); osc.start(t); osc.stop(t+0.18);
          });
          const lp = o.createBiquadFilter(); lp.type='lowpass'; lp.Q.value=4;
          lp.frequency.setValueAtTime(isAccent?4000:2800,t); lp.frequency.exponentialRampToValueAtTime(300,t+0.06);
          env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(vel,t+0.004);
          env.gain.exponentialRampToValueAtTime(vel*0.3,t+0.025); env.gain.exponentialRampToValueAtTime(0.001,t+0.12);
          env.connect(lp); lp.connect(offDest);

        } else if (key === 'sstring') {
          // Use shared rev/hp nodes (created once per track above)
          const vol = isAccent ? 0.027 : 0.018;
          const env = o.createGain();
          [0,7,-7,12,-3].forEach(det => {
            const osc = o.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq; osc.detune.value=det;
            osc.connect(env); osc.start(t); osc.stop(t+dur+0.4);
          });
          env.connect(sstringHP); env.connect(sstringRev);
          env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(vol,t+0.08);
          env.gain.setValueAtTime(vol*3,t+dur-0.1); env.gain.exponentialRampToValueAtTime(0.001,t+dur+0.3);

        } else if (key === 'sleg') {
          // Use shared rev/hp nodes (created once per track above)
          const vol = isAccent ? 0.055 : 0.038;
          const glide = Math.min(0.1,dur*0.2);
          const strEnv = o.createGain();
          [0,6,-6,11].forEach(det => {
            const osc = o.createOscillator(); osc.type='sawtooth'; osc.frequency.value=freq; osc.detune.value=det;
            osc.connect(strEnv); osc.start(t); osc.stop(t+dur+0.4);
          });
          strEnv.connect(slegHP); strEnv.connect(slegRev);
          strEnv.gain.setValueAtTime(0,t); strEnv.gain.linearRampToValueAtTime(vol,t+0.07);
          strEnv.gain.setValueAtTime(vol*2.5,t+dur-0.08); strEnv.gain.exponentialRampToValueAtTime(0.001,t+dur+0.25);
          const leadEnv = o.createGain();
          const lp = o.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2200; lp.Q.value=2.5;
          const leadOsc = o.createOscillator(); leadOsc.type='square'; leadOsc.frequency.value=freq;
          leadOsc.connect(lp); lp.connect(leadEnv); leadEnv.connect(offDest);
          leadEnv.gain.setValueAtTime(0,t); leadEnv.gain.linearRampToValueAtTime(vol*0.7,t+0.005);
          leadEnv.gain.setValueAtTime(vol*0.7,t+dur-0.02); leadEnv.gain.linearRampToValueAtTime(0,t+dur+0.01);
          leadOsc.start(t); leadOsc.stop(t+dur+0.05);

        } else if (key === 'sparkle') {
          // Match playSparkle exactly (Karplus-Strong)
          const vel = isAccent ? 1.1 : 0.79;
          const period = 1/freq;
          const bufLen = Math.ceil(sampleRate*period);
          const noiseBuf = o.createBuffer(1,bufLen,sampleRate);
          const nd = noiseBuf.getChannelData(0);
          for (let i=0;i<bufLen;i++) nd[i]=(Math.random()*2-1);
          const src2 = o.createBufferSource(); src2.buffer=noiseBuf; src2.loop=true;
          const lp = o.createBiquadFilter(); lp.type='lowpass';
          lp.frequency.setValueAtTime(freq*6,t); lp.frequency.exponentialRampToValueAtTime(freq*1.2,t+0.025);
          const notch = o.createBiquadFilter(); notch.type='notch'; notch.frequency.value=freq*3; notch.Q.value=1.5;
          const env = o.createGain(); const decay=Math.min(0.18,dur*0.6);
          env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(vel,t+0.002);
          env.gain.exponentialRampToValueAtTime(0.001,t+decay);
          src2.connect(lp); lp.connect(notch); notch.connect(env); env.connect(offDest);
          src2.start(t); src2.stop(t+decay+0.02);

        } else if (key === 'rhodes2') {
          // Match playRhodes2 — warm electric piano
          const rVel = isAccent ? 0.32 : 0.22;
          const B2 = 0.00008;
          const inharmonic2 = n => freq * n * Math.sqrt(1 + B2 * n * n);
          const baseDec2 = Math.min(dur + 1.0, 2.4) * (1 + Math.max(0, (300 - freq) / 300) * 0.6);
          [{n:1,amp:1.00,dec:1.00},{n:2,amp:0.30,dec:0.60},{n:3,amp:0.10,dec:0.35},{n:4,amp:0.03,dec:0.20}]
          .forEach(({ n, amp, dec }) => {
            const osc = offline.createOscillator(); osc.type = 'sine';
            osc.frequency.value = inharmonic2(n);
            const env = offline.createGain();
            const pk = rVel * amp; const decT = baseDec2 * dec;
            env.gain.setValueAtTime(0,t); env.gain.linearRampToValueAtTime(pk,t+0.008);
            env.gain.exponentialRampToValueAtTime(pk*0.7,t+0.04);
            env.gain.exponentialRampToValueAtTime(0.0001,t+decT);
            osc.connect(env); env.connect(offDest); osc.start(t); osc.stop(t+decT+0.05);
          });
          const clickLen = 0.018;
          const cBuf = offline.createBuffer(1,Math.ceil(sampleRate*clickLen),sampleRate);
          const cd = cBuf.getChannelData(0);
          for (let i=0;i<cd.length;i++) cd[i]=(Math.random()*2-1)*Math.pow(1-i/cd.length,1.5);
          const clk = offline.createBufferSource(); clk.buffer=cBuf;
          const clkLP = offline.createBiquadFilter(); clkLP.type='lowpass'; clkLP.frequency.value=2000;
          const clkEnv = offline.createGain(); clkEnv.gain.value=rVel*0.2;
          clk.connect(clkLP); clkLP.connect(clkEnv); clkEnv.connect(offDest); clk.start(t);

        } else if (key === 'rhodes') {
          // Exact match to live playRhodes voice
          const rVel = isAccent ? 0.38 : 0.26;
          const B = 0.00015;
          const inharmonic = n => freq * n * Math.sqrt(1 + B * n * n);
          const baseDec = Math.min(dur + 0.6, 1.8) * (1 + Math.max(0, (300 - freq) / 300) * 0.8);
          const rPartials = [
            { n:1, amp:1.00, dec:1.00 }, { n:2, amp:0.50, dec:0.65 },
            { n:3, amp:0.25, dec:0.42 }, { n:4, amp:0.12, dec:0.28 },
            { n:5, amp:0.05, dec:0.18 }, { n:6, amp:0.02, dec:0.12 },
          ];
          rPartials.forEach(({ n, amp, dec }) => {
            const osc = offline.createOscillator(); osc.type = 'sine';
            osc.frequency.value = inharmonic(n);
            const env = offline.createGain();
            const pk = rVel * amp; const decT = baseDec * dec;
            env.gain.setValueAtTime(0, t);
            env.gain.linearRampToValueAtTime(pk, t + 0.002);
            env.gain.exponentialRampToValueAtTime(pk * 0.55, t + 0.015);
            env.gain.exponentialRampToValueAtTime(0.0001, t + decT);
            osc.connect(env); env.connect(offDest); osc.start(t); osc.stop(t + decT + 0.05);
          });
          // Hammer transient
          const thumpLen = 0.025;
          const thumpBuf = offline.createBuffer(1, Math.ceil(sampleRate * thumpLen), sampleRate);
          const td = thumpBuf.getChannelData(0);
          for (let i = 0; i < td.length; i++) td[i] = (Math.random()*2-1) * Math.pow(1-i/td.length, 2);
          const thump = offline.createBufferSource(); thump.buffer = thumpBuf;
          const thumpLP = offline.createBiquadFilter(); thumpLP.type = 'lowpass';
          thumpLP.frequency.setValueAtTime(4000, t);
          thumpLP.frequency.exponentialRampToValueAtTime(300, t + thumpLen);
          const thumpEnv = offline.createGain(); thumpEnv.gain.value = rVel * 0.4;
          thump.connect(thumpLP); thumpLP.connect(thumpEnv); thumpEnv.connect(offDest);
          thump.start(t);
          // Body resonance
          const bodyLen = 0.04;
          const bodyBuf = offline.createBuffer(1, Math.ceil(sampleRate * bodyLen), sampleRate);
          const bd = bodyBuf.getChannelData(0);
          for (let i = 0; i < bd.length; i++) bd[i] = (Math.random()*2-1) * Math.pow(1-i/bd.length, 1.2);
          const body = offline.createBufferSource(); body.buffer = bodyBuf;
          const bodyBP = offline.createBiquadFilter(); bodyBP.type = 'bandpass';
          bodyBP.frequency.value = freq * 2; bodyBP.Q.value = 3;
          const bodyEnv = offline.createGain(); bodyEnv.gain.value = rVel * 0.12;
          body.connect(bodyBP); bodyBP.connect(bodyEnv); bodyEnv.connect(offDest);
          body.start(t);
        }
        continue;
      }

      if (!buf) continue;
      const src = offline.createBufferSource(); src.buffer = buf;
      src.connect(fxOn ? fxSend : dryGain);
      src.start(t);
    }
    } // end measure loop
  }

  // Always render beat track across all measures
  {
    const beatGain = offline.createGain(); beatGain.gain.value = 0.5; beatGain.connect(offMaster);
    for (let measure = 0; measure < NUM_MEASURES; measure++) {
      const mo = measure * measureDuration;
      for (let beat = 0; beat < 4; beat++) {
        const t = mo + beat * (60 / slotBpm);
        if (beat % 2 === 0) {
          // Kick
          const osc = offline.createOscillator(), g = offline.createGain();
          osc.connect(g); g.connect(beatGain);
          osc.frequency.setValueAtTime(120, t); osc.frequency.exponentialRampToValueAtTime(45, t + 0.07);
          g.gain.setValueAtTime(0.8, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
          osc.start(t); osc.stop(t + 0.17);
          const cbuf = offline.createBuffer(1, Math.ceil(sampleRate * 0.012), sampleRate);
          const cd = cbuf.getChannelData(0);
          for (let i = 0; i < cd.length; i++) cd[i] = (Math.random()*2-1) * (1 - i/cd.length);
          const click = offline.createBufferSource(); click.buffer = cbuf;
          const cg = offline.createGain(); cg.gain.value = 0.3;
          click.connect(cg); cg.connect(beatGain); click.start(t);
        } else {
          // Snare
          const dur = 0.22;
          const nbuf = offline.createBuffer(1, Math.ceil(sampleRate * dur), sampleRate);
          const d = nbuf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 1.5);
          const src2 = offline.createBufferSource(), g = offline.createGain();
          const hp = offline.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 300;
          const body = offline.createOscillator(), bg = offline.createGain();
          body.frequency.setValueAtTime(220, t); body.frequency.exponentialRampToValueAtTime(80, t+0.08);
          bg.gain.setValueAtTime(0.35, t); bg.gain.exponentialRampToValueAtTime(0.001, t+0.1);
          body.connect(bg); bg.connect(beatGain); body.start(t); body.stop(t+0.1);
          src2.buffer = nbuf; src2.connect(hp); hp.connect(g); g.connect(beatGain);
          g.gain.setValueAtTime(0.55, t); g.gain.exponentialRampToValueAtTime(0.001, t+dur);
          src2.start(t);
        }
      }
    }
  }

  const rendered = await offline.startRendering();
  return audioBufferToWav(rendered, slotBpm);
}

function concatAudioBuffers(buffers, sampleRate) {
  const numCh = 2;
  const totalLen = buffers.reduce((s, b) => s + b.length, 0);
  const channels = [new Float32Array(totalLen), new Float32Array(totalLen)];
  let offset = 0;
  for (const buf of buffers) {
    for (let ch = 0; ch < numCh; ch++) {
      const src = buf.numberOfChannels > ch ? buf.getChannelData(ch) : buf.getChannelData(0);
      channels[ch].set(src, offset);
    }
    offset += buf.length;
  }
  return { numberOfChannels: numCh, sampleRate, length: totalLen, getChannelData: ch => channels[ch] };
}

// Collect filled slots (or current state if none saved)
function getExportSnaps() {
  const snaps = [];
  for (let i = 0; i < NUM_SLOTS; i++) { if (slots[i] !== null) snaps.push({ snap: slots[i], label: `slot${i+1}` }); }
  if (snaps.length === 0) snaps.push({ snap: snapshotState(), label: 'current' });
  return snaps;
}

async function shareOrDownload(files) {
  const shareData = { files, title: 'BOOMBLAP loops' };
  try {
    await navigator.share(shareData);
  } catch(e) {
    if (e.name === 'AbortError') return;
    for (const file of files) {
      const url = URL.createObjectURL(file);
      const a = document.createElement('a'); a.href = url; a.download = file.name;
      document.body.appendChild(a); a.click();
      await new Promise(r => setTimeout(r, 300));
      URL.revokeObjectURL(url); a.remove();
    }
  }
}

async function saveAllSeparate() {
  if (!ctx) { alert('Load audio first'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const snaps = getExportSnaps();
    const files = [];
    for (let i = 0; i < snaps.length; i++) {
      btn.textContent = `${i+1}/${snaps.length}`;
      const wav = await renderSlotToWav(snaps[i].snap);
      files.push(new File([wav], `boombot-${snaps[i].label}-${Math.round(snaps[i].snap.bpm||bpm)}bpm.wav`, { type: 'audio/wav' }));
    }
    await shareOrDownload(files);
  } catch(e) {
    console.error('Save failed', e);
    alert('Save error: ' + e.message);
  }
  btn.textContent = 'SAVE'; btn.disabled = false;
}

async function saveAllCombined() {
  if (!ctx) { alert('Load audio first'); return; }
  const btn = document.getElementById('saveBtn');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const snaps = getExportSnaps();
    const renderedBuffers = [];
    for (let i = 0; i < snaps.length; i++) {
      btn.textContent = `${i+1}/${snaps.length}`;
      const wav = await renderSlotToWav(snaps[i].snap);
      const decoded = await ctx.decodeAudioData(wav.slice(0));
      renderedBuffers.push(decoded);
    }
    const combined = concatAudioBuffers(renderedBuffers, ctx.sampleRate);
    const wavData = audioBufferToWav(combined, snaps[0].snap.bpm || bpm);
    const file = new File([wavData], `boombot-${snaps.length}slots.wav`, { type: 'audio/wav' });
    await shareOrDownload([file]);
  } catch(e) {
    console.error('Save failed', e);
    alert('Save error: ' + e.message);
  }
  btn.textContent = 'SAVE'; btn.disabled = false;
}

// ── Live recording via MediaRecorder ──
let _mediaRecorder = null, _recChunks = [], _recArmed = false;

function updateRecBtn() {
  const btn = document.getElementById('saveBtn');
  if (!btn) return;
  const isRec = !!(  _recArmed && _mediaRecorder && _mediaRecorder.state === 'recording');
  const isArmed = !!_recArmed;
  if (isArmed) {
    btn.classList.add('rec-active');
  } else {
    btn.classList.remove('rec-active');
  }
  document.querySelectorAll('.reel').forEach(r => r.classList.toggle('recording', isRec));
}

function onRecClick() { toggleRecord(); }

function toggleRecord() {
  if (!ctx) { alert('Start playback first'); return; }

  // If already armed/recording — stop and share
  if (_recArmed) {
    _recArmed = false;
    if (_mediaRecorder && _mediaRecorder.state === 'recording') {
      _mediaRecorder.stop();
    }
    updateRecBtn();
    return;
  }

  // Set up MediaRecorder
  try {
    const dest = ctx.createMediaStreamDestination();
    masterGain.connect(dest);
    _recChunks = [];
    _mediaRecorder = new MediaRecorder(dest.stream);
    _mediaRecorder.ondataavailable = e => { if (e.data.size > 0) _recChunks.push(e.data); };

function audioBufferToWav(buffer, tempoHint) {
  const numCh = buffer.numberOfChannels, sr = buffer.sampleRate, len = buffer.length;
  const pcmBytes = len * numCh * 2;

  // bext chunk (858 bytes content)
  const bextContent = 858;
  const bextChunkTotal = 8 + bextContent;

  const totalBytes = 4 + 4 + 4 +
                     8 + 16 +
                     bextChunkTotal +
                     8 + pcmBytes;

  const ab = new ArrayBuffer(totalBytes);
  const view = new DataView(ab);
  let p = 0;

  function wStr(s, pad) {
    const n = pad || s.length;
    for (let i = 0; i < n; i++) view.setUint8(p + i, i < s.length ? s.charCodeAt(i) : 0);
    p += n;
  }
  function wU32(v) { view.setUint32(p, v, true); p += 4; }
  function wU16(v) { view.setUint16(p, v, true); p += 2; }
  function wZero(n) { p += n; } // ArrayBuffer already zeroed

  // RIFF header
  wStr('RIFF'); wU32(totalBytes - 8); wStr('WAVE');

  // fmt chunk
  wStr('fmt '); wU32(16); wU16(1); wU16(numCh);
  wU32(sr); wU32(sr * numCh * 2); wU16(numCh * 2); wU16(16);

  // bext chunk (602 bytes content)
  wStr('bext'); wU32(bextContent);
  wStr('BOOMBLAP', 256);  // Description (256)
  wZero(32);                 // Originator (32)
  wZero(32);                 // OriginatorReference (32)
  wZero(10);                 // OriginationDate (10)
  wZero(8);                  // OriginationTime (8)
  wU32(0); wU32(0);          // TimeReference low+high (8)
  wU16(1);                   // Version (2)
  wZero(64);                 // UMID (64)
  wU16(0); wU16(0); wU16(0); wU16(0); wU16(0); // Loudness (10)
  wZero(180);                // Reserved (180)
  wStr(`BPM=${Math.round(tempoHint || 120)}\r\n`, 256); // CodingHistory (256)

  // Verify bext size
  // data chunk
  wStr('data'); wU32(pcmBytes);
  const channels = [];
  for (let c = 0; c < numCh; c++) channels.push(buffer.getChannelData(c));
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < numCh; c++) {
      const s = Math.max(-1, Math.min(1, channels[c][i]));
      view.setInt16(p, s < 0 ? s * 0x8000 : s * 0x7FFF, true); p += 2;
    }
  }
  return ab;
}

function randAll(mode) {
  mode = mode || 'all';
  const level = randAllLevel;
  randAllLevel = (randAllLevel + 1) % 3;
  const bassKeys = new Set(['sbass','sbass3','sbass4']);
  const percKeys = Object.keys(INSTRUMENTS).filter(k => !TONAL_KEYS.has(k) && k !== 'ngate');
  const tonalKeys = Object.keys(INSTRUMENTS).filter(k => TONAL_KEYS.has(k));
  const allKeys = Object.keys(INSTRUMENTS);

  function buildPool(keys) {
    const shuffled = [...keys].sort(() => Math.random() - 0.5);
    const result = []; let bassUsed = false;
    for (const k of shuffled) {
      if (bassKeys.has(k)) { if (bassUsed) continue; bassUsed = true; }
      result.push(k);
      if (result.length === NUM_TRACKS) break;
    }
    while (result.length < NUM_TRACKS) result.push(keys[Math.floor(Math.random() * keys.length)]);
    return result;
  }

  const pool = mode === 'perc' ? buildPool(percKeys)
             : mode === 'tonal' ? buildPool(tonalKeys)
             : buildPool(allKeys);

  for (let tr = 0; tr < NUM_TRACKS; tr++) {
    const k = pool[tr];
    if (trackInstruments[tr] === 'ngate' && k !== 'ngate' && typeof _noiseGateNodes !== 'undefined' && _noiseGateNodes[tr]) {
      try { _noiseGateNodes[tr].src.stop(); } catch(e) {} delete _noiseGateNodes[tr];
    }
    trackInstruments[tr] = k;
    if (k === 'ngate' && typeof initNoiseGate === 'function' && ctx) initNoiseGate(tr);
    const tb = document.getElementById(`tbtn-${tr}`); if (tb) tb.textContent = INSTRUMENTS[k]?.name || k;
    setTrackNameColor(tr, k);
    const sb = document.getElementById(`swpbtn-${tr}`);
    if (sb) { const tonal = TONAL_KEYS.has(k); sb.textContent = tonal ? 'E' : 'S'; }
    trackRLevel[tr] = level;
    randomizeTrack(tr);
    trackVolume[tr] = 0.5;
    if (trackGainNodes[tr] && ctx) trackGainNodes[tr].gain.setTargetAtTime(0.5, ctx.currentTime, 0.01);
    const vb = document.getElementById(`vbar-${tr}`);
    if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = '50%'; }
  }
  markModified();
}

// On iOS, touchend fires during long-press before we can detect hold duration.
// So: tap = single randAll. Hold = user must tap again to stop auto-mode.
(function() {

  if (!btn) return;
  let autoRandInterval = null;

  const stopAuto = () => {
    if (autoRandInterval) {
      clearInterval(autoRandInterval); autoRandInterval = null;
      btn.classList.remove('pulsing');
    }
  };

  const startAuto = () => {
    if (autoRandInterval) { stopAuto(); return; } // second tap stops it
    btn.classList.add('pulsing');
    randAll();
    autoRandInterval = setInterval(() => { randAll(); }, 4 * (60 / bpm) * 1000);
  };

  // Single tap = one rand. Double tap = start/stop auto mode.
  let lastTap = 0;
  const onTap = () => {

      startAuto();
