// Per-track R press level (cycles 0→1→2→0)
const trackRLevel = new Array(NUM_TRACKS).fill(0);

function placeNotes(tr, noteCount, accentRatio, level) {
  grid[tr].fill(0);
  const positions = [];
  while (positions.length < noteCount) {
    const p = Math.floor(Math.random() * NUM_STEPS);
    if (!positions.includes(p)) positions.push(p);
  }
  const accentCount = Math.round(noteCount * accentRatio);
  const shuffled = [...positions].sort(() => Math.random() - 0.5);
  const accentSet = new Set(shuffled.slice(0, accentCount));
  positions.forEach(p => { grid[tr][p] = accentSet.has(p) ? 2 : 1; });

  const key = trackInstruments[tr];
  const maxConsec = (key === 'skick' || key === 'ssnare' || key === 'clap' || key === 'cowb') ? 2 : (level === 2 ? 4 : 99);
  const maxAccentConsec = level === 2 ? 2 : 99;

  // Iterate until no violations remain
  for (let pass = 0; pass < NUM_STEPS; pass++) {
    let anyChange = false;
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] === 0) continue;
      // Count run starting at s
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] > 0) run++;
      if (run > maxConsec) {
        grid[tr][(s + maxConsec) % NUM_STEPS] = 0;
        anyChange = true;
      }
    }
    // Check accent runs
    for (let s = 0; s < NUM_STEPS; s++) {
      if (grid[tr][s] !== 2) continue;
      let run = 0;
      while (run < NUM_STEPS && grid[tr][(s + run) % NUM_STEPS] === 2) run++;
      if (run > maxAccentConsec) {
        grid[tr][(s + maxAccentConsec) % NUM_STEPS] = 1;
        anyChange = true;
      }
    }
    if (!anyChange) break;
  }
}

function randomizeTrack(tr) {
  const key = trackInstruments[tr];
  const cappedLevel = (key === 'skick' || key === 'clap') ? Math.min(trackRLevel[tr], 1) : trackRLevel[tr];
  const level = cappedLevel;
  trackRLevel[tr] = (trackRLevel[tr] + 1) % 3;

  // Reset volume to default only if FX and S/E are both inactive
  const fxOn = !!(trackFx[tr] && (trackFx[tr].x > 0 || trackFx[tr].y > 0));
  const seOn = TONAL_KEYS.has(trackInstruments[tr]) ? !!trackChop[tr] : !!trackSweep[tr];
  if (!fxOn && !seOn) {
    const defaultVol = (tr === 1) ? 0.505 : 0.8;
    trackVolume[tr] = defaultVol;
    if (trackGainNodes[tr] && ctx) trackGainNodes[tr].gain.setTargetAtTime(defaultVol, ctx.currentTime, 0.01);
    const vb = document.getElementById(`vbar-${tr}`);
    if (vb) { const f = vb.querySelector('.track-vol-fill'); if (f) f.style.width = Math.round(defaultVol * 100) + '%'; }
  }

  if (trackInstruments[tr] === 'sbass' || trackInstruments[tr] === 'sbass3' || trackInstruments[tr] === 'sbass4' || trackInstruments[tr] === 'stab' || trackInstruments[tr] === 'sstring' || trackInstruments[tr] === 'sleg' || trackInstruments[tr] === 'sparkle' || trackInstruments[tr] === 'rhodes' || trackInstruments[tr] === 'rhodes2') {
    randomizeBassTrack(tr, level); return;
  }

  const [minN, maxN, accentRatio] = [
    [4, 7,  0.20],
    [7, 11, 0.40],
    [11, 16, 0.60],
  ][level];
  const noteCount = minN + Math.floor(Math.random() * (maxN - minN + 1));
  placeNotes(tr, noteCount, accentRatio, level);
  redrawTrackCells(tr); markModified();
}

}

    ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
    msg.textContent = 'CTX OK, RESUMING...';
    await ctx.resume();
    msg.textContent = 'RESUMED, BUILDING GRAPH...';
    attachCtxStateWatch();
    masterGain = ctx.createGain(); masterGain.gain.value = masterVol;
    const masterLimiter = ctx.createDynamicsCompressor();
    masterLimiter.threshold.value = -1;
    masterLimiter.knee.value = 0;
    masterLimiter.ratio.value = 20;
    masterLimiter.attack.value = 0.0003;
    masterLimiter.release.value = 0.1;
    // Sidechain duck gain — sits between masterGain and masterLimiter
    window._duckGain = ctx.createGain(); window._duckGain.gain.value = 1;
    masterGain.connect(window._duckGain); window._duckGain.connect(masterLimiter); masterLimiter.connect(ctx.destination);
    for (let i=0; i<NUM_TRACKS; i++) {
      const g = ctx.createGain(); g.gain.value = trackVolume[i]; trackGainNodes[i] = g;
      const ef = ctx.createBiquadFilter(); ef.type = 'lowpass'; ef.frequency.value = 22050; ef.Q.value = 3;
      g.connect(ef); ef.connect(masterGain); trackEnvFilters[i] = ef;
      trackFxNodes[i] = buildFxChain(g);
      if (trackInstruments[i] === 'ngate') initNoiseGate(i);
    }
    const unlock = ctx.createBuffer(1,1,ctx.sampleRate);
    unlock.getChannelData(0)[0]=0.001;
    const src=ctx.createBufferSource(); src.buffer=unlock; src.connect(ctx.destination); src.start(0);
    msg.textContent = 'LOADING SAMPLES...';
    await loadSamples();
  } catch(e) {
    msg.style.fontSize = '1rem';
    msg.textContent = 'ERR: ' + e.message;
    overlay.style.pointerEvents = '';
    _initStarted = false;
  }
}
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
}

</script>
