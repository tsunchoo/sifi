<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Jog Shuttle</title>
<style>
  :root{
    --bg:#0d0d0f;
    --line:#2a2a2e;
    --amber:#ff9d2f;
    --amber-dim:#4a3319;
    --text:#e8e6e1;
    --dim:#6b6b70;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    height:100%;
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:'Courier New',monospace;
    overflow:hidden;
    user-select:none;
    touch-action:none;
  }
  .rig{
    height:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    padding:24px 0;
  }
  .bpm{
    font-size:min(22vw,140px);
    font-weight:bold;
    letter-spacing:1px;
    color:var(--amber);
    text-shadow:0 0 18px rgba(255,157,47,0.35);
    font-variant-numeric:tabular-nums;
    line-height:1;
  }
  .bpm-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin-bottom:36px;
  }
  .tapbtn{
    width:min(48vw,220px);
    height:min(48vw,220px);
    border-radius:50%;
    background:rgba(220,30,30,0.22);
    border:3px solid rgba(255,60,60,0.85);
    box-shadow:0 0 24px rgba(255,0,0,0.25);
    padding:0;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .tapbtn:active{
    background:rgba(255,40,40,0.4);
    box-shadow:0 0 34px rgba(255,0,0,0.45);
  }
  .tracks{
    width:100%;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .track{
    position:relative;
    width:100%;
    height:78px;
    background:
      repeating-linear-gradient(90deg,
        var(--line) 0 1px,
        transparent 1px calc(100%/24));
    background-color:#0a0a0b;
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    overflow:hidden;
    touch-action:none;
  }
  .center-mark{
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:1px;
    background:var(--dim);
    transform:translateX(-50%);
  }
  .handle{
    position:absolute;
    top:8px;
    bottom:8px;
    width:46px;
    left:50%;
    transform:translateX(-50%);
    background:#2c2c31;
    border:1px solid #454549;
    border-radius:3px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    pointer-events:none;
  }
  .handle .grip{width:2px;height:55%;background:var(--dim);}
  .handle.active{border-color:var(--amber);background:#332a1e;}
  .handle.active .grip{background:var(--amber);}
  .handle.springback{transition:transform 0.18s ease-out;}

  .playbtn{
    width:52px;
    height:52px;
    border-radius:50%;
    background:#1f1f23;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
  }
  .playbtn.on{border-color:var(--amber);background:var(--amber-dim);}
  .playbtn svg{width:18px;height:18px;fill:var(--text);}
  .playbtn.on svg{fill:var(--amber);}
</style>
</head>
<body>

<div class="rig">
  <div class="bpm-wrap">
    <div class="bpm" id="bpmDisplay">120</div>
    <button class="tapbtn" id="tapBtn"></button>
  </div>

  <div class="tracks">
    <div class="track" id="nudgeTrack">
      <div class="center-mark"></div>
      <div class="handle" id="nudgeHandle"><div class="grip"></div><div class="grip"></div><div class="grip"></div></div>
    </div>
    <div class="track" id="restTrack">
      <div class="center-mark"></div>
      <div class="handle" id="restHandle"><div class="grip"></div><div class="grip"></div><div class="grip"></div></div>
    </div>
  </div>

  <div class="playbtn" id="playBtn">
    <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </div>
</div>

<script>
(() => {
  const NUDGE_MAX_BPM = 5;
  const NUDGE_MAX_TRAVEL = 90;
  const NUDGE_DEAD_PX = 6;

  const STEP_PX = 30;
  const STEP_BPM = 1;
  const DEAD_ZONE_PX = STEP_PX;
  const HOLD_DELAY_MS = 400;
  const HOLD_REPEAT_MS = 400;

  const MIN_BPM = 60;
  const MAX_BPM = 200;

  let restingBpm = 120;
  let nudgeBpm = 0;
  let effectiveBpm = 120;

  let playing = false;
  let ctx = null;
  let masterGain = null;
  let nextNoteTime = 0;
  let beatIndex = 0;
  let schedulerId = null;
  const LOOKAHEAD = 15;
  const SCHEDULE_AHEAD = 0.06;

  const bpmDisplay = document.getElementById('bpmDisplay');
  const playBtn = document.getElementById('playBtn');
  const playIcon = document.getElementById('playIcon');
  const nudgeTrack = document.getElementById('nudgeTrack');
  const nudgeHandle = document.getElementById('nudgeHandle');
  const restTrack = document.getElementById('restTrack');
  const restHandle = document.getElementById('restHandle');

  function updateDisplay(){
    bpmDisplay.textContent = Math.round(effectiveBpm);
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function recalcEffective(){
    const newEffective = clamp(restingBpm + nudgeBpm, MIN_BPM, MAX_BPM);
    if(newEffective !== effectiveBpm){
      const oldInterval = 60 / effectiveBpm;
      effectiveBpm = newEffective;
      updateDisplay();
      if(playing && ctx){
        const remaining = nextNoteTime - ctx.currentTime;
        if(remaining > 0){
          const newInterval = 60 / effectiveBpm;
          nextNoteTime = ctx.currentTime + remaining * (newInterval / oldInterval);
        }
      }
    }
  }

  function initAudio(){
    if(ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.gain.value = 0.9;
    masterGain.connect(ctx.destination);
  }

  function playKick(time){
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(150, time);
    osc.frequency.exponentialRampToValueAtTime(45, time + 0.09);
    gain.gain.setValueAtTime(1, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.25);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.3);
  }

  function playSnare(time){
    const bufferSize = ctx.sampleRate * 0.2;
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<bufferSize;i++) data[i] = Math.random()*2-1;
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = 'highpass';
    noiseFilter.frequency.value = 1000;
    const noiseGain = ctx.createGain();
    noiseGain.gain.setValueAtTime(0.9, time);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
    noise.connect(noiseFilter);
    noiseFilter.connect(noiseGain);
    noiseGain.connect(masterGain);
    noise.start(time);
    noise.stop(time + 0.15);

    const osc = ctx.createOscillator();
    const oscGain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = 180;
    oscGain.gain.setValueAtTime(0.5, time);
    oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
    osc.connect(oscGain);
    oscGain.connect(masterGain);
    osc.start(time);
    osc.stop(time + 0.1);
  }

  function playFlourish(time){
    // bright, unmistakable stab marking the downbeat of the 4-count phrase
    const osc1 = ctx.createOscillator();
    const osc2 = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1800;
    filter.Q.value = 4;

    osc1.type = 'square';
    osc2.type = 'square';
    osc1.frequency.setValueAtTime(1400, time);
    osc1.frequency.exponentialRampToValueAtTime(700, time + 0.08);
    osc2.frequency.setValueAtTime(1410, time);
    osc2.frequency.exponentialRampToValueAtTime(710, time + 0.08);

    gain.gain.setValueAtTime(0.0001, time);
    gain.gain.exponentialRampToValueAtTime(0.5, time + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.18);

    osc1.connect(filter);
    osc2.connect(filter);
    filter.connect(gain);
    gain.connect(masterGain);

    osc1.start(time); osc1.stop(time + 0.2);
    osc2.start(time); osc2.stop(time + 0.2);
  }

  function scheduleNote(index, time){
    if(index % 2 === 0) playKick(time);
    else playSnare(time);
    if(index === 0) playFlourish(time);
  }

  function nextNoteInterval(){
    return 60 / effectiveBpm;
  }

  function scheduler(){
    while(nextNoteTime < ctx.currentTime + SCHEDULE_AHEAD){
      scheduleNote(beatIndex, nextNoteTime);
      nextNoteTime += nextNoteInterval();
      beatIndex = (beatIndex + 1) % 4;
    }
    schedulerId = setTimeout(scheduler, LOOKAHEAD);
  }

  function startPlayback(){
    initAudio();
    if(ctx.state === 'suspended') ctx.resume();
    beatIndex = 0;
    nextNoteTime = ctx.currentTime + 0.05;
    scheduler();
    playing = true;
    playBtn.classList.add('on');
    playIcon.innerHTML = '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
  }

  function stopPlayback(){
    playing = false;
    clearTimeout(schedulerId);
    playBtn.classList.remove('on');
    playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
  }

  playBtn.addEventListener('click', () => {
    if(playing) stopPlayback();
    else startPlayback();
  });

  const tapBtn = document.getElementById('tapBtn');
  let tapTimes = [];
  const TAP_RESET_MS = 2000;

  tapBtn.addEventListener('pointerdown', () => {
    const now = performance.now();
    if(tapTimes.length && now - tapTimes[tapTimes.length - 1] > TAP_RESET_MS){
      tapTimes = [];
    }
    tapTimes.push(now);
    if(tapTimes.length > 6) tapTimes.shift();
    if(tapTimes.length >= 2){
      const intervals = [];
      for(let i = 1; i < tapTimes.length; i++) intervals.push(tapTimes[i] - tapTimes[i-1]);
      const avgMs = intervals.reduce((a,b) => a+b, 0) / intervals.length;
      const tapBpm = clamp(Math.round(60000 / avgMs), MIN_BPM, MAX_BPM);
      restingBpm = tapBpm;
      recalcEffective();
    }
  });

  (function(){
    let dragging = false;
    let startX = 0;

    function onDown(e){
      dragging = true;
      startX = e.clientX;
      nudgeHandle.classList.add('active');
      nudgeHandle.classList.remove('springback');
      nudgeTrack.setPointerCapture(e.pointerId);
    }
    function onMove(e){
      if(!dragging) return;
      let dx = e.clientX - startX;
      const visualX = clamp(dx, -NUDGE_MAX_TRAVEL, NUDGE_MAX_TRAVEL);
      nudgeHandle.style.transform = `translateX(calc(-50% + ${visualX}px))`;

      let magnitude = Math.abs(dx) < NUDGE_DEAD_PX ? 0 : Math.abs(dx) - NUDGE_DEAD_PX;
      let ratio = clamp(magnitude / (NUDGE_MAX_TRAVEL - NUDGE_DEAD_PX), 0, 1);
      nudgeBpm = Math.sign(dx) * ratio * NUDGE_MAX_BPM;
      recalcEffective();
    }
    function onUp(e){
      if(!dragging) return;
      dragging = false;
      nudgeHandle.classList.remove('active');
      nudgeHandle.classList.add('springback');
      nudgeHandle.style.transform = 'translateX(-50%)';
      nudgeBpm = 0;
      recalcEffective();
      try{ nudgeTrack.releasePointerCapture(e.pointerId); }catch(err){}
    }
    nudgeTrack.addEventListener('pointerdown', onDown);
    nudgeTrack.addEventListener('pointermove', onMove);
    nudgeTrack.addEventListener('pointerup', onUp);
    nudgeTrack.addEventListener('pointercancel', onUp);
  })();

  (function(){
    let dragging = false;
    let startX = 0;
    let lastStepCrossed = 0;
    let currentDir = 0;
    let holdTimeout = null;
    let holdInterval = null;

    function stepsFromDx(dx){
      if(Math.abs(dx) < DEAD_ZONE_PX) return 0;
      const adjusted = dx - Math.sign(dx) * DEAD_ZONE_PX;
      return Math.trunc(adjusted / STEP_PX) + Math.sign(dx);
    }

    function clearHold(){
      if(holdTimeout){ clearTimeout(holdTimeout); holdTimeout = null; }
      if(holdInterval){ clearInterval(holdInterval); holdInterval = null; }
    }

    function armHold(dir){
      clearHold();
      if(dir === 0) return;
      holdTimeout = setTimeout(() => {
        holdInterval = setInterval(() => {
          restingBpm = clamp(restingBpm + dir * STEP_BPM, MIN_BPM, MAX_BPM);
          recalcEffective();
        }, HOLD_REPEAT_MS);
      }, HOLD_DELAY_MS);
    }

    function onDown(e){
      dragging = true;
      startX = e.clientX;
      lastStepCrossed = 0;
      currentDir = 0;
      restHandle.classList.add('active');
      restHandle.classList.remove('springback');
      restTrack.setPointerCapture(e.pointerId);
    }
    function onMove(e){
      if(!dragging) return;
      let dx = e.clientX - startX;
      const visualX = clamp(dx, -90, 90);
      restHandle.style.transform = `translateX(calc(-50% + ${visualX}px))`;

      const stepsCrossed = stepsFromDx(dx);
      if(stepsCrossed !== lastStepCrossed){
        const diff = stepsCrossed - lastStepCrossed;
        restingBpm = clamp(restingBpm + diff * STEP_BPM, MIN_BPM, MAX_BPM);
        recalcEffective();
        lastStepCrossed = stepsCrossed;
      }
      // any movement resets the hold-to-repeat timer for the current direction
      const dir = Math.abs(dx) < DEAD_ZONE_PX ? 0 : Math.sign(dx);
      currentDir = dir;
      armHold(dir);
    }
    function onUp(e){
      if(!dragging) return;
      dragging = false;
      clearHold();
      restHandle.classList.remove('active');
      restHandle.classList.add('springback');
      restHandle.style.transform = 'translateX(-50%)';
      try{ restTrack.releasePointerCapture(e.pointerId); }catch(err){}
    }
    restTrack.addEventListener('pointerdown', onDown);
    restTrack.addEventListener('pointermove', onMove);
    restTrack.addEventListener('pointerup', onUp);
    restTrack.addEventListener('pointercancel', onUp);
  })();

  updateDisplay();
})();
</script>

</body>
</html>
